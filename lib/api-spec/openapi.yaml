        botPerformerName: { type: string, nullable: true }
        botPerformerScore: { type: number, nullable: true }
        botPerformerGrade: { type: string, nullable: true }
        totalAllowanceAmount: { type: integer }
        createdAt: { type: string, format: date-time }

    AcrDashboardAgentTrend:
      type: object
      required: [agentUserId, points]
      properties:
        agentUserId: { type: integer }
        agentName: { type: string, nullable: true }
        points:
          type: array
          items:
            type: object
            required: [jobId, periodStart, periodLabel, totalScore, grade]
            properties:
              jobId: { type: string }
              periodStart: { type: string, format: date }
              periodLabel: { type: string }
              totalScore: { type: number }
              grade: { type: string }

    AcrDashboard:
      type: object
      required: [frequency, periods, leaderboard, agentTrends]
      properties:
        frequency: { type: string }
        periods:
          type: array
          items:
            $ref: "#/components/schemas/AcrKpiSnapshot"
        current:
          allOf:
            - $ref: "#/components/schemas/AcrKpiSnapshot"
          nullable: true
        previous:
          allOf:
            - $ref: "#/components/schemas/AcrKpiSnapshot"
          nullable: true
        leaderboard:
          type: array
          items:
            $ref: "#/components/schemas/AcrAgentScore"
        agentTrends:
          type: array
          items:
            $ref: "#/components/schemas/AcrDashboardAgentTrend"

    AcrTarget:
      type: object
