components:
  schemas:
    PermissionCell:
      type: object
      required: [canView, canCreate, canEdit, canDelete]
      properties:
        canView: { type: boolean }
        canCreate: { type: boolean }
        canEdit: { type: boolean }
        canDelete: { type: boolean }

    RoleMatrix:
      type: object
      description: Map of menu key → permission cell. Keys are knowledge, products, flows, analytics, credentials, chats, statuses, settings, channels.
      additionalProperties:
        $ref: "#/components/schemas/PermissionCell"

    PermissionMatrix:
      type: object
      required: [supervisor, agent]
      properties:
        supervisor: { $ref: "#/components/schemas/RoleMatrix" }
        agent: { $ref: "#/components/schemas/RoleMatrix" }

    EffectivePermissions:
      type: object
      required: [teamRole, menus]
      properties:
        teamRole:
          type: string
          enum: [super_admin, supervisor, agent]
        menus: { $ref: "#/components/schemas/RoleMatrix" }

    TeamMemberPermissionSummary:
      type: object
      required: [id, email, teamRole, hasOverrides]
      properties:
        id: { type: integer }
        name: { type: string, nullable: true }
        email: { type: string }
        teamRole:
          type: string
          enum: [super_admin, supervisor, agent]
        hasOverrides:
          type: boolean
          description: True when the user has at least one per-user override row that diverges from the role default.

    UserPermissionDetail:
      type: object
      required: [user, roleDefault, overrides, effective]
      properties:
        user:
          type: object
          required: [id, email, teamRole]
          properties:
            id: { type: integer }
            name: { type: string, nullable: true }
            email: { type: string }
            teamRole:
              type: string
              enum: [super_admin, supervisor, agent]
        roleDefault: { $ref: "#/components/schemas/RoleMatrix" }
        overrides:
          type: object
          description: Stored per-user overrides (subset of menus). Empty when the user inherits the role default verbatim.
          additionalProperties:
            $ref: "#/components/schemas/PermissionCell"
        effective: { $ref: "#/components/schemas/RoleMatrix" }

    UpdateUserPermissionRequest:
      type: object
      required: [overrides]
      properties:
        overrides:
          nullable: true
