openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI WhatsApp Automation Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: whatsapp
    description: WhatsApp connection management
  - name: chats
    description: Chat management
  - name: knowledge
    description: Knowledge base management
  - name: settings
    description: AI settings
  - name: analytics
    description: Analytics and reporting
  - name: products
    description: Product catalog management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /whatsapp/status:
    get:
      operationId: getWhatsappStatus
      tags: [whatsapp]
      summary: Get WhatsApp connection status
      responses:
        "200":
          description: Current WhatsApp connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappStatus"

  /whatsapp/connect:
    post:
      operationId: connectWhatsapp
      tags: [whatsapp]
      summary: Initiate WhatsApp connection and get QR code
      responses:
        "200":
          description: QR code generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappStatus"

  /whatsapp/disconnect:
    post:
      operationId: disconnectWhatsapp
      tags: [whatsapp]
      summary: Disconnect WhatsApp session
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappStatus"

  /chats:
    get:
      operationId: listChats
      tags: [chats]
      summary: List all chats
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [all, needs_human, ai_handled, closed]
          required: false
        - name: tag
          in: query
          schema:
            type: string
            enum: [all, hot_lead, cold, closing]
          required: false
      responses:
        "200":
          description: List of chats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chat"

  /chats/{id}:
    get:
      operationId: getChat
      tags: [chats]
      summary: Get a specific chat with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatWithMessages"
        "404":
          description: Chat not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateChat
      tags: [chats]
      summary: Update chat status or tag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatUpdate"
      responses:
        "200":
          description: Updated chat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"

    delete:
      operationId: deleteChat
      tags: [chats]
      summary: Delete a chat and all its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Chat not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chats/{id}/product:
    post:
      operationId: sendProductToChat
      tags: [chats, products]
      summary: Send a product from the catalog to a chat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendProductBody"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"
        "404":
          description: Chat or product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: WhatsApp not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chats/{id}/reply:
    post:
      operationId: sendManualReply
      tags: [chats]
      summary: Send a manual reply to a chat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualReplyInput"
      responses:
        "200":
          description: Reply sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /chats/{id}/takeover:
    post:
      operationId: takeoverChat
      tags: [chats]
      summary: Toggle human takeover for a chat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TakeoverInput"
      responses:
        "200":
          description: Takeover toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"

  /knowledge:
    get:
      operationId: listKnowledge
      tags: [knowledge]
      summary: List all knowledge base entries
      responses:
        "200":
          description: List of knowledge entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeEntry"

    post:
      operationId: createKnowledge
      tags: [knowledge]
      summary: Add a knowledge base entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeInput"
      responses:
        "201":
          description: Created knowledge entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeEntry"

  /knowledge/{id}:
    put:
      operationId: updateKnowledge
      tags: [knowledge]
      summary: Update a knowledge base entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeUpdate"
      responses:
        "200":
          description: Updated knowledge entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeEntry"

    delete:
      operationId: deleteKnowledge
      tags: [knowledge]
      summary: Delete a knowledge base entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get AI settings
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update AI settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /knowledge/import:
    post:
      operationId: importKnowledge
      tags: [knowledge]
      summary: Import knowledge entries from CSV/XLSX (replaces ALL existing entries)
      description: |
        Uploads a CSV or XLSX file via `multipart/form-data` with form field `file`.
        Required columns (header row, case-insensitive): type, title, content.
        Valid type values: product, faq, script, testimonial, website.
        On success, the entire `knowledge_entries` table is wiped and replaced.
        Note: this endpoint is consumed via plain `fetch` + `FormData` on the
        client; the request body is documented here for contract completeness
        but the typed client hook is not used.
      requestBody:
        required: true
        description: |
          `multipart/form-data` with a single field `file` containing the CSV
          or XLSX upload. Body schema intentionally omitted to keep generated
          clients free of browser-only `File`/`Blob` types; consume this
          endpoint via plain `fetch` + `FormData`.
        content:
          multipart/form-data: {}
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                required: [imported]
                properties:
                  imported:
                    type: integer
        "400":
          description: Invalid file or contents
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "409":
          description: Another import is already in progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /knowledge-types:
    get:
      operationId: listKnowledgeTypes
      tags: [knowledge]
      summary: List available knowledge entry types
      responses:
        "200":
          description: Types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeType"
    post:
      operationId: createKnowledgeType
      tags: [knowledge]
      summary: Create a new knowledge entry type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeTypeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeType"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "409":
          description: Type already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /knowledge-types/{id}:
    delete:
      operationId: deleteKnowledgeType
      tags: [knowledge]
      summary: Delete a knowledge type (only if no entries reference it)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "409":
          description: Conflict — type still in use
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /products/export.csv:
    get:
      operationId: exportProductsCsv
      tags: [products]
      summary: Export full product catalog as CSV
      description: |
        Returns a UTF-8 CSV (with BOM) of all products. Cells starting with
        `=`, `+`, `-`, `@`, tab, or CR are prefixed with `'` to mitigate
        spreadsheet formula injection. Consumed via browser navigation.
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary

  /products/export.xlsx:
    get:
      operationId: exportProductsXlsx
      tags: [products]
      summary: Export full product catalog as XLSX
      description: Returns an Excel .xlsx workbook of all products. Consumed via browser navigation.
      responses:
        "200":
          description: XLSX file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /products/import:
    post:
      operationId: importProducts
      tags: [products]
      summary: Import product catalog from CSV/XLSX (replaces ALL existing rows)
      description: |
        Uploads a CSV or XLSX file via `multipart/form-data` with form field `file`.
        Required headers (case-insensitive): Kode Product, Nama Barang, Harga Pricelist.
        Optional headers: Category, Harga Silver, Harga Gold, Harga Platinum,
        Harga Reseller, Harga Distributor, Foto, Link Website, Link Video.
        Consumed via plain `fetch` + `FormData`.
      requestBody:
        required: true
        content:
          multipart/form-data: {}
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                required: [imported]
                properties:
                  imported:
                    type: integer
                  skipped:
                    type: integer
        "400":
          description: Invalid file or contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Another import is already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "409":
          description: Duplicate code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}:
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /whatsapp/profile/bio:
    get:
      operationId: getWhatsappBio
      tags: [whatsapp]
      summary: Get the connected WhatsApp account's bio (about / status text)
      responses:
        "200":
          description: Current bio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappBio"
    put:
      operationId: updateWhatsappBio
      tags: [whatsapp]
      summary: Update the connected WhatsApp account's bio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WhatsappBioInput"
      responses:
        "200":
          description: Bio updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappBio"

  /statuses:
    get:
      operationId: listStatuses
      tags: [whatsapp]
      summary: List WhatsApp statuses (mine + from contacts, last 24h)
      responses:
        "200":
          description: Status feed grouped by author
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WhatsappStatusAuthor"
    post:
      operationId: postStatus
      tags: [whatsapp]
      summary: Post a text status (story) from the connected account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostStatusInput"
      responses:
        "200":
          description: Status posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappStatus2"

  /statuses/{id}:
    delete:
      operationId: deleteStatus
      tags: [whatsapp]
      summary: Delete one of my statuses (local row only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get analytics summary
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/common-questions:
    get:
      operationId: getCommonQuestions
      tags: [analytics]
      summary: Get most common customer questions
      responses:
        "200":
          description: Common questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommonQuestion"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    WhatsappStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [connected, disconnected, connecting, qr_ready]
        qrCode:
          type: ["string", "null"]
        phoneNumber:
          type: ["string", "null"]
        connectedAt:
          type: ["string", "null"]

    Chat:
      type: object
      required: [id, phoneNumber, contactName, nickname, status, tag, isHumanTakeover, lastMessage, lastMessageAt, pinnedAt, isArchived, isLid, unreadCount, profilePicUrl, createdAt]
      properties:
        id:
          type: integer
        phoneNumber:
          type: string
        contactName:
          type: string
        nickname:
          type: ["string", "null"]
        status:
          type: string
          enum: [ai_handled, needs_human, closed]
        tag:
          type: string
          enum: [none, hot_lead, cold, closing]
        isHumanTakeover:
          type: boolean
        lastMessage:
          type: ["string", "null"]
        lastMessageAt:
          type: ["string", "null"]
        pinnedAt:
          type: ["string", "null"]
        isArchived:
          type: boolean
        isLid:
          type: boolean
        unreadCount:
          type: integer
        profilePicUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    ChatMessage:
      type: object
      required: [id, chatId, direction, content, isAiGenerated, createdAt]
      properties:
        id:
          type: integer
        chatId:
          type: integer
        direction:
          type: string
          enum: [inbound, outbound]
        content:
          type: string
        isAiGenerated:
          type: boolean
        createdAt:
          type: string

    ChatWithMessages:
      type: object
      required: [id, phoneNumber, contactName, nickname, status, tag, isHumanTakeover, lastMessage, lastMessageAt, pinnedAt, isArchived, isLid, unreadCount, profilePicUrl, createdAt, messages]
      properties:
        id:
          type: integer
        phoneNumber:
          type: string
        contactName:
          type: string
        nickname:
          type: ["string", "null"]
        status:
          type: string
          enum: [ai_handled, needs_human, closed]
        tag:
          type: string
          enum: [none, hot_lead, cold, closing]
        isHumanTakeover:
          type: boolean
        lastMessage:
          type: ["string", "null"]
        lastMessageAt:
          type: ["string", "null"]
        pinnedAt:
          type: ["string", "null"]
        isArchived:
          type: boolean
        isLid:
          type: boolean
        unreadCount:
          type: integer
        profilePicUrl:
          type: ["string", "null"]
        createdAt:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"

    ChatUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [ai_handled, needs_human, closed]
        tag:
          type: string
          enum: [none, hot_lead, cold, closing]

    ManualReplyInput:
      type: object
      required: [content]
      properties:
        content:
          type: string

    TakeoverInput:
      type: object
      required: [takeover]
      properties:
        takeover:
          type: boolean

    KnowledgeEntry:
      type: object
      required: [id, type, title, content, createdAt, updatedAt]
      properties:
        id:
          type: integer
        type:
          type: string
        title:
          type: string
        content:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    KnowledgeInput:
      type: object
      required: [type, title, content]
      properties:
        type:
          type: string
        title:
          type: string
        content:
          type: string

    KnowledgeUpdate:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        content:
          type: string

    KnowledgeType:
      type: object
      required: [id, value, label, createdAt]
      properties:
        id:
          type: integer
        value:
          type: string
        label:
          type: string
        createdAt:
          type: string

    KnowledgeTypeInput:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
        label:
          type: string

    Settings:
      type: object
      required: [id, systemPrompt, autoReplyEnabled, replyDelayMin, replyDelayMax, fallbackMessage, updatedAt]
      properties:
        id:
          type: integer
        systemPrompt:
          type: string
        autoReplyEnabled:
          type: boolean
        replyDelayMin:
          type: integer
        replyDelayMax:
          type: integer
        fallbackMessage:
          type: string
        updatedAt:
          type: string

    SettingsUpdate:
      type: object
      properties:
        systemPrompt:
          type: string
        autoReplyEnabled:
          type: boolean
        replyDelayMin:
          type: integer
        replyDelayMax:
          type: integer
        fallbackMessage:
          type: string

    AnalyticsSummary:
      type: object
      required: [totalChats, aiHandled, needsHuman, closed, hotLeads, closingLeads, coldLeads, totalMessages, todayChats, closingRate]
      properties:
        totalChats:
          type: integer
        aiHandled:
          type: integer
        needsHuman:
          type: integer
        closed:
          type: integer
        hotLeads:
          type: integer
        closingLeads:
          type: integer
        coldLeads:
          type: integer
        totalMessages:
          type: integer
        todayChats:
          type: integer
        closingRate:
          type: number

    Product:
      type: object
      required: [id, code, name, category, price, priceSilver, priceGold, pricePlatinum, priceReseller, priceDistributor, imageUrl, flyerUrl, productUrl, videoUrls, createdAt, updatedAt]
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        category:
          type: ["string", "null"]
        price:
          type: integer
          description: "Harga Pricelist — public price shown to customers"
        priceSilver:
          type: ["integer", "null"]
          description: "Internal only — never sent to customers"
        priceGold:
          type: ["integer", "null"]
          description: "Internal only — never sent to customers"
        pricePlatinum:
          type: ["integer", "null"]
          description: "Internal only — never sent to customers"
        priceReseller:
          type: ["integer", "null"]
          description: "Internal only — never sent to customers"
        priceDistributor:
          type: ["integer", "null"]
          description: "Internal only — never sent to customers"
        imageUrl:
          type: ["string", "null"]
        flyerUrl:
          type: ["string", "null"]
          description: "Iframe HTML or URL pointing to a flyer image (e.g. Google Drive preview embed). Sent as the 2nd message in the send-product flow."
        productUrl:
          type: ["string", "null"]
        videoUrls:
          type: array
          items:
            type: string
