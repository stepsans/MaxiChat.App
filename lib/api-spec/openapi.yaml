            $ref: "#/components/schemas/InvoiceLineItem"

    RevenueSummary:
      type: object
      required:
        - mrr
        - arr
        - arpu
        - totalTenants
        - activeTenants
        - trialTenants
        - expiredTenants
        - suspendedTenants
        - payingTenants
        - trend
      properties:
        mrr:
          type: integer
          description: Monthly recurring revenue — sum of latest snapshot total for effective-active owners.
        arr:
          type: integer
          description: Annual recurring revenue (mrr * 12).
        arpu:
          type: integer
          description: Average revenue per paying tenant (mrr / payingTenants).
        totalTenants:
          type: integer
        activeTenants:
          type: integer
        trialTenants:
          type: integer
        expiredTenants:
          type: integer
        suspendedTenants:
          type: integer
        payingTenants:
          type: integer
        trend:
          type: array
          description: Platform-wide daily total, oldest-first.
          items:
            $ref: "#/components/schemas/RevenueTrendPoint"

    RenewSubscriptionInput:
      type: object
      properties:
        status:
          type: string
          enum: [trial, active, expired, suspended]
          description: New stored status. "active" with extendMonths is the "mark paid" action.
        extendMonths:
          type: integer
          minimum: 1
          maximum: 24
          description: Extend the current period end by this many months.
        setUnlimited:
          type: boolean
          description: >-
            Grant infinite validity — forces status "active" and clears the
            period end so the tenant never expires. Takes precedence over
            status/extendMonths.

    AuthMeResponse:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    MobileLoginInput:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          minLength: 1
          description: "One-time code emailed to the user via POST /auth/otp/request (purpose=login)."
        deviceLabel:
          type: ["string", "null"]
          description: "Optional human label for the device (e.g. 'iPhone 15')."
        rememberDevice:
          type: boolean
          description: >-
            When not false (default true), issue a 30-day trusted-device token
            returned as `trustedDeviceToken` so the next login can skip OTP.

    MobileSession:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: "Opaque bearer token. Send as `Authorization: Bearer <token>`."
        user:
          $ref: "#/components/schemas/AuthUser"
        trustedDeviceToken:
          type: ["string", "null"]
          description: >-
            30-day trusted-device token (present when rememberDevice was not
            false). Store in SecureStore and replay as `X-Trusted-Device` on the
            next POST /auth/otp/request to skip OTP.

    RequestOtpInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    VerifyOtpInput:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          minLength: 1
        rememberDevice:
          type: boolean
          description: >-
            When not false (default true), set a 30-day trusted-device cookie
            (mc_td) so the next login on this browser skips OTP.

    RequestOtpResponse:
      type: object
      required: [trusted]
      properties:
        trusted:
          type: boolean
          description: >-
            True when a valid trusted device let the user skip OTP and sign in
            immediately. When true, `user` (and `token` for mobile) is present.
            When false, an OTP was sent and `expiresAt` is present.
        ok:
          type: boolean
        expiresAt:
          type: ["string", "null"]
          format: date-time
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"
        token:
          type: ["string", "null"]
          description: "Mobile bearer token, present only on a mobile trusted-device fast-path."
        trustedDeviceToken:
          type: ["string", "null"]
          description: "Rotated mobile trusted-device token on a fast-path login."

    ResendOtpResponse:
      type: object
      required: [ok, expiresAt]
      properties:
        ok:
          type: boolean
        expiresAt:
          type: string
          format: date-time

    TrustedDevice:
      type: object
      required: [id]
      properties:
        id:
          type: integer
        label:
          type: ["string", "null"]
        lastUsedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    TrustedDeviceList:
      type: object
      required: [devices]
      properties:
