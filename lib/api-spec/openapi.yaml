      type: object
      required: [productIds]
      properties:
        productIds:
          type: array
          items:
            type: integer
          minItems: 1
          maxItems: 200
          description: Ids of the products to include in the quotation, in display order.

    PostStatusInput:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 700
        backgroundColor:
          type: string
          description: Hex color string e.g. "#0f3a4d" — defaults to WA green if omitted.

    FlowNode:
      type: object
      required: [id, type, position, data]
      properties:
        id: { type: string }
        type:
          type: string
          enum: [trigger, message, question, end, ai, products]
        position:
          type: object
          required: [x, y]
          properties:
            x: { type: number }
            y: { type: number }
        data:
          type: object
          properties:
            matchType:
              type: string
              enum: [default, keyword]
            keywords:
              type: array
              items: { type: string }
            text: { type: string }
            imageUrl:
              type: ["string", "null"]
              description: "Message/Question only: optional image URL (http(s) or /api/media/...) sent with the text as caption."
            options:
              type: array
              items:
                type: object
                required: [id, label]
                properties:
                  id: { type: string }
                  label: { type: string }
            strictOptions:
              type: boolean
              description: "Question only: re-ask question on off-option replies instead of handing off to AI."
            strictRetryMessage:
              type: string
              description: "Question only: when strictOptions=true, this message is sent before the question is re-asked. Leave empty to skip."
            aiRephrase:
              type: boolean
              description: "Question only: when true, the question text is rephrased by AI (same meaning, varied natural wording) each time it is sent, so it doesn't feel like a canned bot message. Answer options are never rephrased."
            productIds:
              type: array
              items: { type: integer }
              description: "Products only: list of product IDs to send (image + Nama/Kode/Harga caption)."
            aiInstruction:
              type: string
              description: "AI node only: extra instruction appended to the global AI Studio system prompt while this node's AI handoff is active (during the flow cooldown). Empty = use the global prompt only."
            knowledgeIds:
              type: array
              items: { type: integer }
              description: "AI node only: restrict the AI's knowledge-base reference to these specific knowledge entry IDs while this node's handoff is active. Empty = use all of the owner's knowledge base."
            countInDashboard:
              type: boolean
              description: "Question only: when true, each option pressed on this node is recorded to chatbot_flow_events and counted in the Dashboard 'Menu chatbot ditekan' panel. Default false (opt-in)."

