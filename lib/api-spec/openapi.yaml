            tenant_quota.periodStart (the locked anniversary anchor). Falls back
            to a join-date-derived window only while a tenant is unprovisioned
            (trial / no plan purchased yet).
        periodEnd:
          type: string
          format: date-time
          description: Exclusive end of the current billing period (start of the next), from tenant_quota.periodEnd.
