              schema: { $ref: "#/components/schemas/AcrBenchmark" }
        "400":
          description: Need at least 2 teams
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /acr/jobs/{jobId}/send-coaching:
    post:
      operationId: sendAcrCoaching
      tags: [acr]
      summary: Send AI coaching to each agent via WhatsApp (super admin, manual)
      parameters:
        - name: jobId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Delivery result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AcrSendResult" }
        "403":
          description: Forbidden
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /acr/jobs/{jobId}/send-group-summary:
    post:
      operationId: sendAcrGroupSummary
      tags: [acr]
      summary: Send AI team summary to a WhatsApp number/group (super admin, manual)
      parameters:
        - name: jobId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AcrGroupSummaryInput" }
      responses:
        "200":
          description: Delivery result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AcrSendResult" }
        "400":
          description: Invalid target
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Forbidden
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }


components:
  schemas:
    GroupParticipant:
      type: object
      required: [jid, isAdmin, isSuperAdmin]
      properties:
        jid:
          type: string
        phone:
          type: ["string", "null"]
          description: Digits-only phone parsed from the JID, when it is a real phone number.
        name:
          type: ["string", "null"]
        isAdmin:
          type: boolean
        isSuperAdmin:
          type: boolean
    GroupInfo:
      type: object
      required: [subject, size, participants]
      properties:
        subject:
          type: string
        description:
          type: ["string", "null"]
        ownerJid:
          type: ["string", "null"]
        creationAt:
          type: ["string", "null"]
          description: ISO timestamp of when the group was created, if known.
        size:
          type: integer
        inviteLink:
          type: ["string", "null"]
          description: Shareable https://chat.whatsapp.com/<code> link. Null if the account is not an admin.
        participants:
          type: array
          items:
            $ref: "#/components/schemas/GroupParticipant"
    ChatAttachmentItem:
      type: object
      required: [id, direction, createdAt]
      properties:
        id:
          type: integer
        mediaType:
          type: ["string", "null"]
        mediaUrl:
          type: ["string", "null"]
        mediaMimeType:
          type: ["string", "null"]
        mediaFilename:
          type: ["string", "null"]
        content:
          type: string
        direction:
          type: string
          enum: [inbound, outbound]
        createdAt:
          type: string
        senderName:
          type: ["string", "null"]
    ChatLinkItem:
      type: object
      required: [messageId, url, createdAt]
      properties:
        messageId:
          type: integer
        url:
          type: string
        createdAt:
          type: string
        senderName:
          type: ["string", "null"]
    ChatAttachments:
      type: object
      required: [media, docs, links]
      properties:
        media:
          type: array
          items:
            $ref: "#/components/schemas/ChatAttachmentItem"
        docs:
          type: array
          items:
            $ref: "#/components/schemas/ChatAttachmentItem"
        links:
          type: array
          items:
            $ref: "#/components/schemas/ChatLinkItem"
    StarMessageBody:
      type: object
      required: [starred]
      properties:
        starred:
          type: boolean
    ReactionInput:
      type: object
      required: [emoji]
      properties:
        emoji:
          type: string
          description: Emoji to react with. Empty string clears the operator's reaction.
    PinMessageBody:
      type: object
      required: [pinned]
      properties:
        pinned:
          type: boolean
    ForwardTargetsBody:
      type: object
      required: [targetChatIds]
      properties:
        targetChatIds:
          type: array
          items: { type: integer }
          minItems: 1
    EditMessageTextBody:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          description: New text for the message.
    CommonGroup:
      type: object
      required: [groupJid, subject]
      properties:
        groupJid:
          type: string
        subject:
          type: string
        chatId:
          type: ["integer", "null"]
          description: Our local chat id for this group, when it already exists in MaxiChat.
    CommonGroups:
      type: object
      required: [groups]
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/CommonGroup"
    CreateGroupInput:
      type: object
      required: [subject, phones]
      properties:
        subject:
          type: string
          minLength: 1
        phones:
          type: array
          minItems: 1
          items:
            type: string
          description: Member phone numbers in international format (digits, optional leading +).
    CreateGroupResult:
      type: object
      required: [groupJid, subject]
      properties:
        chatId:
          type: ["integer", "null"]
        groupJid:
          type: string
        subject:
          type: string
    AddParticipantsBody:
      type: object
      required: [phones]
      properties:
        phones:
          type: array
          minItems: 1
          items:
            type: string
    ParticipantAddResult:
      type: object
      required: [phone, status]
      properties:
        phone:
          type: string
        jid:
          type: ["string", "null"]
        status:
          type: string
          description: WhatsApp status code; "200" means added, others indicate failure (e.g. needs invite).
    AddParticipantsResult:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/ParticipantAddResult"
    AiProviderMode:
      type: string
      enum: [replit, byok]
      description: "'replit' uses the managed integration (default); 'byok' uses the tenant's own API key."
    AiProviderName:
      type: string
      enum: [openai, gemini, openrouter]
    AiProviderConfig:
      type: object
      required: [mode, provider, model, baseUrl, hasApiKey, maskedApiKey, updatedAt]
      properties:
        mode: { $ref: "#/components/schemas/AiProviderMode" }
        provider: { $ref: "#/components/schemas/AiProviderName" }
        model:
          type: ["string", "null"]
          description: "Chosen model id, or null to use the provider default."
        baseUrl:
          type: ["string", "null"]
          description: "Optional OpenAI-compatible base URL override."
        hasApiKey:
          type: boolean
          description: "True when an encrypted API key is stored for this tenant."
        maskedApiKey:
          type: ["string", "null"]
          description: "Masked preview of the stored key (e.g. 'sk-...AB12'); never the full key."
        updatedAt:
          type: ["string", "null"]
          format: date-time
    AiProviderInput:
      type: object
      required: [mode]
      properties:
        mode: { $ref: "#/components/schemas/AiProviderMode" }
        provider: { $ref: "#/components/schemas/AiProviderName" }
        model:
          type: string
          maxLength: 200
        baseUrl:
          type: string
          maxLength: 500
        apiKey:
          type: string
          description: "Plaintext API key. Omit to keep the existing stored key."
          maxLength: 500
    AiProviderTestInput:
      type: object
      required: [provider]
      properties:
        provider: { $ref: "#/components/schemas/AiProviderName" }
        model:
          type: string
          maxLength: 200
        baseUrl:
          type: string
          maxLength: 500
        apiKey:
          type: string
          description: "Plaintext API key to test. Omit to test the stored key."
          maxLength: 500
    AiProviderTestResult:
      type: object
      required: [ok, message]
      properties:
        ok: { type: boolean }
        message: { type: string }
    PermissionCell:
      type: object
      required: [canView, canCreate, canEdit, canDelete]
      properties:
        canView: { type: boolean }
        canCreate: { type: boolean }
        canEdit: { type: boolean }
        canDelete: { type: boolean }

    RoleMatrix:
      type: object
      description: Map of menu key → permission cell. Keys are knowledge, products, flows, analytics, credentials, chats, statuses, settings, channels.
      additionalProperties:
        $ref: "#/components/schemas/PermissionCell"

    PermissionMatrix:
      type: object
      required: [supervisor, agent]
      properties:
        supervisor: { $ref: "#/components/schemas/RoleMatrix" }
        agent: { $ref: "#/components/schemas/RoleMatrix" }

    EffectivePermissions:
      type: object
      required: [teamRole, menus]
      properties:
        teamRole:
          type: string
          enum: [super_admin, supervisor, agent]
        menus: { $ref: "#/components/schemas/RoleMatrix" }

    TeamMemberPermissionSummary:
      type: object
      required: [id, email, teamRole, hasOverrides]
      properties:
        id: { type: integer }
        name: { type: string, nullable: true }
        email: { type: string }
        teamRole:
          type: string
          enum: [super_admin, supervisor, agent]
        hasOverrides:
          type: boolean
          description: True when the user has at least one per-user override row that diverges from the role default.

    UserPermissionDetail:
      type: object
      required: [user, roleDefault, overrides, effective]
      properties:
        user:
          type: object
          required: [id, email, teamRole]
          properties:
            id: { type: integer }
            name: { type: string, nullable: true }
            email: { type: string }
            teamRole:
              type: string
              enum: [super_admin, supervisor, agent]
        roleDefault: { $ref: "#/components/schemas/RoleMatrix" }
        overrides:
          type: object
          description: Stored per-user overrides (subset of menus). Empty when the user inherits the role default verbatim.
          additionalProperties:
            $ref: "#/components/schemas/PermissionCell"
        effective: { $ref: "#/components/schemas/RoleMatrix" }

    UpdateUserPermissionRequest:
      type: object
      required: [overrides]
      properties:
        overrides:
          nullable: true
          description: Map of menu key → cell to override. Pass null to clear all overrides and inherit the role default.
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PermissionCell"

    TenantChannelOption:
      type: object
      required: [id, label, kind, status]
      properties:
        id: { type: integer }
        label: { type: string }
        kind: { type: string }
        status: { type: string }

    UserChannelAccessDetail:
      type: object
      required: [user, channels, allowedChannelIds]
      properties:
        user:
          type: object
          required: [id, email, teamRole]
          properties:
            id: { type: integer }
            name: { type: string, nullable: true }
            email: { type: string }
            teamRole:
              type: string
              enum: [super_admin, supervisor, agent]
        channels:
          type: array
          description: All channels in the user's tenant (the universe of options).
          items: { $ref: "#/components/schemas/TenantChannelOption" }
        allowedChannelIds:
          type: array
          description: Subset of channels.id values this user can see chats in.
          items: { type: integer }

    UpdateUserChannelAccessRequest:
      type: object
      required: [channelIds]
      properties:
        channelIds:
          type: array
          description: Channel ids to grant chat access to. Empty array = no chat access.
          items: { type: integer }

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    Pipeline:
      type: object
      description: A named kanban sales pipeline belonging to the tenant.
      required: [id, name, pipelineType, color, isDefault, isArchived, sortOrder, stages, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        pipelineType:
          type: string
          enum: [sales, service, custom]
        color:
          type: string
        isDefault:
          type: boolean
        isArchived:
          type: boolean
        sortOrder:
          type: integer
        stages:
          type: array
          items:
            $ref: "#/components/schemas/SalesStage"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PipelineCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 80
        color:
          type: string
        pipelineType:
          type: string
          enum: [sales, service, custom]

    PipelineUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 80
        color:
          type: string
        isDefault:
          type: boolean
        isArchived:
          type: boolean
        sortOrder:
          type: integer

    SalesStage:
      type: object
      description: A column in the tenant's sales pipeline (kanban board).
      required:
        [id, name, sortOrder, isWon, isLost, color, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        sortOrder:
          type: integer
          description: Ascending display order on the board.
        isWon:
          type: boolean
          description: Terminal "deal won" column.
        isLost:
          type: boolean
          description: Terminal "deal lost" column.
        color:
          type: ["string", "null"]
          description: Optional hex color for the column header.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SalesStageInput:
      type: object
      required: [name, pipelineId]
      properties:
        pipelineId:
          type: integer
          description: The pipeline this stage belongs to.
        name:
          type: string
          minLength: 1
          maxLength: 80
        sortOrder:
          type: integer
          minimum: 0
        isWon:
          type: boolean
        isLost:
          type: boolean
        color:
          type: ["string", "null"]
          maxLength: 20

    SalesStageUpdate:
      type: object
      description: Partial update of a pipeline stage.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        sortOrder:
          type: integer
          minimum: 0
        isWon:
          type: boolean
        isLost:
          type: boolean
        color:
          type: ["string", "null"]
          maxLength: 20

    Opportunity:
      type: object
      description: A sales opportunity (deal) attached to a chat.
      required:
        [
          id,
          assignedUserId,
          chatId,
          channelId,
          contactPhone,
          contactName,
          stageId,
          leadScore,
          intentCategory,
          estimatedValueIdr,
          status,
          waitingStatus,
          productInterest,
          aiNotes,
          lastActivityAt,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          type: integer
        assignedUserId:
          type: ["integer", "null"]
          description: Agent who owns the deal; null = unassigned.
        chatId:
          type: integer
        channelId:
          type: integer
        contactPhone:
          type: string
        contactName:
          type: ["string", "null"]
        stageId:
          type: ["integer", "null"]
        leadScore:
          type: integer
          description: AI lead score 0–100.
        intentCategory:
          type: ["string", "null"]
        estimatedValueIdr:
          type: integer
          format: int64
          description: Estimated deal value in whole Rupiah.
        status:
          type: string
          enum: [open, won, lost]
        waitingStatus:
          type: ["string", "null"]
        productInterest:
          type: array
          items:
            type: string
        pipelineId:
          type: ["integer", "null"]
        intentKey:
          type: ["string", "null"]
        intentType:
          type: ["string", "null"]
        scoreReason:
          type: ["string", "null"]
        recommendation:
          type: ["string", "null"]
        analyzedAt:
          type: ["string", "null"]
          format: date-time
        analyzedMessageIds:
          type: ["array", "null"]
          items:
            type: string
        keyQuotes:
          type: ["array", "null"]
          items:
            type: string
        profilePicUrl:
          type: ["string", "null"]
        channelLabel:
          type: ["string", "null"]
        channelColor:
          type: ["string", "null"]
        stageName:
          type: ["string", "null"]
        pipelineName:
          type: ["string", "null"]
        products:
          type: array
          items:
            type: object
            required: [productName]
            properties:
              productId:
                type: ["integer", "null"]
              productName:
                type: string
        aiNotes:
          type: ["string", "null"]
        lastActivityAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OpportunityInput:
      type: object
      required: [chatId]
      properties:
        chatId:
          type: integer
          description: The chat to attach this opportunity to (must be in the tenant).
        assignedUserId:
          type: ["integer", "null"]
        stageId:
          type: ["integer", "null"]
        contactName:
          type: ["string", "null"]
          maxLength: 120
        leadScore:
          type: integer
          minimum: 0
          maximum: 100
        intentCategory:
          type: ["string", "null"]
          maxLength: 40
        estimatedValueIdr:
          type: integer
          format: int64
          minimum: 0
        status:
          type: string
          enum: [open, won, lost]
        waitingStatus:
          type: ["string", "null"]
          maxLength: 40
        productInterest:
          type: array
          items:
            type: string
            maxLength: 120
        aiNotes:
          type: ["string", "null"]
          maxLength: 4000

    OpportunityUpdate:
      type: object
      description: Partial update of an opportunity.
      properties:
        assignedUserId:
          type: ["integer", "null"]
        stageId:
          type: ["integer", "null"]
        contactName:
          type: ["string", "null"]
          maxLength: 120
        leadScore:
          type: integer
          minimum: 0
          maximum: 100
        intentCategory:
          type: ["string", "null"]
          maxLength: 40
        estimatedValueIdr:
          type: integer
          format: int64
          minimum: 0
        status:
          type: string
          enum: [open, won, lost]
        waitingStatus:
          type: ["string", "null"]
          maxLength: 40
        productInterest:
          type: array
          items:
            type: string
            maxLength: 120
        aiNotes:
          type: ["string", "null"]
          maxLength: 4000

    OpportunityFollowUp:
      type: object
      description: A scheduled follow-up touch for an opportunity.
      required:
        [
          id,
          opportunityId,
          sequence,
          scheduledAt,
          status,
          generatedMessage,
          sentAt,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          type: integer
        opportunityId:
          type: integer
        sequence:
          type: integer
          description: Touch number in the sequence (1–3).
        scheduledAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, sent, cancelled, skipped]
        generatedMessage:
          type: ["string", "null"]
        sentAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OpportunityFollowUpUpdate:
      type: object
      description: >-
        Edit or cancel a pending follow-up. Provide `generatedMessage` to set the
        draft the operator wants sent, and/or `status: cancelled` to drop the
        touch. Only pending follow-ups can be edited or cancelled.
      properties:
        generatedMessage:
          type: ["string", "null"]
          description: The drafted message text to store on the follow-up.
        status:
          type: string
          enum: [cancelled]
          description: Set to `cancelled` to drop this pending touch.

    SalesForecast:
      type: object
      description: >-
        Weighted revenue forecast + win rate scoped to the caller's visibility.
        The weighted forecast multiplies each open deal's estimated value by its
        lead score probability (leadScore/100). All money is whole-integer Rupiah.
      required:
        [
          openCount,
          openValueIdr,
          weightedForecastIdr,
          wonCount,
          lostCount,
          wonValueIdr,
          winRatePct,
          avgDealSizeIdr,
          salesVelocityIdr,
          avgCycleDays,
          byStage,
        ]
      properties:
        openCount:
          type: integer
        openValueIdr:
          type: integer
          format: int64
          description: Sum of estimated value across open opportunities (whole Rupiah).
        weightedForecastIdr:
          type: integer
          format: int64
          description: Sum of (open estimated value × leadScore/100), rounded (whole Rupiah).
        wonCount:
          type: integer
        lostCount:
          type: integer
        wonValueIdr:
          type: integer
          format: int64
          description: Sum of estimated value across won opportunities (whole Rupiah).
        winRatePct:
          type: integer
          description: won / (won + lost) × 100, rounded to a whole percent (0 when none closed).
        avgDealSizeIdr:
          type: integer
          format: int64
          description: Average estimated value per open opportunity (whole Rupiah).
        salesVelocityIdr:
          type: integer
          format: int64
          description: Revenue generated per day in Rupiah (openCount × avgDealSize × winRate%) / avgCycleDays.
        avgCycleDays:
          type: integer
          description: Average days from creation to close across won and lost deals.
        byStage:
          type: array
          description: Per-stage open count, value, and weighted forecast.
          items:
            type: object
            required: [stageId, stageName, count, valueIdr, weightedIdr]
            properties:
              stageId:
                type: ["integer", "null"]
              stageName:
                type: string
              count:
                type: integer
              valueIdr:
                type: integer
                format: int64
              weightedIdr:
                type: integer
                format: int64

    SalesAuditEvent:
      type: object
      description: An append-only AI/sales activity log entry.
      required:
        [id, opportunityId, actorUserId, eventType, detail, createdAt]
      properties:
        id:
          type: integer
        opportunityId:
          type: ["integer", "null"]
        actorUserId:
          type: ["integer", "null"]
          description: Who triggered it; null = AI/system.
        eventType:
          type: string
        detail:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    OpportunityInsight:
      type: object
      description: Aggregate pipeline metrics scoped to the caller's visibility.
      required:
        [totalOpen, totalWon, totalLost, openValueIdr, wonValueIdr, byStage]
      properties:
        totalOpen:
          type: integer
        totalWon:
          type: integer
        totalLost:
          type: integer
        openValueIdr:
          type: integer
          format: int64
          description: Sum of estimated value across open opportunities (whole Rupiah).
        wonValueIdr:
          type: integer
          format: int64
          description: Sum of estimated value across won opportunities (whole Rupiah).
        byStage:
          type: array
          description: Per-stage open counts + value for the board.
          items:
            type: object
            required: [stageId, stageName, count, valueIdr]
            properties:
              stageId:
                type: ["integer", "null"]
              stageName:
                type: string
              count:
                type: integer
              valueIdr:
                type: integer
                format: int64

    SalesInsight:
      type: object
      description: >-
        The latest AI Sales Insight for a chat (one per chat). Surfaced in the
        conversation sidebar; exists even when no opportunity has been created.
        All money is whole-integer Rupiah.
      required:
        [
          id,
          chatId,
          channelId,
          contactPhone,
          leadScore,
          intentCategory,
          estimatedValueIdr,
          productInterest,
          scoreReason,
          aiNotes,
          recommendation,
          waitingStatus,
          analyzedAt,
          opportunityId,
          stageId,
          stageName,
          lastActivityAt,
        ]
      properties:
        id:
          type: integer
        chatId:
          type: integer
        channelId:
          type: integer
        contactPhone:
          type: string
        leadScore:
          type: integer
          description: AI lead score 0–100.
        intentCategory:
          type: ["string", "null"]
        estimatedValueIdr:
          type: integer
          format: int64
          description: Estimated deal value in whole Rupiah.
        productInterest:
          type: array
          items:
            type: string
        scoreReason:
          type: ["string", "null"]
        aiNotes:
          type: ["string", "null"]
        recommendation:
          type: ["string", "null"]
        waitingStatus:
          type: ["string", "null"]
          enum: [waiting_customer, waiting_company, null]
        analyzedAt:
          type: string
          format: date-time
        opportunityId:
          type: ["integer", "null"]
          description: >-
            The id of the opportunity created for this chat, if any. Null until an
            opportunity exists (auto-created or via "Buat Opportunity").
        stageId:
          type: ["integer", "null"]
          description: The opportunity's current pipeline stage id, if any.
        stageName:
          type: ["string", "null"]
          description: The opportunity's current pipeline stage name, if any.
        lastActivityAt:
          type: ["string", "null"]
          format: date-time
          description: The opportunity's last-activity timestamp, if any.

    SalesAssistantSettings:
      type: object
      description: Per-tenant AI Sales Assistant configuration (auto-create + Pipeline Health + Auto Follow-Up).
      required:
        [
          autoCreateEnabled,
          autoCreateThreshold,
          staleDaysThreshold,
          highValueThresholdIdr,
          autoFollowUpEnabled,
          followUpIntervalHours,
        ]
      properties:
        autoCreateEnabled:
          type: boolean
          description: When true, a chat scoring >= autoCreateThreshold auto-creates an opportunity.
        autoCreateThreshold:
          type: integer
          minimum: 0
          maximum: 100
          description: Lead-score threshold (0–100) that triggers auto-create when enabled.
        staleDaysThreshold:
          type: integer
          minimum: 1
          maximum: 365
          description: Days without activity before an open deal counts as stale (Pipeline Health).
        highValueThresholdIdr:
          type: integer
          format: int64
          minimum: 0
          description: >-
            Minimum estimated value (whole Rupiah) for an open stale deal to be
            flagged High Risk. 0 = value never excludes (only staleness matters).
        autoFollowUpEnabled:
          type: boolean
          description: >-
            When true, the engine generates and SENDS sequenced follow-ups
            (max 3) for deals waiting on the customer. When false (default), the
            AI only recommends a follow-up and never sends.
        followUpIntervalHours:
          type: integer
          minimum: 1
          maximum: 8760
          description: >-
            Hours of silence (since the Last Meaningful Interaction) before the
            next follow-up touch is due. Tenant picks 24/48/72/168 or custom.

    SalesAssistantSettingsUpdate:
      type: object
      description: Partial update of the tenant's AI Sales Assistant settings.
      properties:
        autoCreateEnabled:
          type: boolean
        autoCreateThreshold:
          type: integer
          minimum: 0
          maximum: 100
        staleDaysThreshold:
          type: integer
          minimum: 1
          maximum: 365
        highValueThresholdIdr:
          type: integer
          format: int64
          minimum: 0
        autoFollowUpEnabled:
          type: boolean
        followUpIntervalHours:
          type: integer
          minimum: 1
          maximum: 8760

    ReorderStagesInput:
      type: object
      description: New top-to-bottom order of pipeline stage ids for the tenant's board.
      required: [stageIds]
      properties:
        pipelineId:
          type: integer
          description: Scope the reorder to a specific pipeline.
        stageIds:
          type: array
          description: >-
            All of the tenant's pipeline stage ids, in the desired display order.
            sortOrder is reassigned by array index.
          items:
            type: integer

    PipelineHealth:
      type: object
      description: >-
        Pipeline Health snapshot — open opportunities flagged High Risk (high
        value + stale) scoped to the caller. All money is whole-integer Rupiah.
      required: [summary, highRiskIds]
      properties:
        summary:
          type: object
          required:
            [
              highRiskCount,
              highRiskValueIdr,
              staleDaysThreshold,
              highValueThresholdIdr,
            ]
          properties:
            highRiskCount:
              type: integer
            highRiskValueIdr:
              type: integer
              format: int64
              description: Total estimated value of high-risk deals (whole Rupiah).
            staleDaysThreshold:
              type: integer
            highValueThresholdIdr:
              type: integer
              format: int64
        highRiskIds:
          type: array
          description: Ids of the high-risk opportunities (for badging cards on the board).
          items:
            type: integer

    PaymentGatewayConfig:
      type: object
      description: >-
        Masked payment-gateway (Xendit) configuration status. Never includes the
        raw secret key or callback token — only whether each is set, where it
        resolves from, and the last 4 chars of the secret key.
      required:
        - provider
        - isActive
        - secretKeyConfigured
        - callbackTokenConfigured
      properties:
        provider:
          type: string
        isActive:
          type: boolean
        secretKeyConfigured:
          type: boolean
        callbackTokenConfigured:
          type: boolean
        secretKeySource:
          type: ["string", "null"]
          enum: [db, env, null]
        callbackTokenSource:
          type: ["string", "null"]
          enum: [db, env, null]
        secretKeyLast4:
          type: ["string", "null"]
        updatedAt:
          type: ["string", "null"]

    UpdatePaymentConfigInput:
      type: object
      description: >-
        Update the platform Xendit credentials. Provide a non-empty value to
        set/replace a credential; omit it to leave it unchanged. Use the clear*
        flags to remove a stored value (falls back to the env var).
      properties:
        secretKey:
          type: string
        callbackToken:
          type: string
        clearSecretKey:
          type: boolean
        clearCallbackToken:
          type: boolean
        isActive:
          type: boolean

    TaxConfig:
      type: object
      required: [enabled, rateBps, inclusive, label]
      description: >-
        Platform tax (PPN) policy applied to invoices at issue. Defaults are
        inert (enabled=false, rateBps=0) so behavior is unchanged until turned on.
      properties:
        enabled:
          type: boolean
        rateBps:
          type: integer
          description: Tax rate in basis points (1100 = 11%).
        inclusive:
          type: boolean
          description: >-
            true = prices already include tax (decomposed; total unchanged);
            false = tax added on top (monthly_close bills only).
        label:
          type: string
          description: Display label, e.g. "PPN".

    UpdateTaxConfigInput:
      type: object
      description: >-
        Update the platform tax policy. Omitted fields are left unchanged.
      properties:
        enabled:
          type: boolean
        rateBps:
          type: integer
        inclusive:
          type: boolean
        label:
          type: string

    StorageConfig:
      type: object
      required: [enforcementEnabled, gracePercent, warnPercent]
      description: >-
        Platform storage-enforcement policy (FASE C). Defaults are inert
        (enforcementEnabled=false) so uploads are never blocked until turned on.
        Inbound WhatsApp media ingestion is never blocked regardless.
      properties:
        enforcementEnabled:
          type: boolean
          description: When true, user-initiated uploads over the plafon are blocked.
        gracePercent:
          type: integer
          description: Slack above the plafon before blocking (percent; 0 = block at limit).
        warnPercent:
          type: integer
          description: Display-only "near limit" threshold (percent of the plafon).

    UpdateStorageConfigInput:
      type: object
      description: >-
        Update the platform storage policy. Omitted fields are left unchanged.
      properties:
        enforcementEnabled:
          type: boolean
        gracePercent:
          type: integer
        warnPercent:
          type: integer

    OverageRates:
      type: object
      required: [enabled, tokenUnit, tokenUnitPriceIdr, storageGbDayPriceIdr]
      description: >-
        Platform metered-overage pricing (Billing v2). Inert by default
        (enabled=false + zero prices) so monthly-close raises no usage lines
        until the operator turns it on. Whole Rupiah.
      properties:
        enabled:
          type: boolean
        tokenUnit:
          type: integer
          description: AI-token block size charged as one unit (e.g. 100).
        tokenUnitPriceIdr:
          type: integer
          description: Price per token block, whole Rupiah.
        storageGbDayPriceIdr:
          type: integer
          description: Price per GB-day of average daily storage above plafon.

    UpdateOverageRatesInput:
      type: object
      description: Update overage rates. Omitted fields are left unchanged.
      properties:
        enabled:
          type: boolean
        tokenUnit:
          type: integer
        tokenUnitPriceIdr:
          type: integer
        storageGbDayPriceIdr:
          type: integer

    DunningSettings:
      type: object
      required:
        - enabled
        - reminder0Days
        - reminder3Days
        - reminder7Days
        - suspendDays
        - terminateDays
      description: >-
        Platform dunning (overdue-invoice escalation) policy (FASE F). Inert by
        default (enabled=false) so prepaid tenants are never auto-suspended until
        the operator turns it on. Days are counted from an invoice's due date.
      properties:
        enabled:
          type: boolean
        reminder0Days:
          type: integer
        reminder3Days:
          type: integer
        reminder7Days:
          type: integer
        suspendDays:
          type: integer
        terminateDays:
          type: integer

    UpdateDunningSettingsInput:
      type: object
      description: Update dunning settings. Omitted fields are left unchanged.
      properties:
        enabled:
          type: boolean
        reminder0Days:
          type: integer
        reminder3Days:
          type: integer
        reminder7Days:
          type: integer
        suspendDays:
          type: integer
        terminateDays:
          type: integer

    WalletTransaction:
      type: object
      required: [id, deltaIdr, kind, createdAt]
      description: One wallet ledger entry. Positive delta = credit, negative = debit.
      properties:
        id:
          type: integer
        deltaIdr:
          type: integer
        kind:
          type: string
        sourceRef:
          type: ["string", "null"]
        expiresAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    WalletSummary:
      type: object
      required: [balanceIdr, transactions]
      description: The tenant's wallet credit balance plus recent ledger history.
      properties:
        balanceIdr:
          type: integer
          description: Live (non-expired) credit balance in whole Rupiah.
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/WalletTransaction"

    CreditWalletView:
      type: object
      description: Prepaid AI-credit wallet (SPEC BAGIAN 13.2). Credits, NOT Rupiah.
      required:
        [grantBalance, paidBalance, reserved, total, available, spentLast30d, percentRemaining, notice]
      properties:
        grantBalance:
          type: integer
          description: Plan allowance (Ember A), 0 if expired; spent first.
        grantExpiresAt:
          type: string
          nullable: true
        paidBalance:
          type: integer
          description: Purchased top-ups (Ember B); rollover, never reset.
        paidExpiresAt:
          type: string
          nullable: true
        reserved:
          type: integer
          description: Sum of in-flight call holds.
        total:
          type: integer
          description: effective grant + paid.
        available:
          type: integer
          description: total − reserved (spendable).
        spentLast30d:
          type: integer
        estDaysLeft:
          type: integer
          nullable: true
          description: Projected runway days from the 30-day burn (null = unknown).
        percentRemaining:
          type: integer
          description: 0..100 of this period's starting balance.
        notice:
          type: string
          enum: [ok, low, critical, empty]

    CreditUsageEvent:
      type: object
      required: [createdAt, model, totalTokens, creditsCharged]
      properties:
        createdAt:
          type: string
        channelId:
          type: integer
          nullable: true
        engine:
          type: string
          nullable: true
        model:
          type: string
        totalTokens:
          type: integer
        creditsCharged:
          type: integer

    CreditLedgerEntry:
      type: object
      required: [id, delta, bucket, reason, balanceAfter, createdAt]
      properties:
        id:
          type: integer
        delta:
          type: integer
          description: "+ fill, − spend."
        bucket:
          type: string
          enum: [grant, paid]
        reason:
          type: string
          enum: [topup, usage, grant, expire, adjust]
        engine:
          type: string
          nullable: true
        balanceAfter:
          type: integer
        createdAt:
          type: string

    PayInvoiceInput:
      type: object
      description: >-
        Pay an OPEN invoice. Wallet credit is applied first; if it fully covers
        the invoice the payment settles immediately, otherwise a gateway/manual
        checkout is started for the full amount.
      properties:
        successRedirectUrl:
          type: string

    ChangePlanInput:
      type: object
      required: [planId]
      description: >-
        Switch the tenant's plan mid-period with proration. An upgrade raises a
        prorated charge (returned as a checkout to pay); a downgrade applies
        immediately and credits the prorated difference to the wallet.
      properties:
        planId:
          type: integer
        successRedirectUrl:
          type: string

    ChangeQuotaInput:
      type: object
      required: [addonId, quantity]
      description: >-
        Add a prorated add-on top-up mid-period. Raises a prorated charge for the
        remaining days, returned as a checkout to pay.
      properties:
        addonId:
          type: integer
        quantity:
          type: integer
          minimum: 1
          maximum: 1000
        successRedirectUrl:
          type: string

    ProrationResult:
      type: object
      required: [mode]
      description: >-
        Outcome of a plan/quota change. mode="charge" → pay `checkout`;
        mode="credit" → `creditIdr` was added to the wallet and the change is
        already applied; mode="applied" → applied with no money movement.
      properties:
        mode:
          type: string
          enum: [charge, credit, applied]
        creditIdr:
          type: ["integer", "null"]
        invoiceId:
          type: ["integer", "null"]
        checkout:
          oneOf:
            - $ref: "#/components/schemas/CheckoutResult"
            - type: "null"

    FinopsSummary:
      type: object
      required:
        - periodDays
        - totalTenants
        - activeTenants
        - trialTenants
        - pastDueTenants
        - suspendedTenants
        - expiredTenants
        - mrr
        - arr
        - arpu
        - billings
        - recognizedRevenue
        - churnedTenants
        - churnRatePct
      description: >-
        Invoice-grounded financial metrics (FASE H). billings = cash collected
        from paid invoices in the window; recognizedRevenue = revenue earned
        (over-time lines accrue per-day); mrr = run-rate from active plans.
      properties:
        periodDays:
          type: integer
        totalTenants:
          type: integer
        activeTenants:
          type: integer
        trialTenants:
          type: integer
        pastDueTenants:
          type: integer
        suspendedTenants:
          type: integer
        expiredTenants:
          type: integer
        mrr:
          type: integer
        arr:
          type: integer
        arpu:
          type: integer
        billings:
          type: integer
        recognizedRevenue:
          type: integer
        churnedTenants:
          type: integer
        churnRatePct:
          type: number

    WhatsappStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [connected, disconnected, connecting, qr_ready, syncing]
        qrCode:
          type: ["string", "null"]
        phoneNumber:
          type: ["string", "null"]
        connectedAt:
          type: ["string", "null"]

    Chat:
      type: object
      required: [id, channelId, phoneNumber, contactName, nickname, status, tag, isHumanTakeover, lastMessage, lastMessageAt, pinnedAt, isArchived, isLid, unreadCount, profilePicUrl, createdAt, assignedUserId, labels]
      properties:
        id:
          type: integer
        channelId:
          type: ["integer", "null"]
          description: "Owning channel id. Nullable only during the channel-id backfill transition; new chats always have one. Use this to render the channel badge in the 'All channels' aggregate view."
        phoneNumber:
          type: string
        contactName:
          type: string
        nickname:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
          description: Free-text company/organisation the contact belongs to.
        customerCode:
          type: ["string", "null"]
          description: Customer code (kode customer), entered manually in the chat Info tab.
        labels:
          type: array
          items:
            $ref: "#/components/schemas/CustomerLabel"
          description: Customer labels currently attached to this chat.
        status:
          type: string
          enum: [ai_handled, needs_human, closed]
        tag:
          type: string
          enum: [none, hot_lead, cold, closing]
        leadStatus:
          type: string
          enum: [unknown, lead, not_lead]
          description: Manual lead classification, independent of the auto-routing tag. Drives the lead marker/filter in the chat list.
        isHumanTakeover:
          type: boolean
        lastMessage:
          type: ["string", "null"]
        lastMessageAt:
          type: ["string", "null"]
        pinnedAt:
          type: ["string", "null"]
        isArchived:
          type: boolean
        isLid:
          type: boolean
        unreadCount:
          type: integer
        profilePicUrl:
          type: ["string", "null"]
        mutedUntil:
          type: ["string", "null"]
          description: ISO timestamp until which notifications are muted; null = not muted.
        isBlocked:
          type: boolean
          description: Whether the contact is currently blocked on WhatsApp.
        createdAt:
          type: string
        assignedUserId:
          type: ["integer", "null"]

    ChatMessage:
      type: object
      required: [id, chatId, direction, content, isAiGenerated, createdAt]
      properties:
        id:
          type: integer
        chatId:
          type: integer
        direction:
          type: string
          enum: [inbound, outbound]
        content:
          type: string
        isAiGenerated:
          type: boolean
        status:
          type: ["string", "null"]
          enum: [sent, delivered, read, null]
          description: Outbound delivery/read state mirroring WhatsApp's ticks ("sent"=single, "delivered"=double grey, "read"=double blue). Null for inbound messages and outbound messages whose status hasn't been observed yet (treated as "sent" by the UI).
        createdAt:
          type: string
        senderName:
          type: ["string", "null"]
          description: pushName of the participant who sent this message; only populated for inbound group messages.
        senderPhoneDigits:
          type: ["string", "null"]
          description: Digits portion of the sender JID (real phone or LID). Used to dedupe per-sender headers and to resolve @mentions.
        mentionedPhoneDigits:
          type: array
          items:
            type: string
          description: Digits of every JID mentioned in this message body, in the order they appear. Empty/omitted when no mentions.
        isStarred:
          type: boolean
          description: MaxiChat-internal star flag (not synced from the phone).
        isForwarded:
          type: boolean
          description: Whether this message was forwarded (inbound detected from the channel, or outbound forwarded via MaxiChat).
        forwardingScore:
          type: integer
          description: WhatsApp forward count. >=1 shows "Diteruskan", >=4 shows "Diteruskan berkali-kali". Telegram forwards are 0.
        quotedMessageId:
          type: ["integer", "null"]
          description: Our local chat_messages id this message replies to, when the quoted message exists in MaxiChat (lets the UI scroll to it).
        quotedContent:
          type: ["string", "null"]
          description: Snapshot of the quoted message's text/preview, rendered in the grey reply bar.
        quotedSender:
          type: ["string", "null"]
          description: Display name of who was quoted (sender of the replied-to message).
        reactions:
          type: array
          items:
            $ref: "#/components/schemas/MessageReaction"
          description: Emoji reactions on this message. Empty/omitted when none.
        pinnedAt:
          type: ["string", "null"]
          description: When this message was pinned (MaxiChat-internal). Null when not pinned.
        editedAt:
          type: ["string", "null"]
          description: When this message's text was last edited via MaxiChat. Null when never edited.

    MessageReaction:
      type: object
      required: [emoji]
      properties:
        emoji:
          type: string
        fromMe:
          type: boolean
          description: True when the reaction is the operator's own (sent from MaxiChat / the connected account).
        senderName:
          type: ["string", "null"]
        senderPhoneDigits:
          type: ["string", "null"]

    LinkPreview:
      type: object
      required: [url]
      properties:
        url:
          type: string
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        image:
          type: ["string", "null"]
        siteName:
          type: ["string", "null"]

    ChatWithMessages:
      type: object
      required: [id, channelId, phoneNumber, contactName, nickname, status, tag, isHumanTakeover, lastMessage, lastMessageAt, pinnedAt, isArchived, isLid, unreadCount, profilePicUrl, createdAt, assignedUserId, labels, messages]
      properties:
        id:
          type: integer
        channelId:
          type: integer
          description: The channel this chat belongs to. Used to scope channel-restricted resources (e.g. shortcuts) to the active chat.
        phoneNumber:
          type: string
        contactName:
          type: string
        nickname:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
          description: Free-text company/organisation the contact belongs to.
        customerCode:
          type: ["string", "null"]
          description: Customer code (kode customer), entered manually in the chat Info tab.
        labels:
          type: array
          items:
            $ref: "#/components/schemas/CustomerLabel"
          description: Customer labels currently attached to this chat.
        status:
          type: string
          enum: [ai_handled, needs_human, closed]
        tag:
          type: string
          enum: [none, hot_lead, cold, closing]
        leadStatus:
          type: string
          enum: [unknown, lead, not_lead]
          description: Manual lead classification, independent of the auto-routing tag. Drives the lead marker/filter in the chat list.
        isHumanTakeover:
          type: boolean
        lastMessage:
          type: ["string", "null"]
        lastMessageAt:
          type: ["string", "null"]
        pinnedAt:
          type: ["string", "null"]
        isArchived:
          type: boolean
        isLid:
          type: boolean
        unreadCount:
          type: integer
        profilePicUrl:
          type: ["string", "null"]
        mutedUntil:
          type: ["string", "null"]
          description: ISO timestamp until which notifications are muted; null = not muted.
        isBlocked:
          type: boolean
          description: Whether the contact is currently blocked on WhatsApp.
        presence:
          type: ["object", "null"]
          description: >
            Best-effort live presence from WhatsApp, populated after the chat is
            opened (the server subscribes on first fetch and reads it on the next
            poll). Null when unknown / not yet received.
          properties:
            status:
              type: string
              enum: [available, unavailable, composing, recording]
            lastSeen:
              type: ["integer", "null"]
              description: Unix epoch seconds of the contact's last-seen, when shared.
        createdAt:
          type: string
        assignedUserId:
          type: ["integer", "null"]
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        hasMoreMessages:
          type: boolean
          description: >
            True when older messages exist beyond the returned window. The
            conversation loads only the most recent page; pass the oldest
            returned message id as `before` to fetch the previous page.

    ChatHistoryPage:
      type: object
      required: [messages, hasMore]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
          description: Older messages, ordered oldest-first.
        hasMore:
          type: boolean
          description: True when still older messages exist before this page.

    OpenChatByPhoneInput:
      type: object
      required: [phoneNumber]
      properties:
        phoneNumber:
          type: string
          description: Raw phone number as typed by the user (digits, +, spaces, dashes are all accepted; server normalises).
        contactName:
          type: string
          description: Optional display name to use if a new chat is created.

    OpenChatByPhoneResult:
      type: object
      required: [chatId, created, phoneNumber]
      properties:
        chatId:
          type: integer
        created:
          type: boolean
          description: True if a new chat row was inserted, false if an existing chat was returned.
        phoneNumber:
          type: string
          description: The normalised phone number that was used to look up / create the chat (E.164-ish, with leading +).

    ChatContentSearchResult:
      type: object
      required: [chatIds]
      properties:
        chatIds:
          type: array
          items:
            type: integer
          description: Ids of chats that have at least one message matching the query.

    ChatUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [ai_handled, needs_human, closed]
        tag:
          type: string
          enum: [none, hot_lead, cold, closing]
        leadStatus:
          type: string
          enum: [unknown, lead, not_lead]
          description: Manual lead classification, independent of the auto-routing tag.
        nickname:
          type: ["string", "null"]
          description: Editable display name for the contact (overrides contactName in the header).
        company:
          type: ["string", "null"]
          description: Free-text company/organisation the contact belongs to.
        customerCode:
          type: ["string", "null"]
          description: Customer code (kode customer), entered manually in the chat Info tab.
        leadStatusReason:
          type: ["string", "null"]
          description: Short rationale for a manual leadStatus change; recorded as a training signal so the AI Pipeline learns this tenant's lead/not-lead definition.
        leadStatusReasonCode:
          type: ["string", "null"]
          description: Optional coarse category for the leadStatus change (e.g. wrong_role, just_asking, serious_buyer).

    MuteChatInput:
      type: object
      required: [mutedUntil]
      properties:
        mutedUntil:
          type: ["string", "null"]
          format: date-time
          description: ISO timestamp until which the chat is muted; null to unmute.

    BlockChatInput:
      type: object
      required: [blocked]
      properties:
        blocked:
          type: boolean
          description: True to block the contact on WhatsApp, false to unblock.

    SendLocationInput:
      type: object
