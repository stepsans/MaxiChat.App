    BulkChatUpdateInput:
      type: object
      required: [chatIds]
      properties:
        chatIds:
          type: array
          items:
            type: integer
          minItems: 1
          maxItems: 500
          description: Ids of the chats to update. Out-of-scope ids are skipped.
        leadStatus:
          type: string
          enum: [unknown, lead, not_lead]
          description: Manual lead classification to apply to all selected chats.
        tag:
          type: string
          enum: [none, hot_lead, cold, closing]
          description: Auto-routing tag to apply to all selected chats.
        status:
          type: string
          enum: [ai_handled, needs_human, closed]
        addLabelId:
          type: integer
          description: Id of a customer label to attach to every selected chat's contact, on top of existing labels. Labels are contact-level, so the label follows the phone number across channels. Ids not owned by the caller are rejected.
        leadStatusReason:
          type: ["string", "null"]
          description: Short rationale applied to every leadStatus change in this bulk action; recorded as a learning signal for the AI Pipeline.

    BulkChatUpdateResult:
      type: object
      required: [updated]
      properties:
        updated:
          type: integer
          description: Number of chats actually updated (in-scope rows only).

