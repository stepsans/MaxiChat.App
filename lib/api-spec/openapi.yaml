      type: object
      required: [subscription, usage, pricing, breakdown, unlimited, planLabel]
      properties:
        subscription:
          $ref: "#/components/schemas/SubscriptionInfo"
        usage:
          $ref: "#/components/schemas/BillingUsage"
        pricing:
          $ref: "#/components/schemas/PricingConfig"
        breakdown:
          $ref: "#/components/schemas/BillBreakdown"
        unlimited:
          type: boolean
          description: >-
            True for an Owner Infinity account (unlimited everything, never
            read-only, never billed). The client renders the plan label and
            suppresses the metered-charge breakdown, expiry and upsell.
        planLabel:
          type: ["string", "null"]
          description: >-
            Display name of the tenant's plan when special-cased (e.g. "Owner
            Infinity"); null for ordinary metered tenants.

    AdminTenantBilling:
      type: object
      required: [userId, email, status, storageLimit, usage, breakdown]
      properties:
        userId:
          type: integer
        email:
          type: string
          format: email
        name:
          type: ["string", "null"]
        status:
          type: string
          enum: [trial, active, expired, suspended]
        currentPeriodEnd:
          type: ["string", "null"]
          format: date-time
        storageLimit:
          type: integer
          format: int64
          description: Object Storage plafon in bytes (plan baseline + add-on top-ups).
        usage:
          $ref: "#/components/schemas/BillingUsage"
        breakdown:
          $ref: "#/components/schemas/BillBreakdown"

    RevenueTrendPoint:
      type: object
      required:
        [date, totalCharge, dbCharge, userCharge, channelCharge, aiCharge]
      properties:
        date:
          type: string
          description: Day in YYYY-MM-DD.
        totalCharge:
          type: integer
        dbCharge:
          type: integer
        userCharge:
          type: integer
        channelCharge:
          type: integer
        aiCharge:
          type: integer

    OwnerTrend:
      type: object
      required: [trend]
      properties:
        trend:
          type: array
          description: The caller tenant's daily spend, oldest-first.
          items:
            $ref: "#/components/schemas/RevenueTrendPoint"

    BillingCatalog:
      type: object
      required: [plans, addons]
      properties:
        plans:
          type: array
          description: Active plans, ordered by sortOrder.
          items:
            $ref: "#/components/schemas/Plan"
        addons:
          type: array
          description: Active add-ons / top-ups, ordered by sortOrder.
          items:
            $ref: "#/components/schemas/Addon"

    TenantQuotaInfo:
      type: object
      required:
        [
          planId,
          planKey,
          planName,
          tokenLimit,
          channelLimit,
          userLimit,
          storageLimit,
          periodStart,
          periodEnd,
          usage,
          unlimited,
        ]
      properties:
        planId:
          type: ["integer", "null"]
          description: Currently active plan id (null if none purchased yet).
        planKey:
          type: ["string", "null"]
        planName:
          type: ["string", "null"]
        tokenLimit:
          type: integer
          description: AI-token plafon for the period (plan baseline + add-on top-ups).
        channelLimit:
          type: integer
        userLimit:
          type: integer
        storageLimit:
          type: integer
          format: int64
          description: Object Storage plafon in bytes (plan baseline + add-on top-ups).
        periodStart:
          type: ["string", "null"]
          format: date-time
        periodEnd:
          type: ["string", "null"]
          format: date-time
        usage:
          $ref: "#/components/schemas/BillingUsage"
        unlimited:
          type: boolean
          description: >-
            True for an Owner Infinity account: every limit is unlimited. The
            client renders ∞ and skips progress bars / near-limit warnings.

    RetentionInput:
      type: object
      description: >-
        Retention periods in days. null = unlimited (keep forever). Omitted
        fields are treated as null.
      properties:
        chatDays:
          type: ["integer", "null"]
          minimum: 1
        mediaDays:
          type: ["integer", "null"]
          minimum: 1
        logDays:
          type: ["integer", "null"]
          minimum: 1
        analyticsDays:
          type: ["integer", "null"]
          minimum: 1

    RetentionInfo:
      type: object
      required: [chatDays, mediaDays, logDays, analyticsDays, planLimitDays]
      properties:
        chatDays:
          type: ["integer", "null"]
          description: Max age (days) for chat messages; null = unlimited.
        mediaDays:
          type: ["integer", "null"]
          description: Max age (days) for stored media; null = unlimited.
        logDays:
          type: ["integer", "null"]
          description: Max age (days) for AI usage logs; null = unlimited.
        analyticsDays:
          type: ["integer", "null"]
          description: Max age (days) for usage/analytics snapshots; null = unlimited.
        planLimitDays:
          type: ["integer", "null"]
          description: Plan-imposed cap on selectable retention (days); null = no cap.

    CheckoutItem:
      type: object
      required: [kind, refId]
      properties:
        kind:
          type: string
          enum: [plan, addon]
          description: Whether the line is a plan or an add-on top-up.
        refId:
          type: integer
          description: plans.id when kind=plan, addons.id when kind=addon.
        quantity:
          type: integer
          minimum: 1
          maximum: 1000
          description: Units to buy (add-ons only; plans are always 1). Default 1.

    CheckoutInput:
      type: object
      required: [items]
      description: >-
        A cart checkout. The cart may contain at most ONE plan (quantity 1) plus
        any number of add-on lines. The server computes the total from the
        catalog and creates a single payment / invoice for the whole cart.
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CheckoutItem"
        successRedirectUrl:
          type: string
          description: >-
            Absolute URL to return the tenant to after a successful payment.
            Must be on an allowed app host; ignored otherwise.

    CheckoutResult:
      type: object
      required: [paymentId, mode, amountIdr]
      description: >-
        Checkout outcome. Branch on `mode`: "xendit" returns an invoiceUrl to
        redirect to; "manual" returns the bank-transfer details and a payment
        code the customer references on transfer (the order stays pending until
        the operator confirms it).
      properties:
        paymentId:
          type: integer
        mode:
          type: string
          enum: [xendit, manual]
        amountIdr:
          type: integer
          description: Charged amount in whole Rupiah (computed server-side).
        invoiceUrl:
          type: ["string", "null"]
          description: Hosted Xendit checkout page to redirect to (xendit mode only).
        externalId:
          type: ["string", "null"]
          description: Xendit invoice id (xendit) or the payment code (manual).
        code:
          type: ["string", "null"]
          description: Manual payment code the customer cites on transfer (manual mode).
        bankName:
          type: ["string", "null"]
        bankAccountNumber:
          type: ["string", "null"]
        bankAccountHolder:
          type: ["string", "null"]
        manualInstructions:
          type: ["string", "null"]
          description: Optional extra instructions shown on the manual transfer panel.

    PaymentMethodSettings:
      type: object
      description: >-
        Active payment provider plus the manual bank-transfer + verification
        Google Sheet configuration. Bank details are not secret (shown to
        customers). Admin-only.
      required:
        - activeProvider
        - manualBankConfigured
        - verificationConfigured
      properties:
        activeProvider:
          type: string
          enum: [xendit, manual]
        bankName:
          type: ["string", "null"]
        bankAccountNumber:
          type: ["string", "null"]
        bankAccountHolder:
          type: ["string", "null"]
        manualInstructions:
          type: ["string", "null"]
        verificationCredentialId:
          type: ["integer", "null"]
        verificationSpreadsheetId:
          type: ["string", "null"]
        verificationSpreadsheetName:
          type: ["string", "null"]
        verificationSheetTab:
          type: ["string", "null"]
        manualBankConfigured:
          type: boolean
        verificationConfigured:
          type: boolean
        lastPolledAt:
          type: ["string", "null"]
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time

    UpdatePaymentMethodInput:
      type: object
      description: >-
        Update the active provider and/or manual config. Omit a field to leave
        it unchanged; send null or an empty string to clear it.
      properties:
        activeProvider:
          type: string
          enum: [xendit, manual]
        bankName:
          type: ["string", "null"]
        bankAccountNumber:
          type: ["string", "null"]
        bankAccountHolder:
          type: ["string", "null"]
        manualInstructions:
          type: ["string", "null"]
        verificationCredentialId:
          type: ["integer", "null"]
        verificationSpreadsheetId:
          type: ["string", "null"]
        verificationSpreadsheetName:
          type: ["string", "null"]
        verificationSheetTab:
          type: ["string", "null"]

    TenantPaymentMethod:
      type: object
      description: >-
        The active payment method as the tenant checkout UI needs it. For manual
        mode the operator's bank account is included; no secrets are ever
        returned.
      required: [activeProvider]
      properties:
        activeProvider:
          type: string
          enum: [xendit, manual]
        bankName:
          type: ["string", "null"]
        bankAccountNumber:
          type: ["string", "null"]
        bankAccountHolder:
          type: ["string", "null"]
        manualInstructions:
          type: ["string", "null"]

    PaymentRecord:
      type: object
      required:
        [
          id,
          kind,
          refId,
          quantity,
          amountIdr,
          status,
          provider,
          externalId,
          invoiceUrl,
          paidAt,
          createdAt,
        ]
      properties:
        id:
          type: integer
        kind:
          type: string
          enum: [plan, addon, renewal, cart]
        refId:
          type: ["integer", "null"]
        quantity:
          type: integer
        amountIdr:
          type: integer
        status:
          type: string
          enum: [pending, paid, expired, failed]
        provider:
          type: string
        externalId:
          type: ["string", "null"]
        invoiceUrl:
          type: ["string", "null"]
        lineItems:
          type: ["array", "null"]
          description: Cart line items (kind="cart"); null for legacy single-item rows.
          items:
            $ref: "#/components/schemas/PaymentLineItem"
        paidAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    PaymentLineItem:
      type: object
      required: [kind, refId, quantity, name, unitPriceIdr, lineAmountIdr]
      properties:
        kind:
          type: string
          enum: [plan, addon]
        refId:
          type: integer
        quantity:
          type: integer
        name:
          type: string
        unitPriceIdr:
          type: integer
        lineAmountIdr:
          type: integer

    RevenueSummary:
      type: object
      required:
        - mrr
        - arr
        - arpu
        - totalTenants
        - activeTenants
        - trialTenants
        - expiredTenants
        - suspendedTenants
        - payingTenants
        - trend
      properties:
        mrr:
          type: integer
          description: Monthly recurring revenue — sum of latest snapshot total for effective-active owners.
        arr:
          type: integer
          description: Annual recurring revenue (mrr * 12).
        arpu:
          type: integer
          description: Average revenue per paying tenant (mrr / payingTenants).
        totalTenants:
          type: integer
        activeTenants:
          type: integer
        trialTenants:
          type: integer
        expiredTenants:
          type: integer
        suspendedTenants:
          type: integer
        payingTenants:
          type: integer
        trend:
          type: array
          description: Platform-wide daily total, oldest-first.
          items:
            $ref: "#/components/schemas/RevenueTrendPoint"

    RenewSubscriptionInput:
      type: object
      properties:
        status:
          type: string
          enum: [trial, active, expired, suspended]
          description: New stored status. "active" with extendMonths is the "mark paid" action.
        extendMonths:
          type: integer
          minimum: 1
          maximum: 24
          description: Extend the current period end by this many months.
        setUnlimited:
          type: boolean
          description: >-
            Grant infinite validity — forces status "active" and clears the
            period end so the tenant never expires. Takes precedence over
            status/extendMonths.

    AuthMeResponse:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    MobileLoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        deviceLabel:
          type: ["string", "null"]
          description: "Optional human label for the device (e.g. 'iPhone 15')."

    MobileSession:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: "Opaque bearer token. Send as `Authorization: Bearer <token>`."
        user:
          $ref: "#/components/schemas/AuthUser"

    PushRegisterInput:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: "Expo push token, e.g. ExponentPushToken[...]."
        platform:
          type: ["string", "null"]
          enum: [ios, android, web, null]

    PushUnregisterInput:
      type: object
      required: [token]
      properties:
        token:
          type: string

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    TextShortcut:
      type: object
      required: [id, shortcut, replacement, link, channelIds]
      properties:
        id:
          type: integer
        shortcut:
          type: string
        replacement:
          type: string
        link:
          type: string
          nullable: true
          description: "Optional image URL. When set, sending the shortcut delivers the image as a photo with `replacement` as caption."
        channelIds:
          type: array
          items:
            type: integer
          description: "Channels this shortcut is scoped to. Empty array = global."

    TextShortcutInput:
      type: object
      required: [shortcut, replacement]
      properties:
        shortcut:
          type: string
          minLength: 1
          maxLength: 64
          description: Trigger token, e.g. "/almt". Matched case-insensitively.
        replacement:
          type: string
          minLength: 1
          maxLength: 4000
        link:
          type: string
          nullable: true
          maxLength: 2000
          description: "Optional image URL. When set, the shortcut is sent as a photo with `replacement` as caption."
        channelIds:
          type: array
          items:
            type: integer
          description: "Optional channel scope. Omit / [] for global; pass channel ids to restrict."

    SendShortcutBody:
      type: object
      required: [shortcutId]
      properties:
        shortcutId:
          type: integer
          description: Id of the text shortcut to send to the chat.

    SendQuotationBody:
      type: object
      required: [productIds]
      properties:
        productIds:
          type: array
          items:
            type: integer
          minItems: 1
          maxItems: 200
          description: Ids of the products to include in the quotation, in display order.

    PostStatusInput:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 700
        backgroundColor:
          type: string
          description: Hex color string e.g. "#0f3a4d" — defaults to WA green if omitted.

    FlowNode:
      type: object
      required: [id, type, position, data]
      properties:
        id: { type: string }
        type:
          type: string
          enum: [trigger, message, question, end, ai, products]
        position:
          type: object
          required: [x, y]
          properties:
            x: { type: number }
            y: { type: number }
        data:
          type: object
          properties:
            matchType:
              type: string
              enum: [default, keyword]
            keywords:
              type: array
              items: { type: string }
            text: { type: string }
            imageUrl:
              type: ["string", "null"]
              description: "Message/Question only: optional image URL (http(s) or /api/media/...) sent with the text as caption."
            options:
              type: array
              items:
                type: object
                required: [id, label]
                properties:
                  id: { type: string }
                  label: { type: string }
            strictOptions:
              type: boolean
              description: "Question only: re-ask question on off-option replies instead of handing off to AI."
            strictRetryMessage:
              type: string
              description: "Question only: when strictOptions=true, this message is sent before the question is re-asked. Leave empty to skip."
            aiRephrase:
              type: boolean
              description: "Question only: when true, the question text is rephrased by AI (same meaning, varied natural wording) each time it is sent, so it doesn't feel like a canned bot message. Answer options are never rephrased."
            productIds:
              type: array
              items: { type: integer }
              description: "Products only: list of product IDs to send (image + Nama/Kode/Harga caption)."
            aiInstruction:
              type: string
              description: "AI node only: extra instruction appended to the global AI Studio system prompt while this node's AI handoff is active (during the flow cooldown). Empty = use the global prompt only."
            knowledgeIds:
              type: array
              items: { type: integer }
              description: "AI node only: restrict the AI's knowledge-base reference to these specific knowledge entry IDs while this node's handoff is active. Empty = use all of the owner's knowledge base."

    FlowEdge:
      type: object
      required: [id, source, target]
      properties:
        id: { type: string }
        source: { type: string }
        target: { type: string }
        sourceHandle:
          type: ["string", "null"]

    FlowGraph:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items: { $ref: "#/components/schemas/FlowNode" }
        edges:
          type: array
          items: { $ref: "#/components/schemas/FlowEdge" }

    Credential:
      type: object
      required: [id, name, type, clientId, scopes, status, createdAt, updatedAt]
      properties:
        id: { type: integer }
        name: { type: string }
        type: { type: string, enum: [googleSheetsOAuth2Api, googleSheetsTriggerOAuth2Api, googleDriveOAuth2Api, googleContactsApi] }
        clientId: { type: string }
        scopes: { type: array, items: { type: string } }
        accountEmail: { type: string, nullable: true }
        status: { type: string, enum: [disconnected, connected, error] }
        tokenExpiresAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ContactsStatus:
      type: object
      required: [count]
      properties:
        count: { type: integer }

    CredentialCreateInput:
      type: object
      required: [name, type, clientId, clientSecret]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        type: { type: string, enum: [googleSheetsOAuth2Api, googleSheetsTriggerOAuth2Api, googleDriveOAuth2Api, googleContactsApi] }
        clientId: { type: string, minLength: 1 }
        clientSecret: { type: string, minLength: 1 }

    CredentialUpdateInput:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        clientId: { type: string, minLength: 1 }
        clientSecret: { type: string, minLength: 1 }

    CreateSpreadsheetInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }

    SpreadsheetRef:
      type: object
      required: [id, name]
      properties:
        id: { type: string }
        name: { type: string }
        url: { type: string, nullable: true }
        modifiedTime: { type: string, format: date-time, nullable: true }

    DriveFolderRef:
      type: object
      required: [id, name]
      properties:
        id: { type: string }
        name: { type: string }

    AiReviewGroup:
      type: object
      required: [channelId, channelName, groupJid]
      properties:
        channelId: { type: integer }
        channelName: { type: string }
        groupJid: { type: string }
        name: { type: string, nullable: true }
        lastMessageAt: { type: string, format: date-time, nullable: true }

    AiReviewColumn:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        hint: { type: string, maxLength: 300 }

    AiReviewConfig:
      type: object
      required:
        [id, channelId, groupJid, groupName, sheetCredentialId, spreadsheetId,
         sheetTab, columns, scheduleTime, timezone, enabled, lastRunStatus,
         lastRunCount, updatedAt]
      properties:
