openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI WhatsApp Automation Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: whatsapp
    description: WhatsApp connection management
  - name: chats
    description: Chat management
  - name: knowledge
    description: Knowledge base management
  - name: settings
    description: AI settings
  - name: analytics
    description: Analytics and reporting
  - name: products
    description: Product catalog management
  - name: auth
    description: Session authentication
  - name: admin
    description: Super admin user management
  - name: flows
    description: Chatbot flow builder
  - name: permissions
    description: Per-team-role menu permission matrix
paths:
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Sign out current session
      responses:
        "200":
          description: Signed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the currently signed in user
      responses:
        "200":
          description: Current user (null if not signed in)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Self-register a new account (email verification required before sign-in)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupInput"
      responses:
        "201":
          description: Account created; verification email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Consume a verification token and activate the account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailInput"
      responses:
        "200":
          description: Email verified; account active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailVerificationResult"
        "400":
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/resend-verification:
    post:
      operationId: resendVerification
      tags: [auth]
      summary: Re-send the email verification link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationInput"
      responses:
        "200":
          description: Sent (or silently no-op if email is unknown / already verified)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResendVerificationResult"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}:
    patch:
      operationId: adminUpdateUser
      tags: [admin]
      summary: Update a user's status or role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin or attempting to demote last admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteUser
      tags: [admin]
      summary: Delete a user permanently (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Cannot delete yourself or last admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /whatsapp/status:
    get:
      operationId: getWhatsappStatus
      tags: [whatsapp]
      summary: Get WhatsApp connection status
      responses:
        "200":
          description: Current WhatsApp connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappStatus"

  /whatsapp/connect:
    post:
      operationId: connectWhatsapp
      tags: [whatsapp]
      summary: Initiate WhatsApp connection and get QR code
      responses:
        "200":
          description: QR code generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappStatus"

  /whatsapp/disconnect:
    post:
      operationId: disconnectWhatsapp
      tags: [whatsapp]
      summary: Disconnect WhatsApp session
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappStatus"

  /chats:
    get:
      operationId: listChats
      tags: [chats]
      summary: List all chats
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [all, needs_human, ai_handled, closed]
          required: false
        - name: tag
          in: query
          schema:
            type: string
            enum: [all, hot_lead, cold, closing]
          required: false
      responses:
        "200":
          description: List of chats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chat"

  /chats/open-by-phone:
    post:
      operationId: openChatByPhone
      tags: [chats]
      summary: Open (or create) a chat with the given phone number
      description: >
        Looks up a chat owned by the current WhatsApp account that matches the
        normalised phone number. If found, returns its id. If not, creates an
        empty chat placeholder and returns the new id. Use this for the
        "start a new chat" UX where the user types a number that may or may
        not already exist in their history.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenChatByPhoneInput"
      responses:
        "200":
          description: Chat opened or created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenChatByPhoneResult"
        "400":
          description: Invalid phone number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: WhatsApp account not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chats/{id}/refresh-avatar:
    post:
      operationId: refreshChatAvatar
      tags: [chats]
      summary: Force-refresh a chat's profile picture from WhatsApp
      description: >
        Bypasses the TTL cache and asks Baileys for the latest profile picture
        URL for this chat. Returns the new URL (or null if WhatsApp didn't
        return one — typical for contacts with strict privacy settings or no
        photo set).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Refresh result
          content:
            application/json:
              schema:
                type: object
                required: [profilePicUrl]
                properties:
                  profilePicUrl:
                    type: string
                    nullable: true
        "404":
          description: Chat not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chats/{id}:
    get:
      operationId: getChat
      tags: [chats]
      summary: Get a specific chat with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatWithMessages"
        "404":
          description: Chat not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateChat
      tags: [chats]
      summary: Update chat status or tag
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatUpdate"
      responses:
        "200":
          description: Updated chat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"

    delete:
      operationId: deleteChat
      tags: [chats]
      summary: Delete a chat and all its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Chat not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chats/{id}/product:
    post:
      operationId: sendProductToChat
      tags: [chats, products]
      summary: Send a product from the catalog to a chat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendProductBody"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"
        "404":
          description: Chat or product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: WhatsApp not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chats/{id}/reply:
    post:
      operationId: sendManualReply
      tags: [chats]
      summary: Send a manual reply to a chat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualReplyInput"
      responses:
        "200":
          description: Reply sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /chats/{id}/assign:
    patch:
      operationId: assignChat
      tags: [chats]
      summary: Assign (or unassign with null) a chat to a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignChatInput"
      responses:
        "200":
          description: Updated chat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"

  /chats/{id}/takeover:
    post:
      operationId: takeoverChat
      tags: [chats]
      summary: Toggle human takeover for a chat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TakeoverInput"
      responses:
        "200":
          description: Takeover toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"

  /knowledge:
    get:
      operationId: listKnowledge
      tags: [knowledge]
      summary: List all knowledge base entries
      responses:
        "200":
          description: List of knowledge entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeEntry"

    post:
      operationId: createKnowledge
      tags: [knowledge]
      summary: Add a knowledge base entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeInput"
      responses:
        "201":
          description: Created knowledge entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeEntry"

  /knowledge/{id}:
    put:
      operationId: updateKnowledge
      tags: [knowledge]
      summary: Update a knowledge base entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeUpdate"
      responses:
        "200":
          description: Updated knowledge entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeEntry"

    delete:
      operationId: deleteKnowledge
      tags: [knowledge]
      summary: Delete a knowledge base entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get AI settings
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update AI settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /channels:
    get:
      operationId: listChannels
      tags: [channels]
      summary: List every channel owned by the signed-in user
      responses:
        "200":
          description: Array of channels (ordered by id ascending)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Channel"
    post:
      operationId: createChannel
      tags: [channels]
      summary: Create a new channel (Phase 1, WhatsApp only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelCreate"
      responses:
        "201":
          description: Newly created channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"

  /channels/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getChannel
      tags: [channels]
      summary: Fetch a single channel by id
      responses:
        "200":
          description: Channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
    patch:
      operationId: updateChannel
      tags: [channels]
      summary: Rename a channel or change its color/icon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChannelUpdate"
      responses:
        "200":
          description: Updated channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
    delete:
      operationId: deleteChannel
      tags: [channels]
      summary: Hard-delete a channel and all its per-channel rows (chats, messages, statuses, settings, flows).
      responses:
        "204":
          description: Channel deleted

  /channels/{id}/pair:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    post:
      operationId: pairChannel
      tags: [channels]
      summary: Start (or resume) pairing for a WhatsApp channel; QR appears on GET /channels/{id}/qr.
      responses:
        "200":
          description: Channel with status flipped to connecting (or already connected).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"

  /channels/{id}/qr:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getChannelQr
      tags: [channels]
      summary: Poll the channel's pairing status and current QR data url.
      responses:
        "200":
          description: Current pairing status snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelPairQr"

  /channels/{id}/unpair:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    post:
      operationId: unpairChannel
      tags: [channels]
      summary: Log out the channel's WhatsApp socket and wipe its auth dir without deleting the channel row.
      responses:
        "200":
          description: Channel with status set to disconnected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"

  /shortcuts/sync-config:
    get:
      operationId: getShortcutSyncConfig
      tags: [shortcuts]
      summary: Get the Google Sheet sync config for the current WhatsApp account
      responses:
        "200":
          description: Config, or null if not configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/ShortcutSyncConfig"
    put:
      operationId: upsertShortcutSyncConfig
      tags: [shortcuts]
      summary: Create or update the shortcut sync config (pass null to clear).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/ShortcutSyncConfigInput"
                - type: "null"
      responses:
        "200":
          description: Updated config (or null after clearing)
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/ShortcutSyncConfig"

  /shortcuts/sync-run:
    post:
      operationId: runShortcutSync
      tags: [shortcuts]
      summary: Run a manual shortcut sync now. Sheet is the source of truth (deletes apply).
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                required: [inserted, updated, deleted]
                properties:
                  inserted: { type: integer }
                  updated: { type: integer }
                  deleted: { type: integer }
                  syncedAt: { type: string, format: date-time }

  /knowledge/sync-config:
    get:
      operationId: getKnowledgeSyncConfig
      tags: [knowledge]
      summary: Get the Google Sheet sync config for the current WhatsApp account
      responses:
        "200":
          description: Config, or null if not configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/KnowledgeSyncConfig"
    put:
      operationId: upsertKnowledgeSyncConfig
      tags: [knowledge]
      summary: Create or update the knowledge sync config (pass null to clear).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/KnowledgeSyncConfigInput"
                - type: "null"
      responses:
        "200":
          description: Updated config (or null after clearing)
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/KnowledgeSyncConfig"

  /knowledge/sync-run:
    post:
      operationId: runKnowledgeSync
      tags: [knowledge]
      summary: Run a manual knowledge sync now. Sheet is the source of truth (deletes apply).
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                required: [inserted, updated, deleted]
                properties:
                  inserted: { type: integer }
                  updated: { type: integer }
                  deleted: { type: integer }
                  syncedAt: { type: string, format: date-time }

  /knowledge/import:
    post:
      operationId: importKnowledge
      tags: [knowledge]
      summary: Import knowledge entries from CSV/XLSX (replaces ALL existing entries)
      description: |
        Uploads a CSV or XLSX file via `multipart/form-data` with form field `file`.
        Required columns (header row, case-insensitive): type, title, content.
        Valid type values: product, faq, script, testimonial, website.
        On success, the entire `knowledge_entries` table is wiped and replaced.
        Note: this endpoint is consumed via plain `fetch` + `FormData` on the
        client; the request body is documented here for contract completeness
        but the typed client hook is not used.
      requestBody:
        required: true
        description: |
          `multipart/form-data` with a single field `file` containing the CSV
          or XLSX upload. Body schema intentionally omitted to keep generated
          clients free of browser-only `File`/`Blob` types; consume this
          endpoint via plain `fetch` + `FormData`.
        content:
          multipart/form-data: {}
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                required: [imported]
                properties:
                  imported:
                    type: integer
        "400":
          description: Invalid file or contents
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "409":
          description: Another import is already in progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /knowledge-types:
    get:
      operationId: listKnowledgeTypes
      tags: [knowledge]
      summary: List available knowledge entry types
      responses:
        "200":
          description: Types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeType"
    post:
      operationId: createKnowledgeType
      tags: [knowledge]
      summary: Create a new knowledge entry type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeTypeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeType"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "409":
          description: Type already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /knowledge-types/{id}:
    delete:
      operationId: deleteKnowledgeType
      tags: [knowledge]
      summary: Delete a knowledge type (only if no entries reference it)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "409":
          description: Conflict — type still in use
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /products/export.csv:
    get:
      operationId: exportProductsCsv
      tags: [products]
      summary: Export full product catalog as CSV
      description: |
        Returns a UTF-8 CSV (with BOM) of all products. Cells starting with
        `=`, `+`, `-`, `@`, tab, or CR are prefixed with `'` to mitigate
        spreadsheet formula injection. Consumed via browser navigation.
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary

  /products/export.xlsx:
    get:
      operationId: exportProductsXlsx
      tags: [products]
      summary: Export full product catalog as XLSX
      description: Returns an Excel .xlsx workbook of all products. Consumed via browser navigation.
      responses:
        "200":
          description: XLSX file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /products/sync-to-knowledge:
    post:
      operationId: syncProductsToKnowledge
      tags: [products]
      summary: Snapshot the product catalog into a single knowledge-base entry
      description: |
        Builds a text summary of all products (grouped by category, with name,
        code, and pricelist price) and replaces the auto-generated knowledge
        entry titled "Katalog Produk (auto-sync)" for the current owner. The AI
        reply pipeline reads only the knowledge base, so this is how product
        info reaches the AI. Internal tier prices are intentionally excluded.
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                required: [synced, title, contentChars]
                properties:
                  synced:
                    type: integer
                  title:
                    type: string
                  contentChars:
                    type: integer
                    description: Total characters of generated KB content (rough proxy for AI prompt cost per inbound message).
        "409":
          description: A sync for this owner is already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: WhatsApp not connected yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/import:
    post:
      operationId: importProducts
      tags: [products]
      summary: Import product catalog from CSV/XLSX (replaces ALL existing rows)
      description: |
        Uploads a CSV or XLSX file via `multipart/form-data` with form field `file`.
        Required headers (case-insensitive): Kode Product, Nama Barang, Harga Pricelist.
        Optional headers: Category, Harga Silver, Harga Gold, Harga Platinum,
        Harga Reseller, Harga Distributor, Foto, Link Website, Link Video.
        Consumed via plain `fetch` + `FormData`.
      requestBody:
        required: true
        content:
          multipart/form-data: {}
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                required: [imported]
                properties:
                  imported:
                    type: integer
                  skipped:
                    type: integer
        "400":
          description: Invalid file or contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Another import is already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

