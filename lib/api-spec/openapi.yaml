      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: messageId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StarMessageBody"
      responses:
        "200":
          description: New star state
          content:
            application/json:
              schema:
                type: object
