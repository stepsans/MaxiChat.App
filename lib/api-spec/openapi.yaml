      - name: id
        in: path
        required: true
        schema:
          type: integer
    post:
      operationId: pairChannel
      tags: [channels]
      summary: Start (or resume) pairing for a WhatsApp channel; QR appears on GET /channels/{id}/qr.
      responses:
        "200":
          description: Channel with status flipped to connecting (or already connected).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"

  /channels/{id}/qr:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: getChannelQr
      tags: [channels]
      summary: Poll the channel's pairing status and current QR data url.
      responses:
        "200":
          description: Current pairing status snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelPairQr"

  /channels/{id}/connect-telegram:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    post:
      operationId: connectTelegramChannel
      tags: [channels]
      summary: Pair a Telegram bot token with this channel (kind=telegram only). Verifies with Telegram getMe and registers a webhook.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramConnect"
      responses:
        "200":
          description: Channel with status=connected and redacted telegram metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"

  /channels/{id}/disconnect-telegram:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    post:
      operationId: disconnectTelegramChannel
      tags: [channels]
      summary: Remove the bot token + deregister the Telegram webhook. Channel row + chats survive.
      responses:
        "200":
          description: Channel with status=disconnected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"

  /channels/{id}/unpair:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    post:
      operationId: unpairChannel
      tags: [channels]
      summary: Log out the channel's WhatsApp socket and wipe its auth dir without deleting the channel row.
      responses:
        "200":
          description: Channel with status set to disconnected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"

  /shortcuts/sync-config:
    get:
      operationId: getShortcutSyncConfig
      tags: [shortcuts]
      summary: Get the Google Sheet sync config for the current WhatsApp account
      responses:
        "200":
          description: Config, or null if not configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/ShortcutSyncConfig"
    put:
      operationId: upsertShortcutSyncConfig
      tags: [shortcuts]
      summary: Create or update the shortcut sync config (pass null to clear).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/ShortcutSyncConfigInput"
                - type: "null"
      responses:
        "200":
          description: Updated config (or null after clearing)
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/ShortcutSyncConfig"

  /shortcuts/sync-run:
    post:
      operationId: runShortcutSync
      tags: [shortcuts]
      summary: Run a manual shortcut sync now. Sheet is the source of truth (deletes apply).
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                required: [inserted, updated, deleted]
                properties:
                  inserted: { type: integer }
                  updated: { type: integer }
                  deleted: { type: integer }
                  syncedAt: { type: string, format: date-time }

  /knowledge/sync-config:
    get:
      operationId: getKnowledgeSyncConfig
      tags: [knowledge]
      summary: Get the Google Sheet sync config for the current WhatsApp account
      responses:
        "200":
          description: Config, or null if not configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/KnowledgeSyncConfig"
    put:
      operationId: upsertKnowledgeSyncConfig
      tags: [knowledge]
      summary: Create or update the knowledge sync config (pass null to clear).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/KnowledgeSyncConfigInput"
                - type: "null"
      responses:
        "200":
          description: Updated config (or null after clearing)
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/KnowledgeSyncConfig"

  /knowledge/sync-run:
    post:
      operationId: runKnowledgeSync
      tags: [knowledge]
      summary: Run a manual knowledge sync now. Sheet is the source of truth (deletes apply).
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                required: [inserted, updated, deleted]
                properties:
                  inserted: { type: integer }
                  updated: { type: integer }
                  deleted: { type: integer }
                  syncedAt: { type: string, format: date-time }

  /knowledge/import:
    post:
      operationId: importKnowledge
      tags: [knowledge]
      summary: Import knowledge entries from CSV/XLSX (replaces ALL existing entries)
      description: |
        Uploads a CSV or XLSX file via `multipart/form-data` with form field `file`.
        Required columns (header row, case-insensitive): type, title, content.
        Valid type values: product, faq, script, testimonial, website.
        On success, the entire `knowledge_entries` table is wiped and replaced.
        Note: this endpoint is consumed via plain `fetch` + `FormData` on the
        client; the request body is documented here for contract completeness
        but the typed client hook is not used.
      requestBody:
        required: true
        description: |
          `multipart/form-data` with a single field `file` containing the CSV
          or XLSX upload. Body schema intentionally omitted to keep generated
          clients free of browser-only `File`/`Blob` types; consume this
          endpoint via plain `fetch` + `FormData`.
        content:
          multipart/form-data: {}
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                required: [imported]
                properties:
                  imported:
                    type: integer
        "400":
          description: Invalid file or contents
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "409":
          description: Another import is already in progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /knowledge-types:
    get:
      operationId: listKnowledgeTypes
      tags: [knowledge]
      summary: List available knowledge entry types
      responses:
        "200":
          description: Types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeType"
    post:
      operationId: createKnowledgeType
      tags: [knowledge]
      summary: Create a new knowledge entry type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeTypeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeType"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "409":
          description: Type already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /knowledge-types/{id}:
    delete:
      operationId: deleteKnowledgeType
      tags: [knowledge]
      summary: Delete a knowledge type (only if no entries reference it)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "404":
          description: Not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "409":
          description: Conflict — type still in use
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /products/export.csv:
    get:
      operationId: exportProductsCsv
      tags: [products]
      summary: Export full product catalog as CSV
      description: |
        Returns a UTF-8 CSV (with BOM) of all products. Cells starting with
        `=`, `+`, `-`, `@`, tab, or CR are prefixed with `'` to mitigate
        spreadsheet formula injection. Consumed via browser navigation.
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary

  /products/export.xlsx:
    get:
      operationId: exportProductsXlsx
      tags: [products]
      summary: Export full product catalog as XLSX
      description: Returns an Excel .xlsx workbook of all products. Consumed via browser navigation.
      responses:
        "200":
          description: XLSX file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /products/import:
    post:
      operationId: importProducts
      tags: [products]
      summary: Import product catalog from CSV/XLSX (replaces ALL existing rows)
      description: |
        Uploads a CSV or XLSX file via `multipart/form-data` with form field `file`.
        Required headers (case-insensitive): Kode Product, Nama Barang, Harga Pricelist.
        Optional headers: Category, Harga Silver, Harga Gold, Harga Platinum,
        Harga Reseller, Harga Distributor, Foto, Link Website, Link Video.
        Consumed via plain `fetch` + `FormData`.
      requestBody:
        required: true
        content:
          multipart/form-data: {}
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                required: [imported]
                properties:
                  imported:
                    type: integer
                  skipped:
                    type: integer
        "400":
          description: Invalid file or contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Another import is already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
