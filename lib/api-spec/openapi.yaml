  # ── AI Chat Report (ACR) ──────────────────────────────────────────────────
  # CSV/PDF export endpoints are binary streams and deliberately NOT in this
  # spec (same convention as the PDF invoice endpoint) — downloaded via raw
  # fetch → blob on the client.
  /acr/config:
    get:
      operationId: getAcrConfig
      tags: [acr]
      summary: Get the tenant's AI Chat Report KPI configuration
      responses:
        "200":
          description: Active config (created with defaults on first read)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcrConfig"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateAcrConfig
      tags: [acr]
      summary: Update the KPI configuration (super admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcrConfigInput"
      responses:
        "200":
          description: Saved config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcrConfig"
        "400":
          description: Validation error (weights must sum to 100, SLA ascending, grades descending)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not super admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

