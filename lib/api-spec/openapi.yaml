          type: ["string", "null"]
        chatId:
          type: ["integer", "null"]
        channelId:
          type: ["integer", "null"]
        trigger:
          type: string
          enum: [uncertain, conflict]
          description: Why the AI asked — borderline/unclear (uncertain) or it contradicted a manual label (conflict).
        question:
          type: string
        aiSuggestedStatus:
          type: ["string", "null"]
          enum: [lead, not_lead, null]
          description: The AI's best guess so the tenant can confirm in one tap.
        aiScore:
          type: ["integer", "null"]
        aiConversationRole:
          type: ["string", "null"]
        contextSummary:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, answered, dismissed]
        createdAt:
          type: string
          format: date-time

