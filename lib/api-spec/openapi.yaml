            schema:
              $ref: "#/components/schemas/ReactionInput"
      responses:
        "200":
          description: Updated message with reactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"
        "404":
          description: Message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

