          completionTokens,
          totalTokens,
          requestCount,
          planName,
          isTrial,
          isInfinity,
          tokenLimit,
          tokenUsed,
          tokenRemaining,
          usagePercent,
          grantLimit,
          grantRemaining,
          grantResetAt,
          boosterRemaining,
          notifyLevel,
        ]
      properties:
        userId:
          type: integer
