openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Maximizing Your Chat with AI API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: whatsapp
    description: WhatsApp connection management
  - name: chats
    description: Chat management
  - name: knowledge
    description: Knowledge base management
  - name: settings
    description: AI settings
  - name: analytics
    description: Analytics and reporting
  - name: products
    description: Product catalog management
  - name: auth
    description: Session authentication
  - name: admin
    description: Super admin user management
  - name: flows
    description: Chatbot flow builder
  - name: permissions
    description: Per-team-role menu permission matrix
  - name: ai-provider
    description: Per-tenant AI provider configuration (Replit-managed or bring-your-own-key)
paths:
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/mobile-login:
    post:
      operationId: mobileLogin
      tags: [auth]
      summary: Sign in from the mobile app and receive a bearer token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileLoginInput"
      responses:
        "200":
          description: Signed in; bearer token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileSession"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account not allowed to sign in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /push/register:
    post:
      operationId: registerPushToken
      tags: [push]
      summary: Register this device's Expo push token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushRegisterInput"
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /push/unregister:
    post:
      operationId: unregisterPushToken
      tags: [push]
      summary: Unregister a device's Expo push token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushUnregisterInput"
      responses:
        "200":
          description: Unregistered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Sign out current session
      responses:
        "200":
          description: Signed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the currently signed in user
      responses:
        "200":
          description: Current user (null if not signed in)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
    delete:
      operationId: deleteMe
      tags: [auth]
      summary: Delete the current user's own account and end the session
      responses:
        "200":
          description: Account deleted; session ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Refused (e.g. last active platform admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Account no longer exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Self-register a new account (email verification required before sign-in)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupInput"
      responses:
        "201":
          description: Account created; verification email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Consume a verification token and activate the account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailInput"
      responses:
        "200":
          description: Email verified; account active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailVerificationResult"
        "400":
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/resend-verification:
    post:
      operationId: resendVerification
      tags: [auth]
      summary: Re-send the email verification link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationInput"
      responses:
        "200":
          description: Sent (or silently no-op if email is unknown / already verified)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResendVerificationResult"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}:
    patch:
      operationId: adminUpdateUser
      tags: [admin]
      summary: Update a user's status or role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin or attempting to demote last admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteUser
      tags: [admin]
      summary: Delete a user permanently (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Cannot delete yourself or last admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/plans:
    get:
      operationId: adminListPlans
      tags: [admin]
      summary: List subscription plans (admin only)
      responses:
        "200":
          description: All plans (active and archived), ordered by sortOrder
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: adminCreatePlan
      tags: [admin]
      summary: Create a subscription plan (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanInput"
      responses:
        "201":
          description: Created plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A plan with this key already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/plans/{id}:
    patch:
      operationId: adminUpdatePlan
      tags: [admin]
      summary: Update a subscription plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlanInput"
      responses:
        "200":
          description: Updated plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeletePlan
      tags: [admin]
      summary: Delete a subscription plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/addons:
    get:
      operationId: adminListAddons
      tags: [admin]
      summary: List add-ons / top-ups (admin only)
      responses:
        "200":
          description: All add-ons (active and archived), ordered by sortOrder
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Addon"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: adminCreateAddon
      tags: [admin]
      summary: Create an add-on / top-up (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAddonInput"
      responses:
        "201":
          description: Created add-on
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Addon"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/addons/{id}:
    patch:
      operationId: adminUpdateAddon
      tags: [admin]
      summary: Update an add-on / top-up (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAddonInput"
      responses:
        "200":
          description: Updated add-on
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Addon"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Add-on not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteAddon
      tags: [admin]
      summary: Delete an add-on / top-up (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Add-on not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/payment-config:
    get:
      operationId: adminGetPaymentConfig
      tags: [admin]
      summary: Get masked payment gateway (Xendit) config status (admin only)
      responses:
        "200":
          description: Masked gateway config status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentGatewayConfig"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: adminUpdatePaymentConfig
      tags: [admin]
      summary: Update payment gateway (Xendit) credentials (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePaymentConfigInput"
      responses:
        "200":
          description: Updated masked gateway config status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentGatewayConfig"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/payment-method:
    get:
      operationId: adminGetPaymentMethod
      tags: [admin]
      summary: Get the active payment provider + manual-transfer config (admin only)
      responses:
        "200":
          description: Payment-method settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentMethodSettings"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: adminUpdatePaymentMethod
      tags: [admin]
      summary: Update the active provider + manual bank / verification sheet (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePaymentMethodInput"
      responses:
        "200":
          description: Updated payment-method settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentMethodSettings"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/ai-usage:
    get:
      operationId: adminListAiUsage
      tags: [admin]
      summary: AI token usage per super admin for the current billing period (admin only)
      responses:
        "200":
          description: Per-tenant token usage
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiUsageSummary"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai-usage/me:
    get:
      operationId: getMyAiUsage
      tags: [ai-usage]
      summary: The signed-in super admin's own AI token usage for the current billing period
      responses:
        "200":
          description: Token usage for the current period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiUsageSummary"
        "403":
          description: Not a tenant owner (super admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/me:
    get:
      operationId: getMyBilling
      tags: [billing]
      summary: The signed-in user's tenant subscription, usage and computed monthly bill
      description: >-
        Returns the billing state of the caller's tenant. Team members
        (supervisor/agent) resolve to their owner, so the figures are always the
        owner's tenant-wide totals.
      responses:
        "200":
          description: Current billing state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantBilling"
        "404":
          description: Tenant owner not found (e.g. account deleted mid-session)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/trend:
    get:
      operationId: getMyBillingTrend
      tags: [billing]
      summary: The signed-in tenant's daily spend trend
      description: >-
        Daily computed-charge snapshots for the caller's tenant, oldest-first.
        Team members resolve to their owner.
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 365
          description: Window length in days (default 30).
      responses:
        "200":
          description: Daily spend trend
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerTrend"

  /billing/catalog:
    get:
      operationId: getBillingCatalog
      tags: [billing]
      summary: Active plans and add-ons the tenant can purchase
      description: >-
        The self-serve catalog: only active plans and add-ons, ordered by
        sortOrder. Used by the tenant dashboard to render checkout options.
      responses:
        "200":
          description: Purchasable plans and add-ons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingCatalog"

  /billing/payment-method:
    get:
      operationId: getBillingPaymentMethod
      tags: [billing]
      summary: The active payment provider + (for manual) the bank transfer details
      description: >-
        Lets the tenant checkout UI know whether payments go through Xendit
        (hosted invoice redirect) or a manual bank transfer, and in the manual
        case exposes the operator's bank account to display. Never returns any
        secret.
      responses:
        "200":
          description: Active payment method
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantPaymentMethod"

  /billing/quota:
    get:
      operationId: getMyQuota
      tags: [billing]
      summary: The tenant's current prepaid limits (plafon) and live usage
      description: >-
        Returns the caller tenant's quota limits (plan baseline + add-on
        top-ups) alongside live usage. Team members resolve to their owner.
      responses:
        "200":
          description: Current quota limits and usage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantQuotaInfo"
        "404":
          description: Tenant owner not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /retention:
    get:
      operationId: getRetention
      tags: [retention]
      summary: The tenant's data-retention policy and the plan cap
      description: >-
        Returns the caller tenant's chosen retention periods (days; null =
        unlimited) plus the maximum the active plan allows. Team members resolve
        to their owner.
      responses:
        "200":
          description: Retention policy and plan cap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionInfo"
    put:
      operationId: updateRetention
      tags: [retention]
      summary: Update the tenant's data-retention policy
      description: >-
        Sets the retention periods (days; null = unlimited). Each value is
        clamped server-side to the active plan's retention cap. Super admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetentionInput"
      responses:
        "200":
          description: Updated retention policy and plan cap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionInfo"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/checkout:
    post:
      operationId: createCheckout
      tags: [billing]
      summary: Start a Xendit checkout for a plan or add-on purchase
      description: >-
        Creates a pending payment and a hosted Xendit invoice, returning the
        invoice URL to redirect the tenant to. The amount is computed
        server-side from the catalog — the client never sends a price. Reachable
        even by an expired tenant so they can renew.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: Checkout created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Plan or add-on not found / inactive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Payment gateway not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/payments:
    get:
      operationId: listMyPayments
      tags: [billing]
      summary: The tenant's payment / purchase history (newest first)
      responses:
        "200":
          description: Payment ledger for the caller's tenant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentRecord"

  /admin/pricing:
    get:
      operationId: adminGetPricing
      tags: [admin]
      summary: Get the global usage-based pricing config (admin only)
      responses:
        "200":
          description: Current pricing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingConfig"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: adminUpdatePricing
      tags: [admin]
      summary: Update the global usage-based pricing config (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePricingInput"
      responses:
        "200":
          description: Updated pricing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PricingConfig"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/billing:
    get:
      operationId: adminListBilling
      tags: [admin]
      summary: Per-tenant subscription, usage and computed monthly bill (admin only)
      responses:
        "200":
          description: Per-tenant billing
          content:
            application/json:
