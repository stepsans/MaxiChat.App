      properties:
        id:
          type: integer
        shortcut:
          type: string
        replacement:
          type: string
        link:
          type: string
          nullable: true
          description: "Optional image URL. When set, sending the shortcut delivers the image as a photo with `replacement` as caption."
        channelIds:
          type: array
          items:
            type: integer
          description: "Channels this shortcut is scoped to. Empty array = global."

    TextShortcutInput:
      type: object
      required: [shortcut, replacement]
      properties:
        shortcut:
          type: string
          minLength: 1
          maxLength: 64
          description: Trigger token, e.g. "/almt". Matched case-insensitively.
        replacement:
          type: string
          minLength: 1
          maxLength: 4000
        link:
          type: string
          nullable: true
          maxLength: 2000
          description: "Optional image URL. When set, the shortcut is sent as a photo with `replacement` as caption."
        channelIds:
          type: array
          items:
            type: integer
          description: "Optional channel scope. Omit / [] for global; pass channel ids to restrict."

