    CheckoutInput:
      type: object
      required: [items]
      description: >-
        A cart checkout. The cart may contain at most ONE plan (quantity 1) plus
        any number of add-on lines. The server computes the total from the
        catalog and creates a single payment / invoice for the whole cart.
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CheckoutItem"
        successRedirectUrl:
          type: string
          description: >-
            Absolute URL to return the tenant to after a successful payment.
            Must be on an allowed app host; ignored otherwise.

    CheckoutResult:
      type: object
      required: [paymentId, mode, amountIdr]
      description: >-
        Checkout outcome. Branch on `mode`: "xendit" returns an invoiceUrl to
        redirect to; "manual" returns the bank-transfer details and a payment
        code the customer references on transfer (the order stays pending until
        the operator confirms it); "wallet" means the tenant's credit balance
        fully covered the amount and the order is already settled (no redirect).
      properties:
        paymentId:
          type: integer
        mode:
          type: string
          enum: [xendit, manual, wallet]
        amountIdr:
          type: integer
          description: Charged amount in whole Rupiah (computed server-side).
        invoiceUrl:
          type: ["string", "null"]
          description: Hosted Xendit checkout page to redirect to (xendit mode only).
        externalId:
          type: ["string", "null"]
          description: Xendit invoice id (xendit) or the payment code (manual).
        code:
          type: ["string", "null"]
          description: Manual payment code the customer cites on transfer (manual mode).
        bankName:
          type: ["string", "null"]
        bankAccountNumber:
