              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeType"
    post:
      operationId: createKnowledgeType
      tags: [knowledge]
      summary: Create a new knowledge entry type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeTypeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeType"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "409":
          description: Type already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

