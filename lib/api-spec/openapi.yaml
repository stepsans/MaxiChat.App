        channelId: { type: integer }
        groupJid: { type: string }
        groupName: { type: string }
        sheetCredentialId: { type: integer }
        spreadsheetId: { type: string }
        spreadsheetUrl: { type: string, nullable: true }
        sheetTab: { type: string }
        columns: { type: array, items: { $ref: "#/components/schemas/AiReviewColumn" } }
        prompt: { type: string, nullable: true }
        driveCredentialId: { type: integer, nullable: true }
        driveFolderId: { type: string, nullable: true }
        driveFolderName: { type: string, nullable: true }
        scannerAi: { type: boolean }
        scheduleTime: { type: string }
        timezone: { type: string }
        enabled: { type: boolean }
        lastRunAt: { type: string, format: date-time, nullable: true }
        lastRunStatus: { type: string, enum: [idle, ok, error] }
        lastRunError: { type: string, nullable: true }
        lastRunCount: { type: integer }
        updatedAt: { type: string, format: date-time }

    AiReviewConfigInput:
      type: object
      required: [channelId, groupJid, sheetCredentialId, spreadsheetId, sheetTab, columns, prompt, scheduleTime]
      properties:
        channelId: { type: integer }
        groupJid: { type: string, minLength: 1 }
        groupName: { type: string, maxLength: 200 }
        sheetCredentialId: { type: integer }
        spreadsheetId: { type: string, minLength: 1 }
        spreadsheetUrl: { type: string, maxLength: 2000, nullable: true }
        sheetTab: { type: string, minLength: 1, maxLength: 200 }
        columns:
          type: array
          minItems: 1
          maxItems: 50
          items: { $ref: "#/components/schemas/AiReviewColumn" }
        prompt: { type: string, minLength: 1, maxLength: 4000 }
        driveCredentialId: { type: integer, nullable: true }
        driveFolderId: { type: string, maxLength: 200, nullable: true }
        driveFolderName: { type: string, maxLength: 300, nullable: true }
        scannerAi: { type: boolean }
        scheduleTime: { type: string, pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$" }
        timezone: { type: string, minLength: 1, maxLength: 64 }
        enabled: { type: boolean }

    AiReviewRunResult:
      type: object
      required: [processed, appended, uploaded, errors]
      properties:
        processed: { type: integer }
        appended: { type: integer }
        uploaded: { type: integer }
        errors: { type: integer }

    AiReviewGenerateColumnsInput:
      type: object
      required: [prompt]
      properties:
        prompt: { type: string, minLength: 1, maxLength: 4000 }

    AiReviewGenerateColumnsResult:
      type: object
      required: [columns]
      properties:
        columns:
          type: array
          items: { $ref: "#/components/schemas/AiReviewColumn" }

    ProductSyncConfig:
      type: object
      required:
        [id, credentialId, spreadsheetId, sheetName, headerRow,
         autoSyncEnabled, intervalMinutes, lastSyncStatus, updatedAt]
      properties:
        id: { type: integer }
        credentialId: { type: integer }
        spreadsheetId: { type: string }
        sheetName: { type: string }
        headerRow: { type: integer, minimum: 1 }
        autoSyncEnabled: { type: boolean }
        intervalMinutes: { type: integer, enum: [5, 15, 30, 60] }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
        lastSyncStatus: { type: string, enum: [idle, ok, error] }
        lastSyncError: { type: string, nullable: true }
        updatedAt: { type: string, format: date-time }

    KnowledgeSyncConfig:
      type: object
      required:
        [id, credentialId, spreadsheetId, sheetName, headerRow,
         autoSyncEnabled, intervalMinutes, lastSyncStatus, updatedAt]
      properties:
        id: { type: integer }
        credentialId: { type: integer }
        spreadsheetId: { type: string }
        sheetName: { type: string }
        headerRow: { type: integer, minimum: 1 }
        autoSyncEnabled: { type: boolean }
        intervalMinutes: { type: integer, enum: [5, 15, 30, 60] }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
        lastSyncStatus: { type: string, enum: [idle, ok, error] }
        lastSyncError: { type: string, nullable: true }
        updatedAt: { type: string, format: date-time }

    KnowledgeSyncConfigInput:
      type: object
      required: [credentialId, spreadsheetId, sheetName]
      properties:
        credentialId: { type: integer }
        spreadsheetId: { type: string }
        sheetName: { type: string }
        headerRow: { type: integer, minimum: 1, default: 1 }
        autoSyncEnabled: { type: boolean, default: false }
        intervalMinutes: { type: integer, enum: [5, 15, 30, 60], default: 15 }

    ShortcutSyncConfig:
      type: object
      required:
        [id, credentialId, spreadsheetId, sheetName, headerRow,
         autoSyncEnabled, intervalMinutes, lastSyncStatus, updatedAt]
      properties:
        id: { type: integer }
        credentialId: { type: integer }
        spreadsheetId: { type: string }
        sheetName: { type: string }
        headerRow: { type: integer, minimum: 1 }
        autoSyncEnabled: { type: boolean }
        intervalMinutes: { type: integer, enum: [5, 15, 30, 60] }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
        lastSyncStatus: { type: string, enum: [idle, ok, error] }
        lastSyncError: { type: string, nullable: true }
        updatedAt: { type: string, format: date-time }

    ShortcutSyncConfigInput:
      type: object
      required: [credentialId, spreadsheetId, sheetName]
      properties:
        credentialId: { type: integer }
        spreadsheetId: { type: string }
        sheetName: { type: string }
        headerRow: { type: integer, minimum: 1, default: 1 }
        autoSyncEnabled: { type: boolean, default: false }
        intervalMinutes: { type: integer, enum: [5, 15, 30, 60], default: 15 }

    ProductSyncConfigInput:
      type: object
      required: [credentialId, spreadsheetId, sheetName]
      properties:
        credentialId: { type: integer }
        spreadsheetId: { type: string }
        sheetName: { type: string }
        headerRow: { type: integer, minimum: 1, default: 1 }
        autoSyncEnabled: { type: boolean, default: false }
        intervalMinutes: { type: integer, enum: [5, 15, 30, 60], default: 15 }

    SalesOrderItem:
      type: object
      required:
        [id, productId, code, name, qty, price, discountType, discountValue,
         lineTotal]
      properties:
        id: { type: integer }
        productId:
          type: ["integer", "null"]
          description: "Source catalog product id, or null for a custom line item"
        code: { type: ["string", "null"] }
        name: { type: string }
        qty: { type: integer }
        price:
          type: integer
          description: "Unit price in integer Rupiah"
        discountType:
          type: string
          enum: [percent, amount]
          description: "How discountValue is interpreted"
        discountValue:
          type: integer
          description: "Per-line discount: 0-100 when percent, else Rupiah"
        lineTotal:
          type: integer
          description: "Net line total after per-line discount, in integer Rupiah"

    SalesOrder:
      type: object
      required:
        [id, chatId, customerName, customerPhone, ppnEnabled, ppnIncluded,
         ppnRate, subtotal, discountType, discountValue, discountAmount,
         ppnAmount, total, note, status, syncedToSheetAt,
         createdAt, updatedAt, items]
      properties:
        id: { type: integer }
        chatId: { type: ["integer", "null"] }
        customerName: { type: ["string", "null"] }
        customerPhone: { type: ["string", "null"] }
        ppnEnabled: { type: boolean }
        ppnIncluded:
          type: boolean
          description: "true = prices already include PPN; false = PPN added on top"
        ppnRate:
          type: integer
          description: "PPN percentage, e.g. 11"
        subtotal:
          type: integer
          description: "Sum of net line totals (after per-line discounts)"
        discountType:
          type: string
          enum: [percent, amount]
          description: "How discountValue is interpreted for the global discount"
        discountValue:
          type: integer
          description: "Global discount: 0-100 when percent, else Rupiah"
        discountAmount:
          type: integer
          description: "Computed global discount in Rupiah, subtracted before PPN"
        ppnAmount: { type: integer }
        total: { type: integer }
        note: { type: ["string", "null"] }
        status:
          type: string
          enum: [draft, sent]
        syncedToSheetAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        items:
          type: array
          items:
            $ref: "#/components/schemas/SalesOrderItem"

    SalesOrderItemInput:
      type: object
      required: [name, qty, price]
      properties:
        productId: { type: ["integer", "null"] }
        code: { type: ["string", "null"] }
        name: { type: string, minLength: 1 }
        qty: { type: integer, minimum: 1 }
        price: { type: integer, minimum: 0 }
        discountType:
          type: string
          enum: [percent, amount]
          default: amount
        discountValue: { type: integer, minimum: 0, default: 0 }

    SalesOrderInput:
      type: object
      required: [items]
      properties:
        chatId: { type: ["integer", "null"] }
        customerName: { type: ["string", "null"] }
        customerPhone: { type: ["string", "null"] }
        ppnEnabled: { type: boolean, default: false }
        ppnIncluded: { type: boolean, default: true }
        ppnRate: { type: integer, minimum: 0, maximum: 100, default: 11 }
        discountType:
          type: string
          enum: [percent, amount]
          default: amount
        discountValue: { type: integer, minimum: 0, default: 0 }
        note: { type: ["string", "null"] }
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SalesOrderItemInput"

    SalesOrderSyncConfig:
      type: object
      required:
        [id, credentialId, spreadsheetId, sheetName, autoSyncEnabled,
         intervalMinutes, lastSyncStatus, updatedAt]
      properties:
        id: { type: integer }
        credentialId: { type: integer }
        spreadsheetId: { type: string }
        sheetName: { type: string }
        autoSyncEnabled: { type: boolean }
        intervalMinutes: { type: integer, enum: [5, 15, 30, 60] }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
        lastSyncStatus: { type: string, enum: [idle, ok, error] }
        lastSyncError: { type: string, nullable: true }
        updatedAt: { type: string, format: date-time }

    SalesOrderSyncConfigInput:
      type: object
      required: [credentialId, spreadsheetId, sheetName]
      properties:
        credentialId: { type: integer }
        spreadsheetId: { type: string }
        sheetName: { type: string, default: "sales order" }
        autoSyncEnabled: { type: boolean, default: false }
        intervalMinutes: { type: integer, enum: [5, 15, 30, 60], default: 15 }

    FlowSummary:
      type: object
      required: [id, name, isActive, channelIds, updatedAt]
      properties:
        id: { type: integer }
        name: { type: string }
        isActive: { type: boolean }
        channelIds:
          type: array
          items:
            type: integer
          description: "Channels this flow is assigned to. Empty array = global (all of the owner's channels)."
        updatedAt: { type: string, format: date-time }

    Flow:
      type: object
      required: [id, name, isActive, channelIds, graph, createdAt, updatedAt]
      properties:
        id: { type: integer }
        name: { type: string }
        isActive: { type: boolean }
        channelIds:
          type: array
          items:
            type: integer
          description: "Channels this flow is assigned to. Empty array = global (all of the owner's channels)."
        graph: { $ref: "#/components/schemas/FlowGraph" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    FlowCreateInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        channelIds:
          type: array
          items:
            type: integer
          description: "Channels to assign the flow to. Omit or empty array = global (all of the owner's channels)."

    FlowUpdateInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        graph:
          $ref: "#/components/schemas/FlowGraph"
        channelIds:
          type: array
          items:
            type: integer
          description: "Channels to assign the flow to. Empty array = global. Omit to leave assignments unchanged."

    FlowImportInput:
      type: object
      required: [name, graph]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        graph:
          $ref: "#/components/schemas/FlowGraph"

    ChannelKind:
      type: string
      description: Channel integration kind. Free-form on the backend so future kinds can ship without a schema migration; the API gates which ones are creatable.
      enum:
        - whatsapp
        - instagram
        - facebook
        - tiktok_shop
        - shopee
        - webchat
        - line
        - telegram

    Channel:
      type: object
      required: [id, userId, kind, label, color, icon, status, createdAt, updatedAt]
      properties:
        id: { type: integer }
        userId: { type: integer, description: "Owning super_admin user id" }
        kind: { $ref: "#/components/schemas/ChannelKind" }
        label: { type: string, description: "Human label shown in the switcher" }
        color: { type: string, description: "Hex color (e.g. #25D366)" }
        icon: { type: string, description: "Icon key the frontend maps to a lucide / brand icon" }
        status:
          type: string
          enum: [disconnected, connecting, qr_ready, connected, error]
        ownerPhone:
          type: string
          nullable: true
          description: "WhatsApp-only: paired phone number (digits)"
        metadata:
          nullable: true
          description: "Kind-specific extras (e.g. last error, page id, shop id). Shape varies per kind."
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ChannelCreate:
      type: object
      required: [kind, label]
      properties:
        kind: { $ref: "#/components/schemas/ChannelKind" }
        label:
          type: string
          minLength: 1
          maxLength: 60
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        icon:
          type: string
          minLength: 1
          maxLength: 40

    ChannelUpdate:
      type: object
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 60
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        icon:
          type: string
          minLength: 1
          maxLength: 40

    TelegramConnect:
      type: object
      required: [botToken]
      properties:
        botToken:
          type: string
          description: "Bot token issued by @BotFather (e.g. '123456:ABC-DEF...')"
          minLength: 20
          maxLength: 120

    ChannelPairQr:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: "Channel pair status; 'qr_ready' means qrCode is populated."
          enum: [disconnected, connecting, qr_ready, connected, error]
        qrCode:
          type: string
          nullable: true
          description: "Data url for the WhatsApp pairing QR. Null unless status === 'qr_ready'."
        ownerPhone:
          type: string
          nullable: true
          description: "Last-paired phone number (digits). Present once the socket has connected at least once."

