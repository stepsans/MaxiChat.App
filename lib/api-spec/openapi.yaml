openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Maximizing Your Chat with AI API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: whatsapp
    description: WhatsApp connection management
  - name: chats
    description: Chat management
  - name: knowledge
    description: Knowledge base management
  - name: settings
    description: AI settings
  - name: analytics
    description: Analytics and reporting
  - name: report-schedules
    description: Scheduled report delivery (Laporan & Jadwal)
  - name: products
    description: Product catalog management
  - name: auth
    description: Session authentication
  - name: admin
    description: Super admin user management
  - name: flows
    description: Chatbot flow builder
  - name: permissions
    description: Per-team-role menu permission matrix
  - name: ai-provider
    description: Per-tenant AI provider configuration (Replit-managed or bring-your-own-key)
paths:
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/mobile-login:
    post:
      operationId: mobileLogin
      tags: [auth]
      summary: Sign in from the mobile app and receive a bearer token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileLoginInput"
      responses:
        "200":
          description: Signed in; bearer token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileSession"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account not allowed to sign in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/otp/request:
    post:
      operationId: loginRequestOtp
      tags: [auth]
      summary: Request a login OTP by email, or fast-path login via a trusted device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestOtpInput"
      responses:
        "200":
          description: OTP sent, or trusted-device fast-path login succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestOtpResponse"
        "403":
          description: Account disabled, or email not yet verified (link re-sent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Email not registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/otp/verify:
    post:
      operationId: loginVerifyOtp
      tags: [auth]
      summary: Verify a login OTP and start a web session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpInput"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/otp/resend:
    post:
      operationId: loginResendOtp
      tags: [auth]
      summary: Resend the login OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestOtpInput"
      responses:
        "200":
          description: OTP resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResendOtpResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/devices:
    get:
      operationId: listTrustedDevices
      tags: [auth]
      summary: List the current user's active trusted devices
      responses:
        "200":
          description: Active trusted devices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustedDeviceList"

  /auth/devices/{id}/revoke:
    post:
      operationId: revokeTrustedDevice
      tags: [auth]
      summary: Revoke one of the current user's trusted devices
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Revoked (ok=false if the device was not found)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/ai-profile:
    put:
      operationId: updateAiProfile
      tags: [onboarding]
      summary: Save the first-run AI-feeding profile and (re)compose the system prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiProfileInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiProfileResponse"
        "403":
          description: Not a super admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding/ai-sandbox:
    post:
      operationId: runAiSandbox
      tags: [onboarding]
      summary: Run the tenant's AI on a test message without sending to WhatsApp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSandboxInput"
      responses:
        "200":
          description: AI reply (not sent anywhere)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSandboxResponse"
        "400":
          description: Missing message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not a super admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /push/register:
    post:
      operationId: registerPushToken
      tags: [push]
      summary: Register this device's Expo push token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushRegisterInput"
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /push/unregister:
    post:
      operationId: unregisterPushToken
      tags: [push]
      summary: Unregister a device's Expo push token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushUnregisterInput"
      responses:
        "200":
          description: Unregistered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Sign out current session
      responses:
        "200":
          description: Signed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the currently signed in user
      responses:
        "200":
          description: Current user (null if not signed in)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
    delete:
      operationId: deleteMe
      tags: [auth]
      summary: Delete the current user's own account and end the session
      responses:
        "200":
          description: Account deleted; session ended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Refused (e.g. last active platform admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Account no longer exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Self-register a new account (email verification required before sign-in)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupInput"
      responses:
        "201":
          description: Account created; verification email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Consume a verification token and activate the account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailInput"
      responses:
        "200":
          description: Email verified; account active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailVerificationResult"
        "400":
          description: Token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/resend-verification:
    post:
      operationId: resendVerification
      tags: [auth]
      summary: Re-send the email verification link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationInput"
      responses:
        "200":
          description: Sent (or silently no-op if email is unknown / already verified)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResendVerificationResult"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}:
    patch:
      operationId: adminUpdateUser
      tags: [admin]
      summary: Update a user's status or role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin or attempting to demote last admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteUser
      tags: [admin]
      summary: Delete a user permanently (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Cannot delete yourself or last admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/plans:
    get:
      operationId: adminListPlans
      tags: [admin]
      summary: List subscription plans (admin only)
      responses:
        "200":
          description: All plans (active and archived), ordered by sortOrder
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: adminCreatePlan
      tags: [admin]
      summary: Create a subscription plan (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlanInput"
      responses:
        "201":
          description: Created plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A plan with this key already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/plans/{id}:
    patch:
      operationId: adminUpdatePlan
      tags: [admin]
      summary: Update a subscription plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlanInput"
      responses:
        "200":
          description: Updated plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeletePlan
      tags: [admin]
      summary: Delete a subscription plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/addons:
    get:
      operationId: adminListAddons
      tags: [admin]
      summary: List add-ons / top-ups (admin only)
      responses:
        "200":
          description: All add-ons (active and archived), ordered by sortOrder
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Addon"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: adminCreateAddon
      tags: [admin]
      summary: Create an add-on / top-up (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAddonInput"
      responses:
        "201":
          description: Created add-on
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Addon"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/addons/{id}:
    patch:
      operationId: adminUpdateAddon
      tags: [admin]
      summary: Update an add-on / top-up (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAddonInput"
      responses:
        "200":
          description: Updated add-on
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Addon"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Add-on not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteAddon
      tags: [admin]
      summary: Delete an add-on / top-up (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Add-on not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/payment-config:
    get:
      operationId: adminGetPaymentConfig
      tags: [admin]
      summary: Get masked payment gateway (Xendit) config status (admin only)
      responses:
        "200":
          description: Masked gateway config status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentGatewayConfig"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: adminUpdatePaymentConfig
      tags: [admin]
      summary: Update payment gateway (Xendit) credentials (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePaymentConfigInput"
      responses:
        "200":
          description: Updated masked gateway config status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentGatewayConfig"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/payment-method:
    get:
      operationId: adminGetPaymentMethod
      tags: [admin]
      summary: Get the active payment provider + manual-transfer config (admin only)
      responses:
        "200":
          description: Payment-method settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentMethodSettings"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: adminUpdatePaymentMethod
      tags: [admin]
      summary: Update the active provider + manual bank / verification sheet (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePaymentMethodInput"
      responses:
        "200":
          description: Updated payment-method settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentMethodSettings"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tax-config:
    get:
      operationId: adminGetTaxConfig
      tags: [admin]
      summary: Get the platform tax (PPN) configuration (admin only)
      responses:
        "200":
          description: Tax configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxConfig"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: adminUpdateTaxConfig
      tags: [admin]
      summary: Update the platform tax (PPN) configuration (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaxConfigInput"
      responses:
        "200":
          description: Updated tax configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxConfig"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/storage-config:
    get:
      operationId: adminGetStorageConfig
      tags: [admin]
      summary: Get the platform storage-enforcement configuration (admin only)
      responses:
        "200":
          description: Storage configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageConfig"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: adminUpdateStorageConfig
      tags: [admin]
      summary: Update the platform storage-enforcement configuration (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStorageConfigInput"
      responses:
        "200":
          description: Updated storage configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageConfig"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/ai-usage:
    get:
      operationId: adminListAiUsage
      tags: [admin]
      summary: AI token usage per super admin for the current billing period (admin only)
      responses:
        "200":
          description: Per-tenant token usage
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiUsageSummary"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai-usage/me:
    get:
      operationId: getMyAiUsage
      tags: [ai-usage]
      summary: The signed-in super admin's own AI token usage for the current billing period
      responses:
        "200":
          description: Token usage for the current period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiUsageSummary"
        "403":
          description: Not a tenant owner (super admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
