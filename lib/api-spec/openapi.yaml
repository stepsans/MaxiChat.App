        "200":
          description: Paged job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcrJobList"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createAcrJob
      tags: [acr]
      summary: Create and asynchronously run a new evaluation job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcrJobCreate"
      responses:
        "201":
          description: Job created (runs async; poll progress)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcrJob"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

