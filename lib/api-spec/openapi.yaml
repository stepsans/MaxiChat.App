        teamAvgLanguage: { type: number, nullable: true }
        teamAvgAnswer: { type: number, nullable: true }
        teamAvgComplaint: { type: number, nullable: true }
        teamAvgMissed: { type: number, nullable: true }
        countGradeA: { type: integer }
        countGradeB: { type: integer }
        countGradeC: { type: integer }
        countGradeD: { type: integer }
        countGradeE: { type: integer }
        totalAgents: { type: integer }
        totalRedFlags: { type: integer }
        totalCustomerAngry: { type: integer }
        totalRudeLanguage: { type: integer }
        totalNoReplyCritical: { type: integer }
        totalCustomerIgnored: { type: integer }
        totalAnswerDropout: { type: integer }
        totalConversations: { type: integer }
        totalMessages: { type: integer }
        totalMissedChats: { type: integer }
        totalComplaints: { type: integer }
