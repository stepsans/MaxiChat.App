          description: Number of AI completion calls in the period.
        planName:
          type: string
          description: Active plan display name (e.g. "Growth"), or "Trial" while on trial, "Infinity" for the dev/infinity owner.
        isTrial:
          type: boolean
          description: True while the tenant is in the trial window (subscription effective status = trial).
        isInfinity:
          type: boolean
          description: True for the unlimited/never-billed infinity owner. The UI shows "unlimited" rather than a bar.
        tokenLimit:
          type: integer
          description: >-
            Total token plafon for progress bars = grant allowance + active
            booster balance. 0 means "no enforced cap" (unprovisioned trial or
            infinity owner) — the UI must treat 0 as unlimited, not depleted.
        tokenUsed:
          type: integer
          description: Tokens consumed in the current period (alias of totalTokens, named explicitly for the quota UI).
        tokenRemaining:
          type: integer
          description: max(0, tokenLimit − tokenUsed). 0 when tokenLimit is 0 (uncapped) too — read alongside notifyLevel.
        usagePercent:
          type: integer
          description: Percent of tokenLimit consumed, 0..100 (0 when uncapped). Drives the progress-bar colour.
        grantLimit:
          type: integer
          description: Monthly grant allowance from the active plan (tenant_quota.tokenLimit). Use-it-or-lose-it.
        grantRemaining:
          type: integer
          description: Remaining grant this period = max(0, grantLimit − tokenUsed). Expires at grantResetAt.
        grantResetAt:
          type: string
          format: date-time
          description: When the grant resets / expires (= periodEnd).
        boosterRemaining:
          type: integer
          description: Total remaining tokens across all active (non-expired) paid boosters.
        boosterNextExpiresAt:
          type: ["string", "null"]
          format: date-time
          description: Expiry of the soonest-expiring active booster, or null when there are no boosters.
        boosters:
          type: array
          description: Per-booster breakdown for the detailed quota view, soonest expiry first.
          items:
            $ref: "#/components/schemas/TokenBoosterSummary"
        notifyLevel:
          type: string
          enum: [ok, warn80, warn20, crit5, depleted]
          description: >-
            Bell severity derived from remaining quota. ok = >20% left; warn80 =
            ≥80% used (≤20% left); crit5 = ≤5% left; depleted = 0 left / hard
            block. warn20 is reserved (founder's 80%-used == 20%-remaining are the
            same trigger; warn80 is emitted for that band). Always "ok" when uncapped.
        projectedDaysRemaining:
          type: ["integer", "null"]
          description: Estimated whole days until depletion at the current burn rate, or null when the rate is 0 / data is insufficient / uncapped.

    TokenBoosterSummary:
      type: object
      required: [amount, remaining, expiresAt]
      properties:
        amount:
