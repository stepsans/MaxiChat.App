        spreadsheetId: { type: string }
        sheetName: { type: string }
        headerRow: { type: integer, minimum: 1, default: 1 }
        autoSyncEnabled: { type: boolean, default: false }
        intervalMinutes: { type: integer, enum: [5, 15, 30, 60], default: 15 }

    ProductSyncConfigInput:
      type: object
      required: [credentialId, spreadsheetId, sheetName]
      properties:
        credentialId: { type: integer }
        spreadsheetId: { type: string }
        sheetName: { type: string }
        headerRow: { type: integer, minimum: 1, default: 1 }
        autoSyncEnabled: { type: boolean, default: false }
        intervalMinutes: { type: integer, enum: [5, 15, 30, 60], default: 15 }

    SalesOrderItem:
      type: object
      required:
        [id, productId, code, name, qty, price, discountType, discountValue,
         lineTotal]
      properties:
        id: { type: integer }
        productId:
          type: ["integer", "null"]
          description: "Source catalog product id, or null for a custom line item"
        code: { type: ["string", "null"] }
        name: { type: string }
        qty: { type: integer }
        price:
          type: integer
          description: "Unit price in integer Rupiah"
        discountType:
          type: string
          enum: [percent, amount]
          description: "How discountValue is interpreted"
        discountValue:
          type: integer
          description: "Per-line discount: 0-100 when percent, else Rupiah"
        lineTotal:
          type: integer
          description: "Net line total after per-line discount, in integer Rupiah"

    SalesOrder:
      type: object
      required:
        [id, chatId, customerName, customerPhone, ppnEnabled, ppnIncluded,
         ppnRate, subtotal, discountType, discountValue, discountAmount,
         ppnAmount, total, note, status, syncedToSheetAt,
         createdAt, updatedAt, items]
      properties:
        id: { type: integer }
        chatId: { type: ["integer", "null"] }
        customerName: { type: ["string", "null"] }
        customerPhone: { type: ["string", "null"] }
        ppnEnabled: { type: boolean }
        ppnIncluded:
          type: boolean
          description: "true = prices already include PPN; false = PPN added on top"
        ppnRate:
          type: integer
          description: "PPN percentage, e.g. 11"
        subtotal:
          type: integer
          description: "Sum of net line totals (after per-line discounts)"
        discountType:
          type: string
          enum: [percent, amount]
          description: "How discountValue is interpreted for the global discount"
        discountValue:
          type: integer
          description: "Global discount: 0-100 when percent, else Rupiah"
        discountAmount:
          type: integer
          description: "Computed global discount in Rupiah, subtracted before PPN"
        ppnAmount: { type: integer }
        total: { type: integer }
        note: { type: ["string", "null"] }
        status:
          type: string
          enum: [draft, sent]
        syncedToSheetAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        items:
          type: array
          items:
            $ref: "#/components/schemas/SalesOrderItem"

    SalesOrderItemInput:
      type: object
      required: [name, qty, price]
      properties:
        productId: { type: ["integer", "null"] }
        code: { type: ["string", "null"] }
        name: { type: string, minLength: 1 }
        qty: { type: integer, minimum: 1 }
        price: { type: integer, minimum: 0 }
        discountType:
          type: string
          enum: [percent, amount]
          default: amount
        discountValue: { type: integer, minimum: 0, default: 0 }

    SalesOrderInput:
      type: object
      required: [items]
      properties:
        chatId: { type: ["integer", "null"] }
        customerName: { type: ["string", "null"] }
        customerPhone: { type: ["string", "null"] }
        ppnEnabled: { type: boolean, default: false }
        ppnIncluded: { type: boolean, default: true }
        ppnRate: { type: integer, minimum: 0, maximum: 100, default: 11 }
        discountType:
          type: string
          enum: [percent, amount]
          default: amount
        discountValue: { type: integer, minimum: 0, default: 0 }
        note: { type: ["string", "null"] }
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SalesOrderItemInput"

    SalesOrderSyncConfig:
      type: object
      required:
        [id, credentialId, spreadsheetId, sheetName, autoSyncEnabled,
         intervalMinutes, lastSyncStatus, updatedAt]
      properties:
        id: { type: integer }
        credentialId: { type: integer }
        spreadsheetId: { type: string }
        sheetName: { type: string }
        autoSyncEnabled: { type: boolean }
        intervalMinutes: { type: integer, enum: [5, 15, 30, 60] }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
        lastSyncStatus: { type: string, enum: [idle, ok, error] }
        lastSyncError: { type: string, nullable: true }
        updatedAt: { type: string, format: date-time }

    SalesOrderSyncConfigInput:
      type: object
      required: [credentialId, spreadsheetId, sheetName]
      properties:
        credentialId: { type: integer }
        spreadsheetId: { type: string }
        sheetName: { type: string, default: "sales order" }
        autoSyncEnabled: { type: boolean, default: false }
        intervalMinutes: { type: integer, enum: [5, 15, 30, 60], default: 15 }

    FlowSummary:
      type: object
      required: [id, name, isActive, channelIds, updatedAt]
      properties:
        id: { type: integer }
        name: { type: string }
        isActive: { type: boolean }
        channelIds:
          type: array
          items:
            type: integer
          description: "Channels this flow is assigned to. Empty array = global (all of the owner's channels)."
        updatedAt: { type: string, format: date-time }

    Flow:
      type: object
      required: [id, name, isActive, channelIds, graph, createdAt, updatedAt]
      properties:
        id: { type: integer }
        name: { type: string }
        isActive: { type: boolean }
        channelIds:
          type: array
          items:
            type: integer
          description: "Channels this flow is assigned to. Empty array = global (all of the owner's channels)."
        graph: { $ref: "#/components/schemas/FlowGraph" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    FlowCreateInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        channelIds:
          type: array
          items:
            type: integer
          description: "Channels to assign the flow to. Omit or empty array = global (all of the owner's channels)."

    FlowUpdateInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        graph:
          $ref: "#/components/schemas/FlowGraph"
        channelIds:
          type: array
          items:
            type: integer
          description: "Channels to assign the flow to. Empty array = global. Omit to leave assignments unchanged."

    FlowImportInput:
      type: object
      required: [name, graph]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        graph:
          $ref: "#/components/schemas/FlowGraph"

    ChannelKind:
      type: string
      description: Channel integration kind. Free-form on the backend so future kinds can ship without a schema migration; the API gates which ones are creatable.
      enum:
        - whatsapp
        - instagram
        - facebook
        - tiktok_shop
        - shopee
        - webchat
        - line
        - telegram

    Channel:
      type: object
      required: [id, userId, kind, label, color, icon, status, isDefault, createdAt, updatedAt]
      properties:
        id: { type: integer }
        userId: { type: integer, description: "Owning super_admin user id" }
        kind: { $ref: "#/components/schemas/ChannelKind" }
        label: { type: string, description: "Human label shown in the switcher" }
        color: { type: string, description: "Hex color (e.g. #25D366)" }
        icon: { type: string, description: "Icon key the frontend maps to a lucide / brand icon" }
        status:
          type: string
          enum: [disconnected, connecting, qr_ready, connected, syncing, error]
        isDefault:
          type: boolean
          description: "Whether this is the tenant's default channel (single per owner)"
        picUserId:
          type: integer
          nullable: true
          description: "Penanggung jawab channel: the team member accountable for this channel. Phone-typed replies (no per-message author) attribute their AI Chat Report KPI to this user. Null = none set."
        ownerPhone:
          type: string
          nullable: true
          description: "WhatsApp-only: paired phone number (digits)"
        metadata:
          nullable: true
          description: "Kind-specific extras (e.g. last error, page id, shop id). Shape varies per kind."
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ChannelCreate:
      type: object
      required: [kind, label]
      properties:
        kind: { $ref: "#/components/schemas/ChannelKind" }
        label:
          type: string
          minLength: 1
          maxLength: 60
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        icon:
          type: string
          minLength: 1
          maxLength: 40

    ChannelUpdate:
      type: object
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 60
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        icon:
          type: string
          minLength: 1
          maxLength: 40
        isDefault:
          type: boolean
          description: "Set true to make this the tenant's default channel"
        picUserId:
          type: integer
          nullable: true
          description: "Set the channel's penanggung jawab (team member id), or null to clear it. Must be a supervisor/agent under the owner, or the owner."

    TelegramConnect:
      type: object
      required: [botToken]
      properties:
        botToken:
          type: string
          description: "Bot token issued by @BotFather (e.g. '123456:ABC-DEF...')"
          minLength: 20
          maxLength: 120

    ChannelPairQr:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: "Channel pair status; 'qr_ready' means qrCode is populated."
          enum: [disconnected, connecting, qr_ready, connected, error]
        qrCode:
          type: string
          nullable: true
          description: "Data url for the WhatsApp pairing QR. Null unless status === 'qr_ready'."
        ownerPhone:
          type: string
          nullable: true
          description: "Last-paired phone number (digits). Present once the socket has connected at least once."

    # ============================================================
    # AI Pipeline schemas
    # ============================================================

    AiPipelineCreate:
      type: object
      required: [name, channelIds]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          nullable: true
        isActive:
          type: boolean
          default: true
        scoreThreshold:
          type: integer
          minimum: 0
          maximum: 100
          default: 70
        opportunityThreshold:
          type: integer
          minimum: 0
          maximum: 100
          default: 80
          description: Minimum score to auto-create an opportunity. Should be >= scoreThreshold.
        autoCreateOpportunity:
          type: boolean
          default: false
          description: When true, crossing opportunityThreshold auto-creates an opportunity.
        autoFollowupEnabled:
          type: boolean
          default: false
        followupIntervals:
          type: array
          items:
            type: string
          default: ["24h", "48h", "72h"]
        cutoffTimes:
          type: array
          items:
            type: string
          default: ["12:00", "23:59"]
        channelIds:
          type: array
          items:
            type: integer
          minItems: 1
        excludeLabelIds:
          type: array
          items:
            type: integer
        staleDaysThreshold:
          type: integer
          minimum: 1
          maximum: 365
          default: 14
          description: Days without activity before an open opportunity is flagged high-risk for this pipeline.
        highValueThresholdIdr:
          type: integer
          minimum: 0
          default: 0
          description: Minimum estimated value (whole Rupiah) for an opportunity to be flagged high-risk. 0 = value never excludes.
        customPrompt:
          type: string
          nullable: true
          description: Custom AI classification prompt overriding the default.
        directionFilter:
          type: boolean
          default: true
          description: When true, skip conversations where the agent/owner sends the majority of messages.

    AiPipeline:
      type: object
      required: [id, name, isActive, scoreThreshold, autoFollowupEnabled, followupIntervals, cutoffTimes, channelIds, excludeLabelIds, staleDaysThreshold, highValueThresholdIdr, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        isActive:
          type: boolean
        scoreThreshold:
          type: integer
        opportunityThreshold:
          type: integer
        autoCreateOpportunity:
          type: boolean
        autoFollowupEnabled:
          type: boolean
        followupIntervals:
          type: array
          items:
            type: string
        cutoffTimes:
          type: array
          items:
            type: string
        channelIds:
          type: array
          items:
            type: integer
        excludeLabelIds:
          type: array
          items:
            type: integer
        staleDaysThreshold:
          type: integer
          minimum: 1
          maximum: 365
        highValueThresholdIdr:
          type: integer
          minimum: 0
        customPrompt:
          type: string
          nullable: true
        promptVersion:
          type: integer
        directionFilter:
          type: boolean
        lastRunAt:
          type: string
          format: date-time
          nullable: true
        todayStats:
          type: object
          properties:
            analyzed:
              type: integer
            enteredPipeline:
              type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AiPipelineAnalysis:
      type: object
      required: [id, pipelineId, contactPhone, channelId, cutoffDatetime, score, enteredPipeline, createdAt]
      properties:
        id:
          type: integer
        pipelineId:
          type: integer
        contactPhone:
          type: string
        contactName:
          type: string
          nullable: true
        channelId:
          type: integer
        channelType:
          type: string
          nullable: true
        cutoffDatetime:
          type: string
          format: date-time
        cutoffWindowStart:
          type: string
          format: date-time
        cutoffWindowEnd:
          type: string
          format: date-time
        score:
          type: integer
        previousScore:
          type: integer
          nullable: true
        scoreBreakdown:
          type: object
          nullable: true
          properties:
            buying_signal:
              type: integer
            urgency:
              type: integer
            engagement:
              type: integer
            commitment:
              type: integer
            product_fit:
              type: integer
            barrier_adjustment:
              type: integer
        status:
          type: string
          nullable: true
        estimatedValue:
          type: integer
          nullable: true
        productInterest:
          type: string
          nullable: true
        recommendation:
          type: string
          nullable: true
        scoreReason:
          type: string
          nullable: true
        aiNotes:
          type: string
          nullable: true
        leadClassification:
          type: string
          enum: [lead, not_lead, unclear]
          description: AI lead classification for this conversation.
        leadClassificationReason:
          type: string
          nullable: true
        conversationRole:
          type: string
          enum: [tenant_is_seller, tenant_is_buyer, unclear]
          description: Who is selling. tenant_is_buyer = reverse role (contact is supplier).
        skipped:
          type: boolean
          description: True when skipped (reverse role / not_lead) and never entered the pipeline.
        skipReason:
          type: string
          nullable: true
        opportunityId:
          type: integer
          nullable: true
        chatId:
          type: integer
          nullable: true
        enteredPipeline:
          type: boolean
        pipelineEntryId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time

    AiPipelineAnalysisList:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AiPipelineAnalysis"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    AiPipelineGenerateFollowupResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    AiPipelineFollowupLog:
      type: object
      required: [id, entryId, followupNumber, messageSent, sentAt, wasReplied, status]
      properties:
        id:
          type: integer
        entryId:
          type: integer
        followupNumber:
          type: integer
        messageSent:
          type: string
        sentAt:
          type: string
          format: date-time
        wasReplied:
          type: boolean
        repliedAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string

    AiPipelineEntry:
      type: object
      required: [id, pipelineId, contactPhone, channelId, currentScore, status, followupCount, enteredAt, updatedAt]
      properties:
        id:
          type: integer
        pipelineId:
          type: integer
        analysisId:
          type: integer
        contactPhone:
          type: string
        contactName:
          type: string
          nullable: true
        channelId:
          type: integer
        channelType:
          type: string
          nullable: true
        currentScore:
          type: integer
        estimatedValue:
          type: integer
          nullable: true
        productInterest:
          type: string
          nullable: true
        status:
          type: string
        followupCount:
          type: integer
        lastFollowupAt:
          type: string
          format: date-time
          nullable: true
        nextFollowupAt:
          type: string
          format: date-time
          nullable: true
        doNotFollowup:
          type: boolean
        doNotFollowupReason:
          type: string
          nullable: true
        cooled:
          type: boolean
        cooledAt:
          type: string
          format: date-time
          nullable: true
        scoreHistory:
          type: array
          items:
            type: object
            properties:
              score:
                type: integer
              date:
                type: string
              cutoffWindow:
                type: string
        followupLogs:
          type: array
          items:
            $ref: "#/components/schemas/AiPipelineFollowupLog"
        enteredAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AiPipelineEntryList:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AiPipelineEntry"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    AiPipelineDashboardStats:
      type: object
      required: [today, scoreDistribution, recentAnalyses, cutoffTimeline]
      properties:
        today:
          type: object
          required: [analyzed, enteredPipeline, followupsSent]
          properties:
            analyzed:
              type: integer
            enteredPipeline:
              type: integer
            followupsSent:
              type: integer
        scoreDistribution:
          type: array
          items:
            type: object
            properties:
              range:
                type: string
              count:
                type: integer
              color:
                type: string
        recentAnalyses:
          type: array
          items:
            $ref: "#/components/schemas/AiPipelineAnalysis"
        cutoffTimeline:
          type: array
          items:
            type: object
            properties:
              scheduledTime:
                type: string
                format: date-time
              status:
                type: string
              completedAt:
                type: string
                format: date-time
                nullable: true

    AiPipelineCutoffLog:
      type: object
      required: [id, pipelineId, scheduledTime, status, contactsProcessed, contactsEnteredPipeline, createdAt]
      properties:
        id:
          type: integer
        pipelineId:
          type: integer
        scheduledTime:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        contactsProcessed:
          type: integer
        contactsEnteredPipeline:
          type: integer
        errorMessage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ── AI Chat Report (ACR) ──────────────────────────────────────────────
    AcrConfigInput:
      type: object
      required:
        [
          weightResponseTime,
          weightLanguageQuality,
          weightAnswerQuality,
          weightComplaintHandling,
          weightMissedChat,
          responseTimeSubweight,
          consistencySubweight,
          missedChatSubweight,
          leadCoverageSubweight,
          slaExcellentMinutes,
          slaGoodMinutes,
          slaAcceptableMinutes,
          slaPoorMinutes,
          slaCriticalMinutes,
          gradeAThreshold,
          gradeBThreshold,
          gradeCThreshold,
          gradeDThreshold,
          allowanceGradeA,
          allowanceGradeB,
          allowanceGradeC,
          allowanceGradeD,
          allowanceGradeE,
          complaintHandlingEnabled,
          includeOwnerInEvaluation,
          autoScheduleEnabled,
        ]
      properties:
        weightResponseTime: { type: integer, minimum: 0, maximum: 100 }
        weightLanguageQuality: { type: integer, minimum: 0, maximum: 100 }
        weightAnswerQuality: { type: integer, minimum: 0, maximum: 100 }
        weightComplaintHandling: { type: integer, minimum: 0, maximum: 100 }
        weightMissedChat: { type: integer, minimum: 0, maximum: 100 }
        responseTimeSubweight:
          type: integer
          minimum: 0
          maximum: 100
          description: "Sub-weight of pure response time within Kecepatan Balas. With consistencySubweight must total 100."
        consistencySubweight:
          type: integer
          minimum: 0
          maximum: 100
          description: "Sub-weight of daily-active consistency within Kecepatan Balas."
        missedChatSubweight:
          type: integer
          minimum: 0
          maximum: 100
          description: "Sub-weight of missed chats within Chat Tak Terjawab. With leadCoverageSubweight must total 100."
        leadCoverageSubweight:
          type: integer
          minimum: 0
          maximum: 100
          description: "Sub-weight of lead-status coverage within Chat Tak Terjawab."
        slaExcellentMinutes: { type: integer, minimum: 1 }
        slaGoodMinutes: { type: integer, minimum: 1 }
        slaAcceptableMinutes: { type: integer, minimum: 1 }
        slaPoorMinutes: { type: integer, minimum: 1 }
        slaCriticalMinutes: { type: integer, minimum: 1 }
        gradeAThreshold: { type: integer, minimum: 1, maximum: 100 }
        gradeBThreshold: { type: integer, minimum: 1, maximum: 100 }
        gradeCThreshold: { type: integer, minimum: 1, maximum: 100 }
        gradeDThreshold: { type: integer, minimum: 1, maximum: 100 }
        allowanceGradeA:
          type: integer
          description: Whole-integer Rupiah.
        allowanceGradeB: { type: integer }
        allowanceGradeC: { type: integer }
        allowanceGradeD: { type: integer }
        allowanceGradeE: { type: integer }
        complaintHandlingEnabled: { type: boolean }
        includeOwnerInEvaluation:
          type: boolean
          description: Evaluate the tenant owner as an agent too (testing / solo CS).
        defaultLeadStatuses:
          type: array
          items:
            type: string
            enum: [lead, not_lead, unknown]
          description: "Global default lead classes evaluated by new reports (Section 5b). Default [lead, unknown]."
        defaultChatStatuses:
          type: array
          nullable: true
          items:
            type: string
            enum: [ai_handled, needs_human, closed]
          description: "Global default chat handling statuses for new reports. Null/empty = all statuses."
        defaultGeneratePdf:
          type: boolean
          description: Default for the 'Generate PDF' action on new reports.
        defaultSendWhatsappPdf:
          type: boolean
          description: Default for the 'Send PDF via WhatsApp' action on new reports.
        defaultNotifyUserIds:
          type: array
          items: { type: integer }
          description: Global default extra notification recipients (super admin is always notified).
        autoScheduleEnabled: { type: boolean }
        autoScheduleFrequency:
          type: string
          enum: [weekly, monthly, custom]
        autoScheduleDayOfMonth: { type: integer, minimum: 1, maximum: 28 }
        autoScheduleDayOfWeek: { type: integer, minimum: 1, maximum: 7 }
        autoScheduleEveryDays: { type: integer, minimum: 1, maximum: 90 }
        autoScheduleNotifyUserIds:
          type: array
          items: { type: integer }

    AcrConfig:
      allOf:
        - $ref: "#/components/schemas/AcrConfigInput"
        - type: object
          required: [id]
          properties:
            id: { type: string }
            autoScheduleNextRunAt:
              type: string
              format: date-time
              nullable: true
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }

    AcrJobCreate:
      type: object
      required: [periodStart, periodEnd]
      properties:
        periodStart:
          type: string
          format: date
          description: YYYY-MM-DD in the tenant timezone. Default today - 30 days.
        periodEnd:
          type: string
          format: date
        agentIds:
          type: array
          items: { type: integer }
          description: Empty/omitted = evaluate all agents.
        leadStatuses:
          type: array
          items:
            type: string
            enum: [lead, not_lead, unknown]
          description: Manual lead classifications whose chats are analyzed. Empty/omitted defaults to [lead] — only chats marked as leads are evaluated.
        channelIds:
          type: array
          items: { type: integer }
          description: Restrict analysis to these channels. Empty/omitted = all channels.
        customerLabelIds:
          type: array
          items: { type: integer }
          description: Restrict to chats whose contact carries one of these customer labels. Empty/omitted = no label filter.
        chatStatuses:
          type: array
          items:
            type: string
            enum: [ai_handled, needs_human, closed]
          description: Restrict to chats with one of these handling statuses. Empty/omitted = all statuses.
        includeOwner:
          type: boolean
          description: Override the tenant config's include-owner-in-evaluation for this report. Omitted = inherit config.
        notifyUserIds:
          type: array
          items: { type: integer }
          description: Extra notification recipients for this report (super admin always notified). Omitted = config default.
        generatePdf:
          type: boolean
          description: Generate a PDF after the report completes. Omitted = config default.
        sendWhatsappPdf:
          type: boolean
          description: Send the PDF via WhatsApp to recipients after completion. Omitted = config default.

    AcrJob:
      type: object
      required: [id, periodStart, periodEnd, status]
      properties:
        id: { type: string }
        periodStart: { type: string, format: date }
        periodEnd: { type: string, format: date }
        requestedByUserId: { type: integer, nullable: true }
        requestedByName: { type: string, nullable: true }
        isAutoScheduled: { type: boolean }
        status:
          type: string
          enum: [pending, running, completed, failed]
        progressTotal: { type: integer }
        progressCompleted: { type: integer }
        totalAgentsEvaluated: { type: integer }
        totalConversationsAnalyzed: { type: integer }
        totalMessagesAnalyzed: { type: integer }
        errorMessage: { type: string, nullable: true }
        startedAt: { type: string, format: date-time, nullable: true }
        completedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        archivedAt: { type: string, format: date-time, nullable: true }
        isLatestForPeriod:
          type: boolean
          description: True when this is the newest job covering its exact period.
        jobType: { type: string }
        pdfPath:
          type: string
          nullable: true
          description: Stored PDF URL once auto-generated for a scheduled job.
        pdfGeneratedAt: { type: string, format: date-time, nullable: true }
        filterSnapshot:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/AcrFilterSnapshot"
          description: Analysis filters applied to this job, with channel/label display names resolved at creation. Null for pre-feature jobs.

    AcrFilterSnapshot:
      type: object
      required: [leadStatuses, channels, customerLabels, chatStatuses, includeOwner]
      properties:
        leadStatuses:
          type: array
          items:
            type: string
            enum: [lead, not_lead, unknown]
        channels:
          type: array
          items:
            type: object
            required: [id, label]
            properties:
              id: { type: integer }
              label: { type: string }
        customerLabels:
          type: array
          items:
            type: object
            required: [id, name]
            properties:
              id: { type: integer }
              name: { type: string }
        chatStatuses:
          type: array
          items:
            type: string
            enum: [ai_handled, needs_human, closed]
        includeOwner: { type: boolean }

    AcrJobList:
      type: object
      required: [jobs, total, page, limit]
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/AcrJob"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    AcrJobProgress:
      type: object
      required: [status, progressTotal, progressCompleted, pct]
      properties:
        status: { type: string }
        progressTotal: { type: integer }
        progressCompleted: { type: integer }
        pct: { type: number }

    AcrAgentScore:
      type: object
      required: [id, jobId, agentUserId, agentRole, totalScore, grade]
      properties:
        id: { type: string }
        jobId: { type: string }
        agentUserId: { type: integer }
        agentName: { type: string, nullable: true }
        agentEmail: { type: string, nullable: true }
        agentRole: { type: string }
        totalScore: { type: number }
        scoreResponseTime: { type: number }
        scoreLanguageQuality: { type: number }
        scoreAnswerQuality: { type: number }
        scoreComplaintHandling: { type: number }
        scoreMissedChat: { type: number }
        avgResponseTimeMinutes: { type: number, nullable: true }
        totalConversations: { type: integer }
        totalMessagesSent: { type: integer }
        totalMissedChats: { type: integer }
        totalComplaints: { type: integer }
        complaintsResolved: { type: integer }
        insufficientData: { type: boolean }
        activeDays:
          type: integer
          description: Distinct days the agent sent a substantive human message.
        workingDays:
          type: integer
          description: Mon–Sat days in the period (Sunday excluded).
        consistencyPct:
          type: number
          description: active_days / working_days × 100.
        totalContactsHandled: { type: integer }
        contactsWithLeadStatus: { type: integer }
        leadCoveragePct:
          type: number
          description: contacts_with_lead_status / total_contacts_handled × 100.
        grade:
          type: string
          enum: [A, B, C, D, E]
        allowanceAmount:
          type: integer
          description: Whole-integer Rupiah from the job's config snapshot.
        aiSummary: { type: string, nullable: true }
        aiStrengths: { type: string, nullable: true }
        aiImprovements: { type: string, nullable: true }
        redFlagCount: { type: integer }
        hasCriticalViolation: { type: boolean }

    AcrCoachingInsights:
      type: object
      properties:
        topImprovements:
          type: array
          items: { type: string }
        bestConversationId: { type: string, nullable: true }
        worstConversationId: { type: string, nullable: true }
        bestConversationExcerpt: { type: string, nullable: true }
        worstConversationExcerpt: { type: string, nullable: true }
        worstConversationAnnotation: { type: string, nullable: true }
        teamComparison:
          type: object
          nullable: true
          properties:
            avgResponseTimeTeam: { type: number }
            avgScoreTeam: { type: number }
            agentRank: { type: integer }
            totalAgents: { type: integer }

    AcrTrendPoint:
      type: object
      required: [jobId, periodStart, periodEnd, totalScore]
      properties:
        jobId: { type: string }
        periodStart: { type: string, format: date }
        periodEnd: { type: string, format: date }
        totalScore: { type: number }
        scoreResponseTime: { type: number }
        scoreLanguageQuality: { type: number }
        scoreAnswerQuality: { type: number }
        scoreComplaintHandling: { type: number }
        scoreMissedChat: { type: number }

    AcrRedFlag:
      type: object
      required: [id, jobId, agentUserId, violationType, violationSeverity, aiExplanation]
      properties:
        id: { type: string }
        jobId: { type: string }
        agentScoreId: { type: string }
        agentUserId: { type: integer }
        agentName: { type: string, nullable: true }
        chatId: { type: integer, nullable: true }
        contactName: { type: string, nullable: true }
        channelId: { type: integer, nullable: true }
        channelType: { type: string, nullable: true }
        conversationExcerpt: { type: string, nullable: true }
        violationType:
          type: string
          enum:
            [
              customer_angry,
              rude_language,
              no_reply_critical,
              customer_ignored,
              answer_caused_dropout,
            ]
        violationSeverity:
          type: string
          enum: [critical, high, medium]
        aiExplanation: { type: string }
        aiRecommendation: { type: string, nullable: true }
        scoreImpactDimension: { type: string, nullable: true }
        scoreImpactPoints: { type: number, nullable: true }
        occurredAt: { type: string, format: date-time, nullable: true }
        messageTimestamp: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

    AcrRedFlagList:
      type: object
      required: [redFlags, total, page, limit]
      properties:
        redFlags:
          type: array
          items:
            $ref: "#/components/schemas/AcrRedFlag"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    AcrConversationScore:
      type: object
      required: [id, jobId, agentUserId]
      properties:
        id: { type: string }
        jobId: { type: string }
        agentScoreId: { type: string }
        agentUserId: { type: integer }
        chatId: { type: integer, nullable: true }
        contactName: { type: string, nullable: true }
        channelId: { type: integer, nullable: true }
        channelType: { type: string, nullable: true }
        firstMessageAt: { type: string, format: date-time, nullable: true }
        lastMessageAt: { type: string, format: date-time, nullable: true }
        totalMessages: { type: integer }
        agentMessages: { type: integer }
        customerMessages: { type: integer }
        avgResponseTimeMinutes: { type: number, nullable: true }
        firstResponseTimeMinutes: { type: number, nullable: true }
        maxResponseTimeMinutes: { type: number, nullable: true }
        hasMissedMessage: { type: boolean }
        hasComplaint: { type: boolean }
        complaintResolved: { type: boolean }
        convScoreResponseTime: { type: number, nullable: true }
        convScoreLanguageQuality: { type: number, nullable: true }
        convScoreAnswerQuality: { type: number, nullable: true }
        convScoreComplaintHandling: { type: number, nullable: true }
        convScoreMissedChat: { type: number, nullable: true }
        convTotalScore: { type: number, nullable: true }
        hasRedFlag: { type: boolean }
        redFlagTypes:
          type: array
          items: { type: string }
          nullable: true
        aiNotes: { type: string, nullable: true }
        answerCausedCustomerSilent: { type: boolean }

    AcrConversationList:
      type: object
      required: [conversations, total, page, limit]
      properties:
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/AcrConversationScore"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    AcrLeaderboardEntry:
      type: object
      required: [rank, agentUserId, totalScore, grade, isSelf]
      properties:
        rank: { type: integer }
        delta:
          type: number
          nullable: true
          description: Score change vs the previous job; null when not comparable.
        agentUserId: { type: integer }
        agentName:
          type: string
          nullable: true
          description: Masked (null) for agent callers viewing other agents.
        agentRole: { type: string }
        totalScore: { type: number }
        grade: { type: string }
        allowanceAmount: { type: integer }
        isSelf: { type: boolean }

    AcrLeaderboard:
      type: object
      required: [entries, periodStart, periodEnd]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AcrLeaderboardEntry"
        periodStart: { type: string, format: date }
        periodEnd: { type: string, format: date }

    AcrTeamSummary:
      type: object
      required: [avgScore, needsAttentionCount, totalRedFlags]
      properties:
        avgScore: { type: number }
        bestAgentName: { type: string, nullable: true }
        bestAgentScore: { type: number, nullable: true }
        needsAttentionCount: { type: integer }
        totalRedFlags: { type: integer }

    AcrJobResults:
      type: object
      required: [job, agents, summary, gradeDistribution, dimensionAverages, teamTrend, weights]
      properties:
        job:
          $ref: "#/components/schemas/AcrJob"
        weights:
          type: object
          description: KPI weights from the job's immutable config snapshot.
          required:
            [
              weightResponseTime,
              weightLanguageQuality,
              weightAnswerQuality,
              weightComplaintHandling,
              weightMissedChat,
            ]
          properties:
            weightResponseTime: { type: integer }
            weightLanguageQuality: { type: integer }
            weightAnswerQuality: { type: integer }
            weightComplaintHandling: { type: integer }
            weightMissedChat: { type: integer }
        agents:
          type: array
          items:
            $ref: "#/components/schemas/AcrAgentScore"
        summary:
          $ref: "#/components/schemas/AcrTeamSummary"
        gradeDistribution:
          type: object
          required: [a, b, c, d, e]
          properties:
            a: { type: integer }
            b: { type: integer }
            c: { type: integer }
            d: { type: integer }
            e: { type: integer }
        dimensionAverages:
          type: object
          required:
            [responseTime, languageQuality, answerQuality, complaintHandling, missedChat]
          properties:
            responseTime: { type: number }
            languageQuality: { type: number }
            answerQuality: { type: number }
            complaintHandling: { type: number }
            missedChat: { type: number }
        teamTrend:
          type: array
          items:
            type: object
            required: [jobId, periodStart, periodEnd, avgScore]
            properties:
              jobId: { type: string }
              periodStart: { type: string, format: date }
              periodEnd: { type: string, format: date }
              avgScore: { type: number }

    AcrAgentDetail:
      type: object
      required: [score, redFlags, trend]
      properties:
        score:
          $ref: "#/components/schemas/AcrAgentScore"
        coachingInsights:
          allOf:
            - $ref: "#/components/schemas/AcrCoachingInsights"
          nullable: true
        redFlags:
          type: array
          items:
            $ref: "#/components/schemas/AcrRedFlag"
        trend:
          type: array
          items:
            $ref: "#/components/schemas/AcrTrendPoint"
        deltaVsPrevious:
          type: number
          nullable: true

    AcrNotification:
      type: object
      required: [id, isRead, createdAt]
      properties:
        id: { type: string }
        redFlagId: { type: string, nullable: true }
        jobId: { type: string, nullable: true }
        isRead: { type: boolean }
        readAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        agentName: { type: string, nullable: true }
        violationType: { type: string, nullable: true }
        contactName: { type: string, nullable: true }

    AcrTeamMember:
      type: object
      required: [id, email, teamRole]
      properties:
        id: { type: integer }
        name: { type: string, nullable: true }
        email: { type: string }
        teamRole: { type: string }

    # --- Laporan & Jadwal (analytics v2) ---------------------------------------
    ChannelBreakdownItem:
      type: object
      required: [channelId, channelName, type, count, pct]
      properties:
        channelId: { type: integer }
        channelName: { type: string }
        type: { type: string }
        count: { type: integer }
        pct: { type: number }

    SatisfactionBreakdown:
      type: object
      required: [very_satisfied, satisfied, neutral, unsatisfied]
      properties:
        very_satisfied: { type: integer }
        satisfied: { type: integer }
        neutral: { type: integer }
        unsatisfied: { type: integer }

    AnalyticsV2Summary:
      type: object
      required:
        [
          totalChats,
          totalChatsChange,
          aiHandledRate,
          aiHandledCount,
          avgResponseTimeSeconds,
          avgResponseTimeChange,
          unrepliedCount,
          channelBreakdown,
          satisfactionBreakdown,
          hasSatisfactionData,
        ]
      properties:
        totalChats: { type: integer }
        totalChatsChange: { type: number, description: Percent change vs previous period }
        aiHandledRate: { type: number }
        aiHandledCount: { type: integer }
        avgResponseTimeSeconds: { type: integer }
        avgResponseTimeChange: { type: number }
        unrepliedCount: { type: integer }
        channelBreakdown:
          type: array
          items: { $ref: "#/components/schemas/ChannelBreakdownItem" }
        satisfactionBreakdown: { $ref: "#/components/schemas/SatisfactionBreakdown" }
        hasSatisfactionData:
          type: boolean
          description: False when the tenant has no satisfaction ratings (UI shows empty state).

    EscalationTopic:
      type: object
      required: [topic, count, escalationRate]
      properties:
        topic: { type: string }
        count: { type: integer }
        escalationRate: { type: number }

    AiPerformance:
      type: object
      required:
        [
          resolvedByAi,
          escalatedToAgent,
          escalatedCount,
          escalatedChange,
          avgSessionLength,
          tokensUsed,
          tokensRemaining,
          topEscalationTopics,
        ]
      properties:
        resolvedByAi: { type: number }
        escalatedToAgent: { type: number }
        escalatedCount: { type: integer }
        escalatedChange: { type: number }
        avgSessionLength: { type: number }
        tokensUsed: { type: integer }
        tokensRemaining: { type: integer, description: -1 when unlimited (infinity owner / no cap) }
        topEscalationTopics:
          type: array
          items: { $ref: "#/components/schemas/EscalationTopic" }

    ProductInterestItem:
      type: object
      required: [productInterest, productMatchedCode, productInCatalog, count, totalEstimatedValue]
      properties:
        productInterest: { type: string }
        productMatchedCode: { type: string, nullable: true }
        productInCatalog: { type: boolean }
        count: { type: integer }
        totalEstimatedValue: { type: integer, description: Sum of estimated values (whole Rupiah) }

    ProductInterestResult:
      type: object
      required: [topProducts, unmatchedProducts, totalUnmatchedValue, period]
      properties:
        topProducts:
          type: array
          items: { $ref: "#/components/schemas/ProductInterestItem" }
        unmatchedProducts:
          type: array
          items: { $ref: "#/components/schemas/ProductInterestItem" }
        totalUnmatchedValue: { type: integer, description: Sum of estimated values for products not in catalog (whole Rupiah) }
        period: { type: string, enum: [today, 7d, 30d, custom] }

    ChatHistoryItem:
      type: object
      required: [chatId, contactName, channelId, channelName, channelType, handledBy, status, startedAt]
      properties:
        chatId: { type: integer }
        contactName: { type: string }
        phoneNumber: { type: string, nullable: true }
        channelId: { type: integer }
        channelName: { type: string }
        channelType: { type: string }
        handledBy: { type: string, enum: [ai, agent, escalated] }
        durationMinutes: { type: integer, nullable: true }
        satisfaction: { type: string, nullable: true }
        status: { type: string, enum: [done, in_progress, unreplied] }
        startedAt: { type: string, format: date-time }
        lastMessageAt: { type: string, format: date-time, nullable: true }

    ChatHistoryResult:
      type: object
      required: [records, total, page, limit, hasMore]
      properties:
        records:
          type: array
          items: { $ref: "#/components/schemas/ChatHistoryItem" }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        hasMore: { type: boolean }

    AiInsightResponse:
      type: object
      required: [type, generatedAt, expiresAt, fromCache, content]
      properties:
        type: { type: string, enum: [narrative, anomaly, kb_recommendations] }
        generatedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        fromCache: { type: boolean }
        error: { type: string, nullable: true, description: Set when generation failed; content is empty. }
        engine:
          type: string
          nullable: true
          description: >-
            Friendly label of the AI engine that produced this insight (e.g.
            "Gemini · gemini-2.5-flash"). Null on error. Lets the owner compare
            which centralized engine generated each analysis.
        content:
          type: object
          additionalProperties: true
          description: >-
            Shape depends on type. narrative => {criticalIssue, opportunity,
            positive, totalChatsAnalyzed}. anomaly => {anomalies: [...]}.
            kb_recommendations => {recommendations: [...]}.

    NextActionItem:
      type: object
      required: [severity, text]
      properties:
        severity: { type: string, enum: [red, yellow, blue] }
        text: { type: string }
        ctaText: { type: string, nullable: true }
        ctaRoute: { type: string, nullable: true }

    ReportScheduleInput:
      type: object
      required: [name, contentTypes, frequency, recipientEmails]
      properties:
        name: { type: string, maxLength: 100 }
        contentTypes:
          type: array
          items:
            type: string
            enum: [kpi, ai_analysis, chat_history, trend]
        frequency:
          type: string
          enum: [once, daily, weekly, monthly]
        recurrenceDays:
          type: array
          nullable: true
          items: { type: integer, minimum: 1, maximum: 7 }
          description: Weekly only — ISO weekday numbers (1=Monday).
        sendTime: { type: string, description: HH:mm in the schedule timezone }
        timezone: { type: string }
        recipientEmails:
          type: array
          items: { type: string }
        isActive: { type: boolean }

    ReportScheduleToggleInput:
      type: object
      required: [isActive]
      properties:
        isActive: { type: boolean }

    ReportSchedule:
      type: object
      required:
        [id, name, contentTypes, frequency, sendTime, timezone, recipientEmails, isActive, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        contentTypes:
          type: array
          items: { type: string }
        frequency: { type: string, enum: [once, daily, weekly, monthly] }
        recurrenceDays:
          type: array
          nullable: true
          items: { type: integer }
        sendTime: { type: string }
        timezone: { type: string }
        recipientEmails:
          type: array
          items: { type: string }
        isActive: { type: boolean }
        lastSentAt: { type: string, format: date-time, nullable: true }
        lastSendStatus: { type: string, nullable: true }
        lastSendError: { type: string, nullable: true }
        nextScheduledAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

    ReportScheduleLog:
      type: object
      required: [id, scheduleId, triggeredBy, status, recipientEmails, createdAt]
      properties:
        id: { type: integer }
        scheduleId: { type: integer }
        scheduleName: { type: string, nullable: true }
        triggeredBy: { type: string, enum: [scheduler, manual] }
        status: { type: string, enum: [pending, sent, failed] }
        recipientEmails:
          type: array
          items: { type: string }
        errorMessage: { type: string, nullable: true }
        sentAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

    AcrScheduleInput:
      type: object
      required: [name, frequency, cutoffHour, cutoffMinute]
      properties:
        name: { type: string }
        frequency:
          type: string
          enum: [daily, weekly, monthly]
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
          nullable: true
          description: Weekly only. 0=Sunday … 6=Saturday.
        dayOfMonth:
          type: integer
          minimum: 1
          maximum: 28
          nullable: true
          description: Monthly only. 1–28.
        cutoffHour: { type: integer, minimum: 0, maximum: 23 }
        cutoffMinute: { type: integer, minimum: 0, maximum: 59 }
        agentIds:
          type: array
          items: { type: integer }
          description: Empty/omitted = all agents.
        notifyUserIds:
          type: array
          items: { type: integer }
        leadStatuses:
          type: array
          items:
            type: string
            enum: [lead, not_lead, unknown]
          description: Manual lead classifications whose chats are analyzed. Empty/omitted = no restriction (all chats).
        channelIds:
          type: array
          items: { type: integer }
          description: Restrict analysis to these channels. Empty/omitted = all channels.
        customerLabelIds:
          type: array
          items: { type: integer }
          description: Restrict to chats whose contact carries one of these customer labels. Empty/omitted = no label filter.
        chatStatuses:
          type: array
          items:
            type: string
            enum: [ai_handled, needs_human, closed]
          description: Restrict to chats with one of these handling statuses. Empty/omitted = all statuses.
        includeOwner:
          type: boolean
          description: Override the tenant config's include-owner-in-evaluation for this schedule. Omitted = inherit config.
        generatePdf: { type: boolean }
        sendWhatsappPdf: { type: boolean }
        isActive: { type: boolean }

    AcrScheduleActiveInput:
      type: object
      required: [isActive]
      properties:
        isActive: { type: boolean }

    AcrSchedule:
      type: object
      required: [id, name, frequency, isActive, cutoffHour, cutoffMinute, nextRunAt]
      properties:
        id: { type: string }
        name: { type: string }
        isActive: { type: boolean }
        frequency:
          type: string
          enum: [daily, weekly, monthly]
        dayOfWeek: { type: integer, nullable: true }
        dayOfMonth: { type: integer, nullable: true }
        cutoffHour: { type: integer }
        cutoffMinute: { type: integer }
        timezone: { type: string }
        agentIds:
          type: array
          nullable: true
          items: { type: integer }
        notifyUserIds:
          type: array
          items: { type: integer }
        leadStatuses:
          type: array
          nullable: true
          items:
            type: string
            enum: [lead, not_lead, unknown]
        channelIds:
          type: array
          nullable: true
          items: { type: integer }
        customerLabelIds:
          type: array
          nullable: true
          items: { type: integer }
        chatStatuses:
          type: array
          nullable: true
