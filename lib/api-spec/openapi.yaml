    post:
      operationId: answerLeadReview
      tags: [lead-reviews]
      summary: Answer a lead clarification request
      description: >
        Records the tenant's final decision: sets the contact's manual lead
        status, stores the answer as a learning signal, and closes the request.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadReviewAnswerInput"
      responses:
        "200":
          description: Answer recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadReviewAnswerResult"
        "404":
          description: Request not found or not owned by the caller
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
