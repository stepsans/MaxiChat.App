  /chats/open-by-phone:
    post:
      operationId: openChatByPhone
      tags: [chats]
      summary: Open (or create) a chat with the given phone number
      description: >
        Looks up a chat owned by the current WhatsApp account that matches the
        normalised phone number. If found, returns its id. If not, creates an
        empty chat placeholder and returns the new id. Use this for the
        "start a new chat" UX where the user types a number that may or may
        not already exist in their history.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenChatByPhoneInput"
      responses:
        "200":
          description: Chat opened or created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenChatByPhoneResult"
        "400":
          description: Invalid phone number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: WhatsApp account not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chats/history:
    get:
      operationId: getChatHistory
      tags: [chats]
      summary: Page back through a chat's older messages
      description: >
        Returns a page of messages older than `before` for the given chat,
        ordered oldest-first. Used by the conversation view to lazily load
        history above the initial recent window without bloating the polled
        GET /chats/{id} response. Query-only (no path param) by design so the
        generated client/types don't collide with the path-param schema.
      parameters:
        - name: chatId
          in: query
          required: true
          schema:
            type: integer
        - name: before
          in: query
          required: true
          description: Return messages older than this message id.
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          description: Max number of messages to return. Defaults to 200.
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: A page of older messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatHistoryPage"
        "400":
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Chat not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chats/{id}/refresh-avatar:
    post:
      operationId: refreshChatAvatar
      tags: [chats]
      summary: Force-refresh a chat's profile picture from WhatsApp
      description: >
        Bypasses the TTL cache and asks Baileys for the latest profile picture
        URL for this chat. Returns the new URL (or null if WhatsApp didn't
        return one — typical for contacts with strict privacy settings or no
        photo set).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Refresh result
          content:
            application/json:
              schema:
                type: object
                required: [profilePicUrl]
                properties:
                  profilePicUrl:
                    type: string
                    nullable: true
        "404":
          description: Chat not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chats/{id}:
    get:
      operationId: getChat
      tags: [chats]
      summary: Get a specific chat with messages
      description: >
        Returns the chat plus the most recent window of messages (newest 200).
        Older history is paged separately via GET /chats/history to keep this
        response — which the client polls every few seconds — small even for
        large group chats.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatWithMessages"
        "404":
          description: Chat not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateChat
