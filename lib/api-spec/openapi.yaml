      summary: Find chats whose message content matches a query
      description: >
        Returns the ids of chats (within the caller's channel scope and
        role-based access) that contain at least one message whose text
        content matches the query. Used to extend the chat-list search box
        so it also matches the words inside conversations, not just contact
        name and phone number.
      parameters:
        - name: q
          in: query
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Ids of chats with matching message content
          content:
            application/json:
              schema:
