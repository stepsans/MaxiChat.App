      tags: [chats]
      summary: Delete a message from MaxiChat only (delete for me)
      description: >
        Removes the message row from MaxiChat's database. Does NOT touch
        WhatsApp/Telegram — the message remains on the contact's device.
        Works for any message (inbound or outbound).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: messageId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Message deleted locally
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
        "404":
          description: Message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chats/{id}/messages/{messageId}/revoke:
    post:
      operationId: revokeMessage
      tags: [chats]
      summary: Delete a message for everyone (revoke on the channel)
      description: >
        Recalls the message on the underlying channel so the contact also sees
        it removed. WhatsApp/Telegram only allow recalling your own (outbound)
        messages, and within a time window. After a successful revoke the local
        row is also removed.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: messageId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Message revoked for everyone and removed locally
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
        "400":
          description: Message cannot be revoked (inbound, or channel unsupported)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Channel not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chats/{id}/messages/{messageId}/edit:
    post:
      operationId: editMessage
      tags: [chats]
      summary: Edit the text of an outbound message
      description: >
        Edits the text of a message the operator previously sent, on the
        underlying channel (WhatsApp/Telegram), then overwrites the local
        content and stamps editedAt. Only outbound text messages can be
        edited, within the channel's time window.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: messageId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditMessageTextBody"
      responses:
        "200":
          description: The updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"
        "400":
          description: Message cannot be edited (inbound, has media, or too old)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chats/{id}/messages/{messageId}/forward:
    post:
      operationId: forwardMessage
      tags: [chats]
      summary: Forward a message (text + media) to one or more other chats
      description: >
        Forwards the given message to each target chat, sending text and full
        media on the underlying channel (WhatsApp or Telegram) and recording an
        outbound row marked as forwarded with an incremented forwarding score.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: messageId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForwardTargetsBody"
      responses:
        "200":
          description: Forward attempted for each target
          content:
            application/json:
              schema:
                type: object
                required: [success, sent, failed, results]
                properties:
                  success:
                    type: boolean
                  sent:
                    type: integer
                  failed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      required: [chatId, ok]
                      properties:
                        chatId:
                          type: integer
                        ok:
                          type: boolean
                        error:
                          type: string
        "400":
          description: Invalid request (no targets, or message cannot be forwarded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Source chat or message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

