    post:
      operationId: forwardMessage
      tags: [chats]
      summary: Forward a message (text + media) to one or more other chats
      description: >
        Forwards the given message to each target chat, sending text and full
        media on the underlying channel (WhatsApp or Telegram) and recording an
        outbound row marked as forwarded with an incremented forwarding score.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: messageId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForwardTargetsBody"
      responses:
        "200":
          description: Forward attempted for each target
          content:
            application/json:
              schema:
                type: object
                required: [success, sent, failed, results]
                properties:
                  success:
                    type: boolean
                  sent:
                    type: integer
                  failed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      required: [chatId, ok]
                      properties:
                        chatId:
                          type: integer
                        ok:
                          type: boolean
                        error:
                          type: string
        "400":
          description: Invalid request (no targets, or message cannot be forwarded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Source chat or message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chats/{id}/common-groups:
    get:
      operationId: getCommonGroups
      tags: [chats]
      summary: Groups shared in common with a 1:1 contact
      description: >
        For a direct (non-group) chat, lists the WhatsApp groups that both the
        connected account and this contact belong to. Returns 400 for group chats.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Common groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommonGroups"
        "400":
          description: Chat is a group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Chat not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: WhatsApp not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chats/{id}/participants:
    post:
      operationId: addGroupParticipants
      tags: [chats]
      summary: Add members to a group (modifies the real WhatsApp group)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddParticipantsBody"
      responses:
        "200":
          description: Per-phone add result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddParticipantsResult"
        "400":
          description: Not a group chat / invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Chat not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: WhatsApp not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /groups:
    post:
      operationId: createGroup
      tags: [chats]
      summary: Create a new WhatsApp group (creates a real group on your account)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupInput"
      responses:
        "200":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGroupResult"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: WhatsApp not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    GroupParticipant:
      type: object
      required: [jid, isAdmin, isSuperAdmin]
      properties:
        jid:
          type: string
        phone:
          type: ["string", "null"]
          description: Digits-only phone parsed from the JID, when it is a real phone number.
        name:
          type: ["string", "null"]
        isAdmin:
          type: boolean
        isSuperAdmin:
          type: boolean
    GroupInfo:
      type: object
      required: [subject, size, participants]
      properties:
        subject:
          type: string
        description:
          type: ["string", "null"]
        ownerJid:
          type: ["string", "null"]
        creationAt:
          type: ["string", "null"]
          description: ISO timestamp of when the group was created, if known.
        size:
          type: integer
        inviteLink:
          type: ["string", "null"]
          description: Shareable https://chat.whatsapp.com/<code> link. Null if the account is not an admin.
        participants:
          type: array
          items:
            $ref: "#/components/schemas/GroupParticipant"
    ChatAttachmentItem:
      type: object
      required: [id, direction, createdAt]
      properties:
        id:
          type: integer
        mediaType:
          type: ["string", "null"]
        mediaUrl:
          type: ["string", "null"]
        mediaMimeType:
          type: ["string", "null"]
        mediaFilename:
          type: ["string", "null"]
        content:
          type: string
        direction:
          type: string
          enum: [inbound, outbound]
        createdAt:
          type: string
        senderName:
          type: ["string", "null"]
    ChatLinkItem:
      type: object
      required: [messageId, url, createdAt]
      properties:
        messageId:
          type: integer
        url:
          type: string
        createdAt:
          type: string
        senderName:
          type: ["string", "null"]
    ChatAttachments:
      type: object
      required: [media, docs, links]
      properties:
        media:
          type: array
          items:
            $ref: "#/components/schemas/ChatAttachmentItem"
        docs:
          type: array
          items:
            $ref: "#/components/schemas/ChatAttachmentItem"
        links:
          type: array
          items:
            $ref: "#/components/schemas/ChatLinkItem"
    StarMessageBody:
      type: object
      required: [starred]
      properties:
        starred:
          type: boolean
    ReactionInput:
      type: object
      required: [emoji]
      properties:
        emoji:
          type: string
          description: Emoji to react with. Empty string clears the operator's reaction.
    PinMessageBody:
      type: object
      required: [pinned]
      properties:
        pinned:
          type: boolean
    ForwardTargetsBody:
      type: object
      required: [targetChatIds]
      properties:
        targetChatIds:
          type: array
          items: { type: integer }
          minItems: 1
    EditMessageTextBody:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          description: New text for the message.
    CommonGroup:
      type: object
      required: [groupJid, subject]
      properties:
        groupJid:
          type: string
        subject:
          type: string
        chatId:
          type: ["integer", "null"]
          description: Our local chat id for this group, when it already exists in MaxiChat.
    CommonGroups:
      type: object
      required: [groups]
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/CommonGroup"
    CreateGroupInput:
      type: object
      required: [subject, phones]
      properties:
        subject:
          type: string
          minLength: 1
        phones:
          type: array
          minItems: 1
          items:
            type: string
          description: Member phone numbers in international format (digits, optional leading +).
    CreateGroupResult:
      type: object
      required: [groupJid, subject]
      properties:
        chatId:
          type: ["integer", "null"]
        groupJid:
          type: string
        subject:
          type: string
    AddParticipantsBody:
      type: object
      required: [phones]
      properties:
        phones:
          type: array
          minItems: 1
          items:
            type: string
    ParticipantAddResult:
      type: object
      required: [phone, status]
      properties:
        phone:
          type: string
        jid:
          type: ["string", "null"]
        status:
          type: string
          description: WhatsApp status code; "200" means added, others indicate failure (e.g. needs invite).
    AddParticipantsResult:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/ParticipantAddResult"
    AiProviderMode:
      type: string
      enum: [replit, byok]
      description: "'replit' uses the managed integration (default); 'byok' uses the tenant's own API key."
    AiProviderName:
      type: string
      enum: [openai, gemini, openrouter]
    AiProviderConfig:
      type: object
      required: [mode, provider, model, baseUrl, hasApiKey, maskedApiKey, updatedAt]
      properties:
        mode: { $ref: "#/components/schemas/AiProviderMode" }
        provider: { $ref: "#/components/schemas/AiProviderName" }
        model:
          type: ["string", "null"]
          description: "Chosen model id, or null to use the provider default."
        baseUrl:
          type: ["string", "null"]
          description: "Optional OpenAI-compatible base URL override."
        hasApiKey:
          type: boolean
          description: "True when an encrypted API key is stored for this tenant."
        maskedApiKey:
          type: ["string", "null"]
          description: "Masked preview of the stored key (e.g. 'sk-...AB12'); never the full key."
        updatedAt:
          type: ["string", "null"]
          format: date-time
    AiProviderInput:
      type: object
      required: [mode]
      properties:
        mode: { $ref: "#/components/schemas/AiProviderMode" }
        provider: { $ref: "#/components/schemas/AiProviderName" }
        model:
          type: string
          maxLength: 200
        baseUrl:
          type: string
          maxLength: 500
        apiKey:
          type: string
          description: "Plaintext API key. Omit to keep the existing stored key."
          maxLength: 500
    AiProviderTestInput:
      type: object
      required: [provider]
      properties:
        provider: { $ref: "#/components/schemas/AiProviderName" }
        model:
          type: string
          maxLength: 200
        baseUrl:
          type: string
          maxLength: 500
        apiKey:
          type: string
          description: "Plaintext API key to test. Omit to test the stored key."
          maxLength: 500
    AiProviderTestResult:
      type: object
      required: [ok, message]
      properties:
        ok: { type: boolean }
        message: { type: string }
    PermissionCell:
      type: object
      required: [canView, canCreate, canEdit, canDelete]
      properties:
        canView: { type: boolean }
        canCreate: { type: boolean }
        canEdit: { type: boolean }
        canDelete: { type: boolean }

    RoleMatrix:
      type: object
      description: Map of menu key → permission cell. Keys are knowledge, products, flows, analytics, credentials, chats, statuses, settings, channels.
      additionalProperties:
        $ref: "#/components/schemas/PermissionCell"

    PermissionMatrix:
      type: object
      required: [supervisor, agent]
      properties:
        supervisor: { $ref: "#/components/schemas/RoleMatrix" }
        agent: { $ref: "#/components/schemas/RoleMatrix" }

    EffectivePermissions:
      type: object
      required: [teamRole, menus]
      properties:
        teamRole:
          type: string
          enum: [super_admin, supervisor, agent]
        menus: { $ref: "#/components/schemas/RoleMatrix" }

    TeamMemberPermissionSummary:
      type: object
      required: [id, email, teamRole, hasOverrides]
      properties:
        id: { type: integer }
        name: { type: string, nullable: true }
        email: { type: string }
        teamRole:
          type: string
          enum: [super_admin, supervisor, agent]
        hasOverrides:
          type: boolean
          description: True when the user has at least one per-user override row that diverges from the role default.

    UserPermissionDetail:
      type: object
      required: [user, roleDefault, overrides, effective]
      properties:
        user:
          type: object
          required: [id, email, teamRole]
          properties:
            id: { type: integer }
            name: { type: string, nullable: true }
            email: { type: string }
            teamRole:
              type: string
              enum: [super_admin, supervisor, agent]
        roleDefault: { $ref: "#/components/schemas/RoleMatrix" }
        overrides:
          type: object
          description: Stored per-user overrides (subset of menus). Empty when the user inherits the role default verbatim.
          additionalProperties:
            $ref: "#/components/schemas/PermissionCell"
        effective: { $ref: "#/components/schemas/RoleMatrix" }

    UpdateUserPermissionRequest:
      type: object
      required: [overrides]
      properties:
        overrides:
          nullable: true
          description: Map of menu key → cell to override. Pass null to clear all overrides and inherit the role default.
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PermissionCell"

    TenantChannelOption:
      type: object
      required: [id, label, kind, status]
      properties:
        id: { type: integer }
        label: { type: string }
        kind: { type: string }
        status: { type: string }

    UserChannelAccessDetail:
      type: object
      required: [user, channels, allowedChannelIds]
      properties:
        user:
          type: object
          required: [id, email, teamRole]
          properties:
            id: { type: integer }
            name: { type: string, nullable: true }
            email: { type: string }
            teamRole:
              type: string
              enum: [super_admin, supervisor, agent]
        channels:
          type: array
          description: All channels in the user's tenant (the universe of options).
          items: { $ref: "#/components/schemas/TenantChannelOption" }
        allowedChannelIds:
          type: array
          description: Subset of channels.id values this user can see chats in.
          items: { type: integer }

    UpdateUserChannelAccessRequest:
      type: object
      required: [channelIds]
      properties:
        channelIds:
          type: array
          description: Channel ids to grant chat access to. Empty array = no chat access.
          items: { type: integer }

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    PaymentGatewayConfig:
      type: object
      description: >-
        Masked payment-gateway (Xendit) configuration status. Never includes the
        raw secret key or callback token — only whether each is set, where it
        resolves from, and the last 4 chars of the secret key.
      required:
        - provider
        - isActive
        - secretKeyConfigured
        - callbackTokenConfigured
      properties:
        provider:
          type: string
        isActive:
          type: boolean
        secretKeyConfigured:
          type: boolean
        callbackTokenConfigured:
          type: boolean
        secretKeySource:
          type: ["string", "null"]
          enum: [db, env, null]
        callbackTokenSource:
          type: ["string", "null"]
          enum: [db, env, null]
        secretKeyLast4:
          type: ["string", "null"]
        updatedAt:
          type: ["string", "null"]

    UpdatePaymentConfigInput:
      type: object
      description: >-
        Update the platform Xendit credentials. Provide a non-empty value to
        set/replace a credential; omit it to leave it unchanged. Use the clear*
        flags to remove a stored value (falls back to the env var).
      properties:
        secretKey:
          type: string
        callbackToken:
          type: string
        clearSecretKey:
          type: boolean
        clearCallbackToken:
          type: boolean
        isActive:
          type: boolean

    WhatsappStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [connected, disconnected, connecting, qr_ready]
        qrCode:
          type: ["string", "null"]
        phoneNumber:
          type: ["string", "null"]
        connectedAt:
          type: ["string", "null"]

    Chat:
      type: object
      required: [id, channelId, phoneNumber, contactName, nickname, status, tag, isHumanTakeover, lastMessage, lastMessageAt, pinnedAt, isArchived, isLid, unreadCount, profilePicUrl, createdAt, assignedUserId, labels]
      properties:
        id:
          type: integer
        channelId:
          type: ["integer", "null"]
          description: "Owning channel id. Nullable only during the channel-id backfill transition; new chats always have one. Use this to render the channel badge in the 'All channels' aggregate view."
        phoneNumber:
          type: string
        contactName:
          type: string
        nickname:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
          description: Free-text company/organisation the contact belongs to.
        customerCode:
          type: ["string", "null"]
          description: Customer code (kode customer), entered manually in the chat Info tab.
        labels:
          type: array
          items:
            $ref: "#/components/schemas/CustomerLabel"
          description: Customer labels currently attached to this chat.
        status:
          type: string
          enum: [ai_handled, needs_human, closed]
        tag:
          type: string
          enum: [none, hot_lead, cold, closing]
        isHumanTakeover:
          type: boolean
        lastMessage:
          type: ["string", "null"]
        lastMessageAt:
          type: ["string", "null"]
        pinnedAt:
          type: ["string", "null"]
        isArchived:
          type: boolean
        isLid:
          type: boolean
        unreadCount:
          type: integer
        profilePicUrl:
          type: ["string", "null"]
        createdAt:
          type: string
        assignedUserId:
          type: ["integer", "null"]

    ChatMessage:
      type: object
      required: [id, chatId, direction, content, isAiGenerated, createdAt]
      properties:
        id:
          type: integer
        chatId:
          type: integer
        direction:
          type: string
          enum: [inbound, outbound]
        content:
          type: string
        isAiGenerated:
          type: boolean
        status:
          type: ["string", "null"]
          enum: [sent, delivered, read, null]
          description: Outbound delivery/read state mirroring WhatsApp's ticks ("sent"=single, "delivered"=double grey, "read"=double blue). Null for inbound messages and outbound messages whose status hasn't been observed yet (treated as "sent" by the UI).
        createdAt:
          type: string
        senderName:
          type: ["string", "null"]
          description: pushName of the participant who sent this message; only populated for inbound group messages.
        senderPhoneDigits:
          type: ["string", "null"]
          description: Digits portion of the sender JID (real phone or LID). Used to dedupe per-sender headers and to resolve @mentions.
        mentionedPhoneDigits:
          type: array
          items:
            type: string
          description: Digits of every JID mentioned in this message body, in the order they appear. Empty/omitted when no mentions.
        isStarred:
          type: boolean
          description: MaxiChat-internal star flag (not synced from the phone).
        isForwarded:
          type: boolean
          description: Whether this message was forwarded (inbound detected from the channel, or outbound forwarded via MaxiChat).
        forwardingScore:
          type: integer
          description: WhatsApp forward count. >=1 shows "Diteruskan", >=4 shows "Diteruskan berkali-kali". Telegram forwards are 0.
        quotedMessageId:
          type: ["integer", "null"]
          description: Our local chat_messages id this message replies to, when the quoted message exists in MaxiChat (lets the UI scroll to it).
        quotedContent:
          type: ["string", "null"]
          description: Snapshot of the quoted message's text/preview, rendered in the grey reply bar.
        quotedSender:
          type: ["string", "null"]
          description: Display name of who was quoted (sender of the replied-to message).
        reactions:
          type: array
          items:
            $ref: "#/components/schemas/MessageReaction"
          description: Emoji reactions on this message. Empty/omitted when none.
        pinnedAt:
          type: ["string", "null"]
          description: When this message was pinned (MaxiChat-internal). Null when not pinned.
        editedAt:
          type: ["string", "null"]
          description: When this message's text was last edited via MaxiChat. Null when never edited.

    MessageReaction:
      type: object
      required: [emoji]
      properties:
        emoji:
          type: string
        fromMe:
          type: boolean
          description: True when the reaction is the operator's own (sent from MaxiChat / the connected account).
        senderName:
          type: ["string", "null"]
        senderPhoneDigits:
          type: ["string", "null"]

    LinkPreview:
      type: object
      required: [url]
      properties:
        url:
          type: string
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        image:
          type: ["string", "null"]
        siteName:
          type: ["string", "null"]

    ChatWithMessages:
      type: object
      required: [id, channelId, phoneNumber, contactName, nickname, status, tag, isHumanTakeover, lastMessage, lastMessageAt, pinnedAt, isArchived, isLid, unreadCount, profilePicUrl, createdAt, assignedUserId, labels, messages]
      properties:
        id:
          type: integer
        channelId:
          type: integer
          description: The channel this chat belongs to. Used to scope channel-restricted resources (e.g. shortcuts) to the active chat.
        phoneNumber:
          type: string
        contactName:
          type: string
        nickname:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
          description: Free-text company/organisation the contact belongs to.
        customerCode:
          type: ["string", "null"]
          description: Customer code (kode customer), entered manually in the chat Info tab.
        labels:
          type: array
          items:
            $ref: "#/components/schemas/CustomerLabel"
          description: Customer labels currently attached to this chat.
        status:
          type: string
          enum: [ai_handled, needs_human, closed]
        tag:
          type: string
          enum: [none, hot_lead, cold, closing]
        isHumanTakeover:
          type: boolean
        lastMessage:
          type: ["string", "null"]
        lastMessageAt:
          type: ["string", "null"]
        pinnedAt:
          type: ["string", "null"]
        isArchived:
          type: boolean
        isLid:
          type: boolean
        unreadCount:
          type: integer
        profilePicUrl:
          type: ["string", "null"]
        createdAt:
          type: string
        assignedUserId:
          type: ["integer", "null"]
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        hasMoreMessages:
          type: boolean
          description: >
            True when older messages exist beyond the returned window. The
            conversation loads only the most recent page; pass the oldest
            returned message id as `before` to fetch the previous page.

    ChatHistoryPage:
      type: object
      required: [messages, hasMore]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
          description: Older messages, ordered oldest-first.
        hasMore:
          type: boolean
          description: True when still older messages exist before this page.

    OpenChatByPhoneInput:
      type: object
      required: [phoneNumber]
      properties:
        phoneNumber:
          type: string
          description: Raw phone number as typed by the user (digits, +, spaces, dashes are all accepted; server normalises).
        contactName:
          type: string
          description: Optional display name to use if a new chat is created.

    OpenChatByPhoneResult:
      type: object
      required: [chatId, created, phoneNumber]
      properties:
        chatId:
          type: integer
        created:
          type: boolean
          description: True if a new chat row was inserted, false if an existing chat was returned.
        phoneNumber:
          type: string
          description: The normalised phone number that was used to look up / create the chat (E.164-ish, with leading +).

    ChatContentSearchResult:
      type: object
      required: [chatIds]
      properties:
        chatIds:
          type: array
          items:
            type: integer
          description: Ids of chats that have at least one message matching the query.

    ChatUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [ai_handled, needs_human, closed]
        tag:
          type: string
          enum: [none, hot_lead, cold, closing]
        nickname:
          type: ["string", "null"]
          description: Editable display name for the contact (overrides contactName in the header).
        company:
          type: ["string", "null"]
          description: Free-text company/organisation the contact belongs to.
        customerCode:
          type: ["string", "null"]
          description: Customer code (kode customer), entered manually in the chat Info tab.

    CustomerLabel:
      type: object
      required: [id, name, color, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
          description: Hex color (e.g. "#ef4444") used for the chip background.
        createdAt:
          type: string

    CreateCustomerLabelInput:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
        color:
          type: string

    UpdateCustomerLabelInput:
      type: object
      properties:
        name:
          type: string
        color:
          type: string

    SetChatLabels:
      type: object
      required: [labelIds]
      properties:
        labelIds:
          type: array
          items:
            type: integer
          description: Full replacement set of label ids to attach to the chat.

    ChatLabelsResult:
      type: object
      required: [labels]
      properties:
        labels:
          type: array
          items:
            $ref: "#/components/schemas/CustomerLabel"

    ManualReplyInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
        quotedMessageId:
          type: ["integer", "null"]
          description: >
            Our local chat_messages id this reply quotes. The server builds the
            WhatsApp/Telegram quoted context from it and snapshots the quoted
            text/sender for rendering the reply bar.
        mentions:
