        name and phone number.
      parameters:
        - name: q
          in: query
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Ids of chats with matching message content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatContentSearchResult"

  /chats/bulk-update:
    post:
      operationId: bulkUpdateChats
      tags: [chats]
      summary: Bulk-update lead status / tag / status for multiple chats
      description: >
        Applies the same field changes to every selected chat that is within
        the caller's channel scope (and, for agents, assigned to them). Chats
        outside the caller's scope are silently skipped — the response reports
        how many rows were actually updated. Used by the chat-list
        multi-select so the operator doesn't have to open chats one by one.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkChatUpdateInput"
      responses:
        "200":
          description: Bulk update applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkChatUpdateResult"
        "400":
          description: Invalid body or no updatable field provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

