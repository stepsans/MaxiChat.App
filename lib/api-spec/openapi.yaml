      operationId: listLeadReviews
      tags: [lead-reviews]
      summary: List pending lead clarification requests for the tenant
      description: >
        Returns the open "Review Lead" queue — questions raised when the AI
        Pipeline was uncertain (borderline score / unclear role) or its verdict
        conflicted with a manual label. Answering them teaches the AI.
      responses:
        "200":
          description: Pending review requests (plus the total pending count)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadReviewList"
